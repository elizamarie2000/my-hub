// ── OVERVIEW with Conversion Rate, Stats History, Revenue Goal
function renderEtsyOverview() {
  let h = '';
  h += '<div class="sec-head"><span class="sec-title">Weekly Stats</span>';
  h += '<button class="btn btn-sm btn-cream" onclick="openLogStatsModal()">+ Log Week</button></div>';

  const latest = D.etsy.weeklyStats.slice(-1)[0];
  const prev = D.etsy.weeklyStats.length >= 2 ? D.etsy.weeklyStats[D.etsy.weeklyStats.length-2] : null;

  // Stat cards including conversion rate
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:0.5rem;margin-bottom:1rem">';
  const convRate = latest && latest.visits > 0 ? ((latest.orders/latest.visits)*100).toFixed(1) : null;
  const prevConv = prev && prev.visits > 0 ? ((prev.orders/prev.visits)*100).toFixed(1) : null;
  const latestFavs = latest ? (latest.favourites||0) : null;
  const prevFavs = prev ? (prev.favourites||0) : null;
  const latestFollows = latest ? (latest.follows||0) : null;
  const prevFollows = prev ? (prev.follows||0) : null;
  const metrics = [
    {key:'views', label:'Views'},
    {key:'visits', label:'Visits'},
    {key:'orders', label:'Orders'},
    {key:'revenue', label:'Revenue', prefix:'\u00a3', decimals:2},
    {key:'_conv', label:'Conv %', suffix:'%'},
    {key:'favourites', label:'Favourites'},
    {key:'follows', label:'Follows'},
  ];
  // Build last 3 weeks for tooltips
  const last3 = D.etsy.weeklyStats.slice(-3);
  metrics.forEach(m => {
    let val, prevVal;
    if (m.key === '_conv') { val = convRate; prevVal = prevConv; }
    else { val = latest ? latest[m.key] : null; prevVal = prev ? prev[m.key] : null; }
    let delta = '';
    if (val != null && prevVal != null && prevVal > 0) {
      const pct = ((val - prevVal) / prevVal * 100).toFixed(0);
      const cls = pct > 0 ? 'stat-up' : pct < 0 ? 'stat-down' : 'stat-flat';
      delta = '<div class="stat-delta '+cls+'">'+(pct>0?'\u2191':pct<0?'\u2193':'\u2192')+' '+Math.abs(pct)+'%</div>';
    }
    h += '<div class="card stat-tooltip" style="text-align:center;padding:0.85rem 0.5rem">';
    // Count-up animated number
    if (val != null) {
      h += '<div class="stat-num count-up" style="font-size:1.5rem;color:var(--cream)" data-target="'+val+'" data-prefix="'+(m.prefix||'')+'" data-suffix="'+(m.suffix||'')+'" data-decimals="'+(m.decimals||0)+'">'+(m.prefix||'')+'0'+(m.suffix||'')+'</div>';
    } else {
      h += '<div class="stat-num" style="font-size:1.5rem;color:var(--cream)">\u2014</div>';
    }
    h += '<div class="stat-label">'+m.label+'</div>'+delta;
    // Tooltip with last 3 weeks
    if (last3.length > 1 && m.key !== '_conv') {
      let tipH = '<div class="tip-content"><div style="font-weight:600;margin-bottom:0.25rem">Last '+last3.length+' weeks</div>';
      last3.forEach(w => {
        const v = m.decimals ? '\u00a3'+Number(w[m.key]||0).toFixed(2) : (w[m.key]||0);
        tipH += '<div>'+fmtDateShort(w.week)+': <strong>'+v+'</strong></div>';
      });
      tipH += '</div>';
      h += tipH;
    }
    h += '</div>';
  });
  h += '</div>';

  // Revenue goal progress bar
  const goal = D.etsyWeeklyGoal || 0;
  if (goal > 0 && latest) {
    const rev = latest.revenue || 0;
    const goalPct = Math.min(100, (rev / goal) * 100);
    h += '<div class="card" style="margin-bottom:1rem;padding:1rem 1.4rem">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem">';
    h += '<span class="sec-title">Weekly Revenue Goal</span>';
    h += '<span style="font-size:0.88rem;font-weight:700;color:'+(goalPct>=100?'var(--green)':'var(--cream)')+'">'+'\u00a3'+rev.toFixed(2)+' / \u00a3'+goal.toFixed(2)+'</span></div>';
    h += '<div class="goal-track"><div class="goal-fill" style="width:'+goalPct+'%;'+(goalPct>=100?'background:var(--green)':'background:var(--peach)')+'"></div></div>';
    if (goalPct >= 100) h += '<div style="font-size:0.75rem;color:var(--green);margin-top:0.35rem" data-confetti="weekly">🎉 Goal reached! Well done.</div>';
    else h += '<div style="font-size:0.75rem;color:var(--overlay1);margin-top:0.35rem">'+'\u00a3'+(goal-rev).toFixed(2)+' to go</div>';
    h += '</div>';
  }

  // Monthly revenue goal progress bar
  const monthlyGoal = D.etsyMonthlyGoal || 0;
  if (monthlyGoal > 0) {
    const now = today();
    const currentMonthStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    const monthRevenue = D.etsy.weeklyStats.filter(w => w.week && w.week.startsWith(currentMonthStr)).reduce((s,w) => s + (w.revenue||0), 0);
    const monthPct = Math.min(100, (monthRevenue / monthlyGoal) * 100);
    const monthName = now.toLocaleDateString('en-GB', { month: 'long' });
    h += '<div class="card" style="margin-bottom:1rem;padding:1rem 1.4rem">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem">';
    h += '<span class="sec-title">'+monthName+' Revenue Goal</span>';
    h += '<span style="font-size:0.88rem;font-weight:700;color:'+(monthPct>=100?'var(--green)':'var(--cream)')+'">'+'\u00a3'+monthRevenue.toFixed(2)+' / \u00a3'+monthlyGoal.toFixed(2)+'</span></div>';
    h += '<div class="goal-track"><div class="goal-fill" style="width:'+monthPct+'%;'+(monthPct>=100?'background:var(--green)':'background:var(--lavender)')+'"></div></div>';
    if (monthPct >= 100) h += '<div style="font-size:0.75rem;color:var(--green);margin-top:0.35rem" data-confetti="monthly">🎉 Monthly goal smashed!</div>';
    else h += '<div style="font-size:0.75rem;color:var(--overlay1);margin-top:0.35rem">'+'\u00a3'+(monthlyGoal-monthRevenue).toFixed(2)+' to go this month</div>';
    h += '</div>';
  }

  // Charts
  if (D.etsy.weeklyStats.length >= 2) {
    h += '<div class="grid-2" style="margin-bottom:1rem">';
    h += '<div class="card"><div class="label" style="margin-bottom:0.5rem">Views & Visits</div><div class="chart-box"><canvas id="chart-views" class="chart-canvas"></canvas></div></div>';
    h += '<div class="card"><div class="label" style="margin-bottom:0.5rem">Orders & Revenue</div><div class="chart-box"><canvas id="chart-revenue" class="chart-canvas"></canvas></div></div>';
    h += '</div>';
  }

  // Conversion & engagement snapshot
  if (latest && prev && (latest.visits||0) > 0) {
    var thisConv = (latest.orders/latest.visits*100).toFixed(1);
    var lastConv = prev.visits > 0 ? (prev.orders/prev.visits*100).toFixed(1) : null;
    var convDelta = lastConv !== null ? (thisConv - lastConv).toFixed(1) : null;
    var convDeltaHtml = '';
    if (convDelta !== null) {
      var convCls = convDelta > 0 ? 'color:var(--green)' : convDelta < 0 ? 'color:var(--red)' : 'color:var(--overlay1)';
      convDeltaHtml = '<span style="font-size:0.72rem;'+convCls+'">' + (convDelta>0?'\u2191':convDelta<0?'\u2193':'\u2192') + ' ' + Math.abs(convDelta) + '% vs last week</span>';
    }
    // Follows growth
    var thisFollows = latest.follows||0;
    var lastFollows = prev.follows||0;
    var followsGained = thisFollows - lastFollows;
    // Favs comparison
    var thisFavs = latest.favourites||0;
    var lastFavs = prev.favourites||0;

    h += '<div class="card" style="margin-bottom:1rem;padding:1rem 1.2rem">';
    h += '<div class="label" style="margin-bottom:0.5rem">This Week\u2019s Engagement</div>';
    h += '<div style="display:flex;gap:1.25rem;flex-wrap:wrap;font-size:0.85rem">';
    h += '<div><span style="font-weight:700;font-size:1.1rem;color:var(--blue)">' + thisConv + '%</span> <span style="color:var(--overlay1);font-size:0.75rem">conversion</span> ' + convDeltaHtml + '</div>';
    if (thisFavs > 0 || lastFavs > 0) {
      var favDelta = lastFavs > 0 ? ((thisFavs-lastFavs)/lastFavs*100).toFixed(0) : null;
      h += '<div><span style="font-weight:700;font-size:1.1rem;color:var(--pink)">' + thisFavs + '</span> <span style="color:var(--overlay1);font-size:0.75rem">favourites</span>';
      if (favDelta !== null && lastFavs > 0) { h += ' <span style="font-size:0.72rem;color:'+(favDelta>=0?'var(--green)':'var(--red)')+'">'+(favDelta>=0?'\u2191':'\u2193')+Math.abs(favDelta)+'%</span>'; }
      h += '</div>';
    }
    if (thisFollows > 0) {
      h += '<div><span style="font-weight:700;font-size:1.1rem;color:var(--blue)">' + thisFollows + '</span> <span style="color:var(--overlay1);font-size:0.75rem">followers</span>';
      if (followsGained !== 0) { h += ' <span style="font-size:0.72rem;color:'+(followsGained>0?'var(--green)':'var(--red)')+'">'+(followsGained>0?'+':'')+followsGained+' this week</span>'; }
      h += '</div>';
    }
    h += '</div>';
    // Mini funnel for this week
    if ((latest.views||0) > 0) {
      h += '<div style="display:flex;gap:0.3rem;align-items:center;margin-top:0.6rem;font-size:0.72rem;color:var(--overlay1)">';
      h += '<span style="color:var(--blue)">'+(latest.views||0)+' views</span> \u2192 ';
      h += '<span style="color:var(--lavender)">'+(latest.visits||0)+' visits</span> \u2192 ';
      if (thisFavs > 0) h += '<span style="color:var(--pink)">'+thisFavs+' favs</span> \u2192 ';
      h += '<span style="color:var(--green)">'+(latest.orders||0)+' orders</span>';
      h += '</div>';
    }
    h += '</div>';
  }

  // All-time summary + listed count (includes baseline pre-tracking totals)
  const bl = D.etsy.baseline || { revenue:0, orders:0, views:0, visits:0 };
  const trackedRevenue = D.etsy.weeklyStats.reduce((s,w) => s + (w.revenue||0), 0);
  const trackedOrders = D.etsy.weeklyStats.reduce((s,w) => s + (w.orders||0), 0);
  const allTimeRevenue = trackedRevenue + (bl.revenue||0);
  const allTimeOrders = trackedOrders + (bl.orders||0);
  const listedCount = (D.etsy.products||[]).filter(p => p.stage === 'listed').length;
  if (D.etsy.weeklyStats.length > 0 || allTimeRevenue > 0) {
    h += '<div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1rem">';
    h += '<span class="chip chip-green">\u00a3' + allTimeRevenue.toFixed(2) + ' all-time revenue</span>';
    h += '<span class="chip chip-peach">' + allTimeOrders + ' total orders</span>';
    h += '<span class="chip chip-green">' + listedCount + ' listed product' + (listedCount!==1?'s':'') + '</span>';
    if (latestFollows > 0) h += '<span class="chip" style="background:rgba(138,173,244,.12);color:var(--blue)">' + latestFollows + ' shop followers</span>';
    if (latestFavs > 0) h += '<span class="chip" style="background:rgba(245,189,230,.12);color:var(--pink)">' + latestFavs + ' favourites this week</span>';
    h += '<span class="chip chip-dim">' + D.etsy.weeklyStats.length + ' week' + (D.etsy.weeklyStats.length!==1?'s':'') + ' tracked</span>';
    h += '</div>';
  }

  // Listing Renewal Tracker
  const listedProducts = (D.etsy.products||[]).filter(p => p.stage === 'listed');
  const expiringProducts = listedProducts.map(p => ({...p, expiry: listingExpiry(p)})).filter(x => x.expiry && x.expiry.daysLeft <= 14);
  if (expiringProducts.length > 0) {
    const renewalCost = (expiringProducts.filter(x => x.expiry.daysLeft <= 14).length * 0.16).toFixed(2);
    h += '<div class="card" style="margin-bottom:1rem;border-color:var(--yellow)">';
    h += '<div class="sec-head"><span class="sec-title" style="color:var(--yellow)">\u26a0 Listings Expiring Soon</span>';
    h += '<span class="chip chip-warn">Est. \u00a3'+renewalCost+' renewal</span></div>';
    expiringProducts.sort((a,b) => a.expiry.daysLeft - b.expiry.daysLeft).forEach(p => {
      const badge = p.expiry.daysLeft <= 0 ? '<span class="chip chip-urgent" style="font-size:0.6rem">Expired</span>' : '<span class="chip chip-warn" style="font-size:0.6rem">'+p.expiry.daysLeft+'d left</span>';
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid var(--surface0);font-size:0.82rem">';
      h += '<span style="cursor:pointer" onclick="openProductDetail(\''+p.id+'\')">'+esc(p.name)+'</span>'+badge+'</div>';
    });
    h += '</div>';
  }

  // Best Sellers (pick from existing products)
  h += '<div class="card" style="margin-bottom:1rem">';
  h += '<div class="sec-head"><span class="sec-title">Best Sellers</span><button class="btn btn-xs btn-ghost" onclick="openBestSellerModal()">+ Add</button></div>';
  if ((D.etsy.bestSellers||[]).length === 0) { h += '<p style="color:var(--overlay1);font-size:0.82rem">Flag your top-performing products here to spot patterns</p>'; }
  else {
    D.etsy.bestSellers.forEach((bs,i) => {
      const linkedProduct = bs.productId ? (D.etsy.products||[]).find(p => p.id === bs.productId) : null;
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--surface0)">';
      h += '<div style="display:flex;align-items:center;gap:0.5rem">';
      h += '<span style="font-size:1rem;font-weight:700;color:var(--peach);min-width:18px">#'+(i+1)+'</span>';
      if (linkedProduct) {
        h += '<span style="font-size:0.85rem;cursor:pointer;text-decoration:underline;text-decoration-color:var(--surface1)" onclick="openProductDetail(\''+linkedProduct.id+'\')">'+esc(linkedProduct.name)+'</span>';
        if (linkedProduct.price != null) h += ' <span style="font-size:0.72rem;color:var(--green)">\u00a3'+Number(linkedProduct.price).toFixed(2)+'</span>';
      } else {
        h += '<span style="font-size:0.85rem">'+esc(bs.name||'Unknown product')+'</span>';
      }
      if (bs.note) h += ' <span style="font-size:0.72rem;color:var(--overlay1)">\u2014 '+esc(bs.note)+'</span>';
      h += '</div><button class="btn-xs btn-ghost" onclick="removeBestSeller('+i+')">\u2715</button></div>';
    });
  }
  h += '</div>';

  // Stats History with edit/delete
  if (D.etsy.weeklyStats.length > 0) {
    h += '<div class="card">';
    h += '<div class="sec-head"><span class="sec-title">Stats History</span></div>';
    const statsReversed = [...D.etsy.weeklyStats].reverse();
    statsReversed.slice(0,10).forEach(s => {
      const conv = s.visits > 0 ? ((s.orders/s.visits)*100).toFixed(1)+'%' : '\u2014';
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--surface0);font-size:0.8rem">';
      h += '<span style="color:var(--overlay1);min-width:75px">'+fmtDateShort(s.week)+'</span>';
      h += '<span style="flex:1;text-align:center">'+s.views+' views \u00b7 '+s.visits+' visits \u00b7 '+s.orders+' orders \u00b7 \u00a3'+(s.revenue||0).toFixed(2)+' \u00b7 '+conv+'</span>';
      h += '<div style="display:flex;gap:0.3rem">';
      h += '<button class="btn-xs btn-ghost" onclick="openEditStatsModal(\''+s.id+'\')" title="Edit">\u270e</button>';
      h += '<button class="btn-xs btn-ghost" onclick="deleteStats(\''+s.id+'\')" title="Delete">\u2715</button>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  return h;
}

// ── PIPELINE with quick-move arrows and time-in-stage
function renderEtsyPipeline() {
  let h = '';
  h += '<div class="sec-head"><span class="sec-title">Product Pipeline</span>';
  h += '<button class="btn btn-sm btn-cream" onclick="openAddProductModal()">+ New Product</button></div>';
  h += '<div class="kanban-board">';
  STAGES.forEach((stage,si) => {
    const products = (D.etsy.products||[]).filter(p => p.stage===stage);
    const color = 'var('+STAGE_COLORS[stage]+')';
    h += '<div class="kanban-col" data-stage="'+stage+'">';
    const colValue = products.reduce((s,p) => s + (p.price||0), 0);
    h += '<div class="kanban-col-title"><span>'+STAGE_LABELS[stage]+' <span style="font-size:0.6rem;font-weight:400;color:var(--overlay0)">('+products.length+')</span></span>';
    h += '<span style="color:'+color+';font-size:0.62rem">'+(colValue > 0 ? '\u00a3'+colValue.toFixed(2) : '')+'</span></div>';

    // Collapse Listed column — show summary + link instead of all cards
    if (stage === 'listed' && products.length > 3) {
      h += '<div class="kanban-card" style="text-align:center;cursor:pointer;border-color:var(--green);background:rgba(166,218,149,.04)" onclick="switchEtsyTab(\'myproducts\')">';
      h += '<div style="font-size:1.4rem;margin-bottom:0.3rem">\ud83d\udce6</div>';
      h += '<div style="font-size:0.88rem;font-weight:600;color:var(--green)">'+products.length+' Listed Products</div>';
      if (colValue > 0) h += '<div style="font-size:0.75rem;color:var(--overlay1);margin-top:0.15rem">Total value: \u00a3'+colValue.toFixed(2)+'</div>';
      const paused = products.filter(p => p.status === 'paused').length;
      const retired = products.filter(p => p.status === 'retired').length;
      if (paused > 0 || retired > 0) {
        h += '<div style="font-size:0.68rem;color:var(--overlay0);margin-top:0.2rem">';
        if (paused > 0) h += paused + ' paused';
        if (paused > 0 && retired > 0) h += ' \u00b7 ';
        if (retired > 0) h += retired + ' retired';
        h += '</div>';
      }
      h += '<div style="font-size:0.72rem;color:var(--blue);margin-top:0.4rem;text-decoration:underline">View in My Products \u2192</div>';
      h += '</div>';
      h += '</div>';
      return;
    }

    products.forEach(p => {
      const stageDate = p.stageChangedDate || p.dateAdded || '';
      const daysInStage = stageDate ? Math.round((today().getTime() - new Date(stageDate+'T00:00:00').getTime()) / 86400000) : 0;
      const isStalled = daysInStage >= 14 && stage !== 'listed';
      h += '<div class="kanban-card'+(isStalled?' stalled':'')+'" data-product-id="'+p.id+'">';
      h += '<div class="kanban-card-title" onclick="openProductDetail(\''+p.id+'\')">'+esc(p.name)+'</div>';
      const cardTags = Array.isArray(p.tags) ? p.tags : (p.tags ? p.tags.split(',').map(t=>t.trim()).filter(Boolean) : []);
      if (cardTags.length > 0) h += '<div class="kanban-card-meta">\ud83c\udff7 '+esc(cardTags.join(', '))+'</div>';
      // Time-in-stage indicator
      if (stageDate) {
        const ago = timeAgo(stageDate);
        h += '<div class="kanban-time'+(isStalled?' warn':'')+'">';
        h += '<svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="8" r="6"/><path d="M8 4.5V8l2.5 1.5"/></svg>';
        h += ago + ' in ' + STAGE_LABELS[stage];
        if (isStalled) h += ' \u2014 stalled?';
        h += '</div>';
      }
      // Quick-move buttons
      h += '<div class="kanban-move">';
      if (si > 0) h += '<button class="kanban-arrow" onclick="moveProduct(\''+p.id+'\',-1)" title="Move to '+STAGE_LABELS[STAGES[si-1]]+'">\u2190 '+STAGE_LABELS[STAGES[si-1]]+'</button>';
      if (si < STAGES.length-1) h += '<button class="kanban-arrow" onclick="moveProduct(\''+p.id+'\',1)" title="Move to '+STAGE_LABELS[STAGES[si+1]]+'">'+STAGE_LABELS[STAGES[si+1]]+' \u2192</button>';
      h += '</div></div>';
    });
    h += '</div>';
  });
  h += '</div>';
  return h;
}

// Move product between stages — now updates stageChangedDate
function moveProduct(id, dir) {
  const p = D.etsy.products.find(x => x.id === id);
  if (!p) return;
  const ci = STAGES.indexOf(p.stage);
  const ni = ci + dir;
  if (ni < 0 || ni >= STAGES.length) return;
  p.stage = STAGES[ni];
  p.stageChangedDate = todayStr();
  save();
  toast('Moved to ' + STAGE_LABELS[p.stage] + ' \u2726');
  renderEtsy();
}

// ── LAUNCH PLANNER with month navigation
function launchReadiness(l) {
  // Calculate how ready a launch is based on checklist + linked product status
  var checklist = l.checklist || {};
  var done = 0;
  LAUNCH_PREP_CHECKLIST.forEach(function(_,i) { if (checklist[i]) done++; });
  var total = LAUNCH_PREP_CHECKLIST.length;
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  // Check linked product readiness
  var productReady = true;
  var productWarnings = [];
  if (l.productId) {
    var p = (D.etsy.products||[]).find(function(x){return x.id===l.productId});
    if (p) {
      var seo = seoHealth(p);
      if (seo.cls === 'seo-red') { productReady = false; productWarnings.push('SEO incomplete'); }
      if (!p.listingTitle) { productReady = false; productWarnings.push('No listing title'); }
      if ((p.photoCount||0) < 3) { productReady = false; productWarnings.push('Photos needed'); }
      if (p.stage !== 'listed' && p.stage !== 'design') { productWarnings.push('Still in '+STAGE_LABELS[p.stage]+' stage'); }
    }
  }
  var cls = pct >= 80 && productReady ? 'seo-green' : pct >= 40 ? 'seo-amber' : 'seo-red';
  var label = pct >= 80 && productReady ? 'Ready' : pct >= 40 ? 'In progress' : 'Not ready';
  return { done:done, total:total, pct:pct, cls:cls, label:label, productReady:productReady, productWarnings:productWarnings };
}

function renderEtsyPlanner() {
  let h = '';
  const monthLabel = new Date(plannerYear, plannerMonth, 1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});

  h += '<div class="sec-head">';
  h += '<div class="month-nav">';
  h += '<button class="month-arrow" onclick="changeMonth(-1)">\u2190</button>';
  h += '<button class="btn btn-xs btn-ghost" onclick="goToToday()" style="font-size:0.68rem">Today</button>';
  h += '<span class="sec-title" style="min-width:140px;text-align:center">Launch Planner \u2014 '+monthLabel+'</span>';
  h += '<button class="month-arrow" onclick="changeMonth(1)">\u2192</button>';
  h += '</div>';
  h += '<button class="btn btn-sm btn-cream" onclick="openAddLaunchModal()">+ Plan Launch</button></div>';

  // ── SEASONAL SUGGESTIONS (active prompts, not just reference)
  const curMonth = new Date().getMonth() + 1;
  const relevantSeasons = SEASONAL_EVENTS.filter(s => s.month === curMonth || s.month === (curMonth%12)+1 || s.month === ((curMonth+1)%12)+1);
  const launches = D.etsy.launches || [];
  if (relevantSeasons.length > 0) {
    h += '<div class="card" style="margin-bottom:1rem;padding:0.85rem 1.2rem;border-color:var(--surface1)">';
    h += '<div class="label" style="margin-bottom:0.4rem">Seasonal Opportunities</div>';
    relevantSeasons.forEach(function(s) {
      var weeksAway = Math.round(((s.month - curMonth + 12) % 12) * 4.3);
      if (weeksAway === 0) weeksAway = 'now';
      var hasLaunchForSeason = launches.some(function(l) {
        var lMonth = l.date ? parseInt(l.date.split('-')[1]) : 0;
        return lMonth === s.month;
      });
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.25rem 0">';
      h += '<div style="font-size:0.8rem">';
      h += '<span style="color:var(--peach)">\u2726 '+esc(s.label)+'</span>';
      h += ' <span style="color:var(--overlay1);font-size:0.72rem">\u2014 '+(weeksAway === 'now' ? 'this month' : '~'+weeksAway+' weeks away')+'</span>';
      h += '</div>';
      if (hasLaunchForSeason) {
        h += '<span class="chip chip-green" style="font-size:0.58rem">\u2713 Planned</span>';
      } else {
        var seasonYear = s.month >= curMonth ? new Date().getFullYear() : new Date().getFullYear() + 1;
        h += '<button class="btn btn-xs btn-ghost" style="font-size:0.68rem" onclick="openAddLaunchModal(null,\''+seasonYear+'-'+(s.month < 10 ? '0'+s.month : s.month)+'\')">+ Plan for this</button>';
      }
      h += '</div>';
    });
    h += '</div>';
  }

  // ── LAUNCH TIMELINE (horizontal overview)
  const allLaunches = [...launches].sort(function(a,b){return a.date.localeCompare(b.date)});
  const futureLaunches = allLaunches.filter(function(l){return daysUntil(l.date) >= 0});
  const pastLaunches = allLaunches.filter(function(l){return daysUntil(l.date) < 0});

  if (futureLaunches.length > 0) {
    h += '<div class="card" style="margin-bottom:1rem;padding:1rem 1.2rem">';
    h += '<div class="label" style="margin-bottom:0.6rem">Upcoming Launches</div>';
    futureLaunches.forEach(function(l) {
      var days = daysUntil(l.date);
      var readiness = launchReadiness(l);
      var linkedProduct = l.productId ? (D.etsy.products||[]).find(function(x){return x.id===l.productId}) : null;
      h += '<div style="padding:0.6rem 0;border-bottom:1px solid var(--surface0)">';
      // Top row: name, date, urgency
      h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.35rem">';
      h += '<div style="display:flex;align-items:center;gap:0.5rem">';
      h += '<span style="font-size:0.9rem;font-weight:600;color:var(--peach);cursor:pointer" onclick="openLaunchDetail(\''+l.id+'\')">'+esc(l.name)+'</span>';
      if (linkedProduct) h += '<span style="font-size:0.68rem;color:var(--overlay1);background:var(--surface0);padding:0.1rem 0.4rem;border-radius:999px">\ud83c\udff7 '+esc(linkedProduct.name)+'</span>';
      h += '</div>';
      h += '<div style="display:flex;align-items:center;gap:0.4rem">'+urgencyChip(days);
      h += '<button class="btn-xs btn-ghost" onclick="openLaunchDetail(\''+l.id+'\')" title="Edit">\u270e</button>';
      h += '<button class="btn-xs btn-ghost" onclick="deleteLaunch(\''+l.id+'\')">\u2715</button></div></div>';
      // Readiness bar
      h += '<div style="display:flex;align-items:center;gap:0.5rem">';
      h += '<div style="flex:1;height:6px;background:var(--surface1);border-radius:999px;overflow:hidden"><div style="height:100%;width:'+readiness.pct+'%;background:var(--'+readiness.cls.replace('seo-','')+');border-radius:999px;transition:width 0.4s ease"></div></div>';
      h += '<span style="font-size:0.68rem;color:var(--overlay1)">'+readiness.done+'/'+readiness.total+'</span>';
      h += '<span class="seo-dot '+readiness.cls+'" style="margin-left:0.1rem"></span>';
      h += '<span style="font-size:0.68rem;color:var(--overlay1)">'+readiness.label+'</span>';
      h += '</div>';
      // Product warnings
      if (readiness.productWarnings.length > 0) {
        h += '<div style="font-size:0.68rem;color:var(--yellow);margin-top:0.25rem">\u26a0 '+readiness.productWarnings.join(' \u00b7 ')+'</div>';
      }
      h += '</div>';
    });
    h += '</div>';
  }

  // ── CALENDAR GRID
  const firstDay = new Date(plannerYear, plannerMonth, 1);
  const startDay = firstDay.getDay() || 7;
  const daysInMonth = new Date(plannerYear, plannerMonth+1, 0).getDate();
  const uniDeadlines = getAllDeadlines();
  // Get listing renewals for this month
  const listedProducts = (D.etsy.products||[]).filter(function(p){return p.stage==='listed'});
  var renewalDates = {};
  listedProducts.forEach(function(p) {
    var exp = listingExpiry(p);
    if (exp && exp.nextExpiry) {
      var expMonth = parseInt(exp.nextExpiry.split('-')[1]);
      var expYear = parseInt(exp.nextExpiry.split('-')[0]);
      if (expMonth === plannerMonth+1 && expYear === plannerYear) {
        if (!renewalDates[exp.nextExpiry]) renewalDates[exp.nextExpiry] = [];
        renewalDates[exp.nextExpiry].push(p.name);
      }
    }
  });

  h += '<div class="card" style="margin-bottom:1rem"><div class="planner-grid">';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => { h += '<div class="planner-day-header">'+d+'</div>'; });
  for (let i = 1; i < startDay; i++) h += '<div class="planner-day other-month"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = plannerYear+'-'+String(plannerMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday = dateStr === todayStr();
    const hasLaunch = launches.some(l => l.date === dateStr);
    const hasDeadline = uniDeadlines.some(dl => dl.date === dateStr);
    const hasRenewal = renewalDates[dateStr] && renewalDates[dateStr].length > 0;
    const hasBoth = hasLaunch && hasDeadline;
    let cls = 'planner-day';
    if (isToday) cls += ' today';
    if (hasLaunch) cls += ' has-launch';
    if (hasDeadline) cls += ' has-deadline';
    if (hasBoth) cls += ' has-both';
    var dayTitle = fmtDate(dateStr);
    if (hasRenewal) dayTitle += ' \u00b7 Renewal: ' + renewalDates[dateStr].join(', ');
    h += '<div class="'+cls+'" onclick="openDayLaunches(\''+dateStr+'\')" title="'+esc(dayTitle)+'">'+d;
    if (hasLaunch) h += '<div class="planner-dot"></div>';
    if (hasDeadline) h += '<div class="planner-dot-deadline"></div>';
    if (hasRenewal) h += '<div class="planner-dot" style="background:var(--blue)"></div>';
    h += '</div>';
  }
  h += '</div></div>';

  // Renewal legend if any this month
  var renewalCount = Object.keys(renewalDates).length;
  if (renewalCount > 0) {
    h += '<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;font-size:0.72rem;color:var(--overlay1)">';
    h += '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--peach);margin-right:0.25rem"></span>Launch</span>';
    h += '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--lavender);margin-right:0.25rem"></span>Uni deadline</span>';
    h += '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--blue);margin-right:0.25rem"></span>Listing renewal ('+renewalCount+')</span>';
    h += '</div>';
  }

  // ── PAST LAUNCHES (performance history)
  if (pastLaunches.length > 0) {
    h += '<div class="div"></div>';
    h += '<div class="card" style="margin-bottom:1rem">';
    h += '<div class="sec-head"><span class="sec-title">Past Launches</span></div>';
    pastLaunches.slice().reverse().slice(0,8).forEach(function(l) {
      var linkedProduct = l.productId ? (D.etsy.products||[]).find(function(x){return x.id===l.productId}) : null;
      var daysSince = Math.abs(daysUntil(l.date));
      // Check for post-launch stats
      var postStats = l.postLaunchStats || null;
      h += '<div style="padding:0.45rem 0;border-bottom:1px solid var(--surface0);display:flex;align-items:center;justify-content:space-between">';
      h += '<div>';
      h += '<span style="font-size:0.85rem;color:var(--text)">'+esc(l.name)+'</span>';
      h += ' <span style="font-size:0.72rem;color:var(--overlay1)">\u00b7 '+fmtDateShort(l.date)+' ('+daysSince+'d ago)</span>';
      if (linkedProduct) h += ' <span style="font-size:0.68rem;color:var(--overlay0)">\u00b7 '+esc(linkedProduct.name)+'</span>';
      h += '</div>';
      h += '<div style="display:flex;align-items:center;gap:0.4rem">';
      if (postStats) {
        if (postStats.firstWeekSales > 0) h += '<span style="font-size:0.72rem;color:var(--green)">'+postStats.firstWeekSales+' sales</span>';
        if (postStats.firstWeekViews > 0) h += '<span style="font-size:0.72rem;color:var(--blue)">'+postStats.firstWeekViews+' views</span>';
      } else if (daysSince <= 14) {
        h += '<button class="btn btn-xs btn-ghost" style="font-size:0.65rem;color:var(--peach)" onclick="openPostLaunchModal(\''+l.id+'\')">+ Log first-week stats</button>';
      }
      h += '<button class="btn-xs btn-ghost" onclick="deleteLaunch(\''+l.id+'\')">\u2715</button>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  // ── SEASONAL REFERENCE (compact)
  h += '<div class="div"></div><div class="card">';
  h += '<div class="sec-head"><span class="sec-title">Peak Etsy Buying Seasons</span></div>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:0.35rem">';
  const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  SEASONAL_EVENTS.forEach(s => {
    const isCurrent = s.month === plannerMonth+1;
    h += '<span class="season-tag" style="'+(isCurrent?'background:rgba(245,169,127,.15);color:var(--peach)':'')+'">';
    h += monthNames[s.month]+': '+s.label+'</span>';
  });
  h += '</div></div>';
  return h;
}

function changeMonth(dir) {
  plannerMonth += dir;
  if (plannerMonth < 0) { plannerMonth = 11; plannerYear--; }
  if (plannerMonth > 11) { plannerMonth = 0; plannerYear++; }
  renderEtsy();
}

function goToToday() {
  resetPlannerMonth();
  renderEtsy();
  switchEtsyTab('planner');
}

// ── SALES & ADS
function renderEtsySales() {
  let h = '';
  h += '<div class="sec-head"><span class="sec-title">Sales & Promotions</span>';
  h += '<button class="btn btn-sm btn-cream" onclick="openAddSaleModal()">+ Plan Sale</button></div>';

  var allSales = (D.etsy.sales||[]).sort(function(a,b){return a.startDate.localeCompare(b.startDate)});
  var todayS = todayStr();
  var activeSales = allSales.filter(function(s){return s.startDate <= todayS && s.endDate >= todayS});
  var upcomingSales = allSales.filter(function(s){return s.startDate > todayS});
  var pastSales = allSales.filter(function(s){return s.endDate < todayS}).reverse();

  if (allSales.length === 0) {
    h += '<div class="card" style="margin-bottom:1rem"><p style="color:var(--overlay1);font-size:0.82rem">Plan upcoming sales and promotions here. Track coupon codes, link to products, and log results when they end.</p></div>';
  } else {
    // Active now
    if (activeSales.length > 0) {
      h += '<div class="card" style="margin-bottom:0.75rem;border-color:var(--green)">';
      h += '<div class="label" style="color:var(--green);margin-bottom:0.4rem">\u2022 Active Now</div>';
      activeSales.forEach(function(s) { h += renderSaleRow(s, 'active'); });
      h += '</div>';
    }
    // Upcoming
    if (upcomingSales.length > 0) {
      h += '<div class="card" style="margin-bottom:0.75rem">';
      h += '<div class="label" style="color:var(--peach);margin-bottom:0.4rem">Upcoming</div>';
      upcomingSales.forEach(function(s) { h += renderSaleRow(s, 'upcoming'); });
      h += '</div>';
    }
    // Past (collapsed, last 5)
    if (pastSales.length > 0) {
      h += '<div class="card" style="margin-bottom:0.75rem">';
      h += '<div class="label" style="color:var(--overlay0);margin-bottom:0.4rem">Past Sales</div>';
      pastSales.slice(0,5).forEach(function(s) { h += renderSaleRow(s, 'past'); });
      if (pastSales.length > 5) h += '<div style="font-size:0.72rem;color:var(--overlay0);padding:0.3rem 0">+ '+(pastSales.length-5)+' older sales</div>';
      h += '</div>';
    }
  }

  // Sale ideas prompt
  var curMonth = new Date().getMonth() + 1;
  var saleIdeas = [];
  if (curMonth >= 1 && curMonth <= 2) saleIdeas = ['New Year / Fresh Start sale','Valentine\u2019s Day bundle'];
  if (curMonth === 3) saleIdeas = ['Spring Equinox sale','International Women\u2019s Day promo'];
  if (curMonth === 4) saleIdeas = ['Easter/Spring sale','Earth Day eco-friendly promo'];
  if (curMonth === 5) saleIdeas = ['Mother\u2019s Day gift bundle','End of spring clearance'];
  if (curMonth === 6) saleIdeas = ['Father\u2019s Day bundle','Summer kickoff sale','Mid-year review sale'];
  if (curMonth >= 7 && curMonth <= 8) saleIdeas = ['Summer sale','Back to school prep'];
  if (curMonth === 9) saleIdeas = ['Back to school sale','Autumn reset bundle'];
  if (curMonth === 10) saleIdeas = ['Halloween themed sale','Q4 prep early bird'];
  if (curMonth === 11) saleIdeas = ['Black Friday / Cyber Monday','Small Business Saturday','Gift guide bundles'];
  if (curMonth === 12) saleIdeas = ['Christmas gift bundles','New Year planning sale','End of year clearance'];
  if (saleIdeas.length > 0) {
    h += '<div class="card" style="margin-bottom:1rem;padding:0.75rem 1rem;border-color:var(--surface1)">';
    h += '<div style="font-size:0.72rem;color:var(--overlay0);margin-bottom:0.3rem">\ud83d\udca1 Sale ideas for this month</div>';
    h += '<div style="display:flex;gap:0.3rem;flex-wrap:wrap">';
    saleIdeas.forEach(function(idea) {
      h += '<button class="btn btn-xs btn-ghost" style="font-size:0.68rem" onclick="openAddSaleModal(\''+esc(idea)+'\')">'+esc(idea)+'</button>';
    });
    h += '</div></div>';
  }

  h += '<div class="div"></div>';

  h += '<div class="div"></div>';
  h += '<div class="sec-head"><span class="sec-title">Etsy Ads Tracker</span>';
  h += '<button class="btn btn-sm btn-cream" onclick="openAddAdModal()">+ Log Ad Period</button></div>';
  h += '<div class="card" style="margin-bottom:1rem">';
  var ads = (D.etsy.ads||[]).sort(function(a,b){return b.week.localeCompare(a.week)});
  if (ads.length === 0) { h += '<p style="color:var(--overlay1);font-size:0.82rem">Track your Etsy ads spend, clicks, impressions, and returns here.</p>'; }
  else {
    var totalSpend = ads.reduce(function(s,a){return s+(a.spend||0)},0);
    var totalRev = ads.reduce(function(s,a){return s+(a.revenue||0)},0);
    var totalClicks = ads.reduce(function(s,a){return s+(a.clicks||0)},0);
    var totalImpressions = ads.reduce(function(s,a){return s+(a.impressions||0)},0);
    var roi = totalSpend > 0 ? ((totalRev-totalSpend)/totalSpend*100).toFixed(0) : 0;
    var avgCpc = totalClicks > 0 ? (totalSpend/totalClicks).toFixed(2) : '\u2014';
    var ctr = totalImpressions > 0 ? ((totalClicks/totalImpressions)*100).toFixed(1) : '\u2014';
    // Budget tracking
    var weeklyBudget = D.etsyAdBudget || 0;
    var lastWeekAd = ads[0];
    var lastSpend = lastWeekAd ? (lastWeekAd.spend||0) : 0;

    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:0.5rem;margin-bottom:0.75rem">';
    h += '<div class="card-inner" style="text-align:center"><div class="stat-num" style="font-size:1.1rem;color:var(--red)">\u00a3'+totalSpend.toFixed(2)+'</div><div class="stat-label">Total Spend</div></div>';
    h += '<div class="card-inner" style="text-align:center"><div class="stat-num" style="font-size:1.1rem;color:var(--green)">\u00a3'+totalRev.toFixed(2)+'</div><div class="stat-label">Ad Revenue</div></div>';
    h += '<div class="card-inner" style="text-align:center"><div class="stat-num" style="font-size:1.1rem;color:'+(roi>=0?'var(--green)':'var(--red)')+'">'+roi+'%</div><div class="stat-label">ROI</div></div>';
    h += '<div class="card-inner" style="text-align:center"><div class="stat-num" style="font-size:1.1rem;color:var(--blue)">'+ctr+'%</div><div class="stat-label">CTR</div></div>';
    h += '<div class="card-inner" style="text-align:center"><div class="stat-num" style="font-size:1.1rem;color:var(--lavender)">\u00a3'+avgCpc+'</div><div class="stat-label">Avg CPC</div></div>';
    h += '</div>';
    // Budget vs spend
    if (weeklyBudget > 0 && lastWeekAd) {
      var budgetPct = Math.min(100, (lastSpend/weeklyBudget)*100);
      h += '<div style="margin-bottom:0.75rem;font-size:0.75rem;color:var(--subtext0)">Last week: \u00a3'+lastSpend.toFixed(2)+' / \u00a3'+weeklyBudget.toFixed(2)+' budget';
      h += ' <span style="color:'+(budgetPct>100?'var(--red)':budgetPct>80?'var(--yellow)':'var(--green)')+'">('+(budgetPct).toFixed(0)+'%)</span></div>';
    }
    if (ads.length >= 2) h += '<div class="chart-box" style="margin-bottom:0.75rem"><canvas id="chart-ads" class="chart-canvas"></canvas></div>';
    // Ad entries table
    h += '<div style="overflow-x:auto">';
    h += '<table style="width:100%;border-collapse:collapse;font-size:0.78rem">';
    h += '<thead><tr style="border-bottom:2px solid var(--surface1);color:var(--overlay0);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.03em">';
    h += '<th style="padding:0.3rem;text-align:left">Period</th><th style="padding:0.3rem;text-align:right">Spend</th><th style="padding:0.3rem;text-align:right">Rev</th><th style="padding:0.3rem;text-align:right">Clicks</th><th style="padding:0.3rem;text-align:right">Impr</th><th style="padding:0.3rem;text-align:right">CTR</th><th style="padding:0.3rem;text-align:right">ROI</th><th></th>';
    h += '</tr></thead><tbody>';
    ads.slice(0,10).forEach(function(a) {
      var r = a.spend > 0 ? ((a.revenue-a.spend)/a.spend*100).toFixed(0) : '\u2014';
      var aCtr = (a.impressions||0) > 0 ? ((a.clicks||0)/(a.impressions)*100).toFixed(1)+'%' : '\u2014';
      h += '<tr style="border-bottom:1px solid var(--surface0)">';
      h += '<td style="padding:0.3rem;color:var(--overlay1)">'+fmtDateShort(a.week)+'</td>';
      h += '<td style="padding:0.3rem;text-align:right;color:var(--red)">\u00a3'+(a.spend||0).toFixed(2)+'</td>';
      h += '<td style="padding:0.3rem;text-align:right;color:var(--green)">\u00a3'+(a.revenue||0).toFixed(2)+'</td>';
      h += '<td style="padding:0.3rem;text-align:right;color:var(--blue)">'+(a.clicks||0)+'</td>';
      h += '<td style="padding:0.3rem;text-align:right;color:var(--overlay1)">'+(a.impressions||0)+'</td>';
      h += '<td style="padding:0.3rem;text-align:right">'+aCtr+'</td>';
      h += '<td style="padding:0.3rem;text-align:right;color:'+(r>=0?'var(--green)':'var(--red)')+'">'+r+'%</td>';
      h += '<td style="padding:0.3rem"><button class="btn-xs btn-ghost" onclick="deleteAd(\''+a.id+'\')">\u2715</button></td>';
      h += '</tr>';
      if (a.notes) h += '<tr><td colspan="8" style="padding:0.15rem 0.3rem 0.3rem;font-size:0.7rem;color:var(--overlay0)">'+esc(a.notes)+'</td></tr>';
    });
    h += '</tbody></table></div>';
  }
  h += '</div>';
  return h;
}

// ── REVIEWS
function renderEtsyReviews() {
  const reviews = D.etsy.reviews || [];
  const listed = (D.etsy.products||[]).filter(p => p.stage === 'listed');
  let h = '';
  h += '<div class="sec-head"><span class="sec-title">Customer Reviews</span>';
  h += '<button class="btn btn-sm btn-cream" onclick="openAddReviewModal()">+ Add Review</button></div>';
  h += '<p style="color:var(--subtext0);font-size:0.8rem;margin-bottom:1rem">Track your customer feedback and ratings here.</p>';

  if (reviews.length === 0) {
    h += '<div class="card" style="text-align:center;padding:2rem"><p style="color:var(--overlay1);font-size:0.88rem;margin-bottom:0.5rem">No reviews added yet</p>';
    h += '<p style="color:var(--overlay0);font-size:0.78rem">When you get a customer review on Etsy, add it here to track your ratings and feedback over time.</p></div>';
    return h;
  }

  // Summary stats
  const avgRating = reviews.reduce((s,r) => s+r.stars, 0) / reviews.length;
  const fiveStars = reviews.filter(r => r.stars === 5).length;
  h += '<div class="card" style="margin-bottom:1rem;padding:1rem 1.4rem">';
  h += '<div style="display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap">';
  h += '<div style="text-align:center"><div class="stat-num" style="color:var(--yellow)">' + avgRating.toFixed(1) + '</div>';
  h += '<div>' + renderStarsHtml(avgRating, '1.1rem') + '</div>';
  h += '<div class="stat-label">' + reviews.length + ' review' + (reviews.length!==1?'s':'') + '</div></div>';
  h += '<div style="flex:1;min-width:150px">';
  for (let s = 5; s >= 1; s--) {
    const count = reviews.filter(r => r.stars === s).length;
    const pct = reviews.length > 0 ? (count / reviews.length * 100) : 0;
    h += '<div style="display:flex;align-items:center;gap:0.4rem;font-size:0.72rem;color:var(--overlay1);margin:0.15rem 0">';
    h += '<span style="min-width:10px;text-align:right">' + s + '</span>';
    h += '<span style="color:var(--yellow);font-size:0.7rem">\u2605</span>';
    h += '<div style="flex:1;height:6px;background:var(--surface1);border-radius:999px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--yellow);border-radius:999px"></div></div>';
    h += '<span style="min-width:20px;text-align:right">' + count + '</span></div>';
  }
  h += '</div></div></div>';

  // Insights card
  if (reviews.length >= 3) {
    const reviewsByProduct = {};
    reviews.forEach(r => {
      if (r.productId) {
        if (!reviewsByProduct[r.productId]) reviewsByProduct[r.productId] = [];
        reviewsByProduct[r.productId].push(r);
      }
    });
    const productRankings = Object.entries(reviewsByProduct).map(([pid, revs]) => {
      const product = (D.etsy.products||[]).find(p => p.id === pid);
      return { name: product ? product.name : 'Unknown', avg: revs.reduce((s,r)=>s+r.stars,0)/revs.length, count: revs.length };
    }).sort((a,b) => b.avg - a.avg || b.count - a.count);
    const mostCommonRating = [1,2,3,4,5].reduce((best,s) => {
      const c = reviews.filter(r => r.stars === s).length;
      return c > best.count ? {star:s, count:c} : best;
    }, {star:5, count:0});

    h += '<div class="card" style="margin-bottom:1rem;padding:1rem 1.4rem;border-color:var(--yellow)">';
    h += '<div class="sec-title" style="color:var(--yellow);margin-bottom:0.5rem">Insights</div>';
    h += '<div style="font-size:0.82rem;color:var(--subtext1);line-height:1.7">';
    h += 'Your most common rating is <strong style="color:var(--yellow)">' + mostCommonRating.star + ' stars</strong> (' + mostCommonRating.count + ' reviews). ';
    if (productRankings.length > 0) {
      h += 'Your highest-rated product is <strong style="color:var(--peach)">' + esc(productRankings[0].name) + '</strong> with ' + productRankings[0].avg.toFixed(1) + ' avg from ' + productRankings[0].count + ' review' + (productRankings[0].count!==1?'s':'') + '. ';
    }
    if (productRankings.length > 1) {
      const mostReviewed = [...productRankings].sort((a,b) => b.count - a.count)[0];
      h += 'Most reviewed: <strong style="color:var(--peach)">' + esc(mostReviewed.name) + '</strong> (' + mostReviewed.count + ' reviews). ';
    }
    const recentTrend = reviews.slice(-5);
    const recentAvg = recentTrend.reduce((s,r) => s+r.stars, 0) / recentTrend.length;
    if (recentAvg > avgRating + 0.2) h += 'Your recent reviews are <span style="color:var(--green)">trending up</span> \u2191';
    else if (recentAvg < avgRating - 0.2) h += 'Your recent reviews are <span style="color:var(--red)">trending down</span> \u2193';
    else h += 'Your rating is <span style="color:var(--teal)">holding steady</span> \u2192';
    h += '</div></div>';
  }

  // Review cards
  const sortedReviews = [...reviews].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  sortedReviews.forEach(r => {
    const product = r.productId ? (D.etsy.products||[]).find(p => p.id === r.productId) : null;
    h += '<div class="review-card" style="margin-bottom:0.65rem">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center">';
    h += '<div>' + renderStarsHtml(r.stars) + '</div>';
    h += '<button class="btn-xs btn-ghost" onclick="deleteReview(\''+r.id+'\')">\u2715</button></div>';
    if (r.quote) h += '<div class="review-quote">\u201c' + esc(r.quote) + '\u201d</div>';
    h += '<div class="review-meta">';
    if (r.date) h += '<span>' + fmtDateShort(r.date) + '</span>';
    if (product) h += '<span style="color:var(--peach)">' + esc(product.name) + '</span>';
    if (r.customerName) h += '<span>' + esc(r.customerName) + '</span>';
    h += '</div></div>';
  });
  return h;
}

function openAddReviewModal() {
  const listed = (D.etsy.products||[]).filter(p => p.stage === 'listed');
  let productOpts = '<option value="">None / General</option>';
  listed.forEach(p => { productOpts += '<option value="'+p.id+'">'+esc(p.name)+'</option>'; });

  let starPickerHtml = '<div class="star-picker" id="m-review-stars">';
  for (let i = 1; i <= 5; i++) {
    starPickerHtml += '<span class="star" data-val="'+i+'" onclick="pickReviewStar('+i+')">\u2605</span>';
  }
  starPickerHtml += '</div>';

  openModal(`
    <h2 style="font-size:1.05rem;color:var(--cream);margin-bottom:1.25rem">Add Customer Review</h2>
    <div style="display:grid;gap:0.85rem">
      <div>
        <label class="form-label">Rating</label>
        ${starPickerHtml}
        <input type="hidden" id="m-review-rating" value="5">
      </div>
      <div><label class="form-label">Their Review / Quote</label><textarea class="form-textarea" id="m-review-quote" placeholder="Paste or type the customer's review text..."></textarea></div>
      <div class="grid-2">
        <div><label class="form-label">Product (optional)</label><select class="form-input" id="m-review-product">${productOpts}</select></div>
        <div><label class="form-label">Customer Name (optional)</label><input class="form-input" id="m-review-customer" placeholder="e.g. Sarah"></div>
      </div>
      <div><label class="form-label">Date</label><input class="form-input" type="date" id="m-review-date" value="${todayStr()}"></div>
    </div>
    <div class="grid-2" style="gap:0.75rem;margin-top:1.25rem">
      <button class="btn btn-cream" onclick="submitReview()">Add \u2726</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);
  // Default to 5 stars lit
  pickReviewStar(5);
}

function pickReviewStar(val) {
  document.getElementById('m-review-rating').value = val;
  document.querySelectorAll('#m-review-stars .star').forEach(s => {
    const isLit = parseInt(s.dataset.val) <= val;
    s.classList.toggle('lit', isLit);
    // Bounce animation on the selected star
    if (parseInt(s.dataset.val) === val) {
      s.classList.remove('pop');
      void s.offsetWidth; // force reflow
      s.classList.add('pop');
    }
  });
}

function submitReview() {
  const stars = parseInt(document.getElementById('m-review-rating').value) || 5;
  const quote = document.getElementById('m-review-quote').value.trim();
  const productId = document.getElementById('m-review-product').value || null;
  const customerName = document.getElementById('m-review-customer').value.trim();
  const date = document.getElementById('m-review-date').value || todayStr();
  if (!D.etsy.reviews) D.etsy.reviews = [];
  D.etsy.reviews.push({ id:uid(), stars, quote, productId, customerName, date });
  save(); closeModal(); toast('Review added \u2726'); renderPage(currentPage);
}

function deleteReview(id) {
  if (!D.etsy.reviews) return;
  D.etsy.reviews = D.etsy.reviews.filter(r => r.id !== id);
  save(); toast('Removed'); renderPage(currentPage);
}

// ── MY PRODUCTS (listed product catalogue)
let productStatusFilter = 'active';
function renderEtsyMyProducts() {
  const allListed = (D.etsy.products||[]).filter(p => p.stage === 'listed');
  const activeCount = allListed.filter(p => (p.status||'active') === 'active').length;
  const pausedCount = allListed.filter(p => p.status === 'paused').length;
  const retiredCount = allListed.filter(p => p.status === 'retired').length;
  // Filter by status
  const listed = productStatusFilter === 'all' ? allListed : allListed.filter(p => (p.status||'active') === productStatusFilter);
  let h = '';
  h += '<div class="sec-head"><span class="sec-title">My Products</span>';
  h += '<div style="display:flex;gap:0.4rem"><button class="btn btn-sm btn-cream" onclick="openBulkViewsModal()">Quick Stats</button>';
  h += '<button class="btn btn-sm btn-cream" onclick="openLogProductSaleModal()">+ Log Sale</button>';
  h += '<button class="btn btn-sm btn-cream" onclick="openAddListedProductModal()">+ Add Product</button></div></div>';
  // Status filter tabs
  h += '<div style="display:flex;gap:0.3rem;margin-bottom:0.75rem">';
  h += '<button class="btn btn-xs '+(productStatusFilter==='active'?'btn-cream':'btn-ghost')+'" onclick="productStatusFilter=\'active\';renderPage(currentPage)">Active ('+activeCount+')</button>';
  h += '<button class="btn btn-xs '+(productStatusFilter==='paused'?'btn-cream':'btn-ghost')+'" onclick="productStatusFilter=\'paused\';renderPage(currentPage)">\u23f8 Paused ('+pausedCount+')</button>';
  h += '<button class="btn btn-xs '+(productStatusFilter==='retired'?'btn-cream':'btn-ghost')+'" onclick="productStatusFilter=\'retired\';renderPage(currentPage)">\u23f9 Retired ('+retiredCount+')</button>';
  h += '<button class="btn btn-xs '+(productStatusFilter==='all'?'btn-cream':'btn-ghost')+'" onclick="productStatusFilter=\'all\';renderPage(currentPage)">All ('+allListed.length+')</button>';
  h += '</div>';

  // ── CATALOGUE HEALTH SUMMARY
  if (allListed.length > 0) {
    const activeListed = allListed.filter(p => (p.status||'active') === 'active');
    const seoScores = activeListed.map(p => seoHealth(p));
    const seoGood = seoScores.filter(s => s.cls === 'seo-green').length;
    const seoWarn = seoScores.filter(s => s.cls === 'seo-amber').length;
    const seoBad = seoScores.filter(s => s.cls === 'seo-red').length;
    const avgTagCount = activeListed.length > 0 ? (activeListed.reduce((s,p) => s + (Array.isArray(p.tags)?p.tags.length:0), 0) / activeListed.length).toFixed(1) : 0;
    const missingTitles = activeListed.filter(p => !p.listingTitle).length;
    const lowPhotos = activeListed.filter(p => (p.photoCount||0) < 7).length;
    const missingDesc = activeListed.filter(p => !p.description || p.description.length < 150).length;
    const noCompetitor = activeListed.filter(p => !p.competitorPriceRange).length;
    // Price distribution
    const priced = activeListed.filter(p => p.price != null && p.price > 0);
    const prices = priced.map(p => p.price).sort((a,b) => a-b);
    const minPrice = prices.length > 0 ? prices[0] : 0;
    const maxPrice = prices.length > 0 ? prices[prices.length-1] : 0;
    const avgPrice = prices.length > 0 ? (prices.reduce((s,v) => s+v, 0) / prices.length) : 0;
    // Category balance
    const catCounts = {};
    activeListed.forEach(p => { const c = p.category || 'Uncategorised'; catCounts[c] = (catCounts[c]||0) + 1; });
    const catEntries = Object.entries(catCounts).sort((a,b) => b[1] - a[1]);
    // Tag overlap analysis
    const tagUsage = {};
    activeListed.forEach(p => {
      (Array.isArray(p.tags)?p.tags:[]).forEach(t => {
        const tl = t.toLowerCase();
        tagUsage[tl] = (tagUsage[tl]||0) + 1;
      });
    });
    const sharedTags = Object.entries(tagUsage).filter(e => e[1] >= 3).sort((a,b) => b[1] - a[1]);
    const uniqueTags = Object.keys(tagUsage).length;
    // Listing age
    const staleListings = activeListed.filter(p => {
      const d = p.lastRefreshed || p.stageChangedDate || p.dateAdded || '';
      if (!d) return false;
      const days = Math.round((today().getTime() - new Date(d+'T00:00:00').getTime()) / 86400000);
      return days >= 90;
    });
    // Revenue reconciliation
    const productSales = D.etsy.productSales || [];
    const productSalesTotal = productSales.reduce((s,ps) => s + (ps.revenue||0), 0);
    const weeklyTotal = (D.etsy.weeklyStats||[]).reduce((s,w) => s + (w.revenue||0), 0);
    const unassigned = weeklyTotal - productSalesTotal;

    h += '<div class="card" style="margin-bottom:1rem;padding:1rem 1.2rem;border-color:var(--surface1)">';
    h += '<div class="label" style="margin-bottom:0.6rem">Catalogue Health</div>';
    // SEO row
    h += '<div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.5rem">';
    h += '<div style="font-size:0.78rem"><span class="seo-dot seo-green"></span> <strong>'+seoGood+'</strong> good</div>';
    h += '<div style="font-size:0.78rem"><span class="seo-dot seo-amber"></span> <strong>'+seoWarn+'</strong> needs work</div>';
    h += '<div style="font-size:0.78rem"><span class="seo-dot seo-red"></span> <strong>'+seoBad+'</strong> incomplete</div>';
    h += '<div style="font-size:0.78rem;color:var(--overlay1)">Avg tags: <strong>'+avgTagCount+'/13</strong></div>';
    h += '</div>';
    // Issues list
    var issues = [];
    if (missingTitles > 0) issues.push(missingTitles + ' missing listing title'+(missingTitles!==1?'s':''));
    if (missingDesc > 0) issues.push(missingDesc + ' with short/no description');
    if (lowPhotos > 0) issues.push(lowPhotos + ' with fewer than 7 photos');
    if (noCompetitor > 0) issues.push(noCompetitor + ' without competitor pricing');
    if (issues.length > 0) {
      h += '<div style="font-size:0.75rem;color:var(--yellow);margin-bottom:0.5rem">\u26a0 ' + issues.join(' \u00b7 ') + '</div>';
    }
    // Price distribution
    if (prices.length > 0) {
      h += '<div style="font-size:0.75rem;color:var(--subtext0);margin-bottom:0.3rem">Price range: \u00a3'+minPrice.toFixed(2)+' \u2013 \u00a3'+maxPrice.toFixed(2)+' (avg \u00a3'+avgPrice.toFixed(2)+')</div>';
    }
    // Category balance
    if (catEntries.length > 0) {
      h += '<div style="font-size:0.75rem;color:var(--subtext0);margin-bottom:0.3rem">Categories: ';
      h += catEntries.map(function(e){ return esc(e[0]) + ' (' + e[1] + ')'; }).join(' \u00b7 ');
      h += '</div>';
    }
    // Tag overlap
    if (sharedTags.length > 0) {
      h += '<div style="font-size:0.75rem;color:var(--subtext0);margin-bottom:0.3rem">'+uniqueTags+' unique tags \u00b7 Most shared: ';
      h += sharedTags.slice(0,5).map(function(e){ return '\u201c'+esc(e[0])+'\u201d (' + e[1] + 'x)'; }).join(', ');
      if (sharedTags.length > 3) h += ' <span style="color:var(--yellow)">\u2014 consider diversifying to avoid self-competition</span>';
      h += '</div>';
    }
    // Stale listings
    if (staleListings.length > 0) {
      h += '<div style="font-size:0.75rem;color:var(--peach);margin-bottom:0.3rem">\ud83d\udd04 '+staleListings.length+' listing'+(staleListings.length!==1?'s':'')+' not refreshed in 90+ days \u2014 consider updating titles/tags</div>';
    }
    // Revenue reconciliation
    if (weeklyTotal > 0 && productSalesTotal > 0 && Math.abs(unassigned) > 1) {
      if (unassigned > 0) {
        h += '<div style="font-size:0.75rem;color:var(--blue);margin-bottom:0.3rem">\ud83d\udcb0 \u00a3'+weeklyTotal.toFixed(2)+' total weekly revenue logged but only \u00a3'+productSalesTotal.toFixed(2)+' assigned to products \u2014 \u00a3'+unassigned.toFixed(2)+' unassigned</div>';
      }
    }
    h += '</div>';
  }

  if (listed.length > 0) {
    // Filter/Sort bar
    const categories = {}; listed.forEach(p => { const c = p.category || 'Uncategorised'; categories[c] = (categories[c]||0)+1; });
    h += '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:0.5rem;margin-bottom:1rem">';
    h += '<select class="form-input" style="width:auto;font-size:0.75rem;padding:0.3rem 0.6rem" onchange="productSort=this.value;renderPage(currentPage)">';
    h += '<option value="newest"'+(productSort==='newest'?' selected':'')+'>Newest first</option>';
    h += '<option value="oldest"'+(productSort==='oldest'?' selected':'')+'>Oldest first</option>';
    h += '<option value="price-high"'+(productSort==='price-high'?' selected':'')+'>Price: high → low</option>';
    h += '<option value="price-low"'+(productSort==='price-low'?' selected':'')+'>Price: low → high</option>';
    h += '<option value="seo"'+(productSort==='seo'?' selected':'')+'>SEO health</option>';
    h += '</select>';
    h += '<select class="form-input" style="width:auto;font-size:0.75rem;padding:0.3rem 0.6rem" onchange="productFilter=this.value;renderPage(currentPage)">';
    h += '<option value="all"'+(productFilter==='all'?' selected':'')+'>All categories</option>';
    Object.keys(categories).sort().forEach(cat => {
      h += '<option value="'+esc(cat)+'"'+(productFilter===cat?' selected':'')+'>'+esc(cat)+' ('+categories[cat]+')</option>';
    });
    h += '</select>';
    h += '<span style="font-size:0.72rem;color:var(--overlay1)">'+listed.length+' product'+(listed.length!==1?'s':'')+'</span>';
    h += '</div>';
  }

  if (listed.length === 0) {
    h += '<div class="empty-state card">'+emptyStateSvg('rocket');
    h += '<p>No listed products yet</p>';
    h += '<p class="empty-sub">Products that reach the "Listed" stage in your pipeline will appear here automatically, or add one directly.</p></div>';
  } else {
    // Apply filter and sort
    let filteredProducts = listed;
    if (productFilter !== 'all') filteredProducts = listed.filter(p => (p.category || 'Uncategorised') === productFilter);
    filteredProducts = [...filteredProducts].sort((a,b) => {
      if (productSort === 'newest') return (b.dateAdded||'').localeCompare(a.dateAdded||'');
      if (productSort === 'oldest') return (a.dateAdded||'').localeCompare(b.dateAdded||'');
      if (productSort === 'price-high') return ((b.price||0) - (a.price||0));
      if (productSort === 'price-low') return ((a.price||0) - (b.price||0));
      if (productSort === 'seo') return seoHealth(b).score - seoHealth(a).score;
      return 0;
    });

    // Product cards grid
    h += '<div class="grid-3" style="gap:0.75rem">';
    if (filteredProducts.length === 0) { h += '<p style="color:var(--overlay1);font-size:0.82rem;grid-column:1/-1">No products match this filter</p>'; }
    filteredProducts.forEach(p => {
      // Get reviews for this product
      const productReviews = (D.etsy.reviews||[]).filter(r => r.productId === p.id);
      const avgRating = productReviews.length > 0 ? (productReviews.reduce((s,r) => s+r.stars, 0) / productReviews.length) : 0;

      h += '<div class="product-card" onclick="openProductDetail(\''+p.id+'\')">';
      // Top row: category + badges
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      if (p.category) h += '<div class="product-category">' + esc(p.category) + '</div>'; else h += '<div></div>';
      h += '<div style="display:flex;gap:0.25rem">';
      if (p.status === 'paused') h += '<span class="chip chip-warn" style="font-size:0.58rem;padding:0.1rem 0.4rem">\u23f8 Paused</span>';
      if (p.status === 'retired') h += '<span class="chip" style="font-size:0.58rem;padding:0.1rem 0.4rem;background:rgba(110,115,141,.15);color:var(--overlay1)">\u23f9 Retired</span>';
      if (p.featured) h += '<span class="chip chip-peach" style="font-size:0.58rem;padding:0.1rem 0.4rem">\u2605 Featured</span>';
      if (p.inAds) h += '<span class="chip chip-blue" style="font-size:0.58rem;padding:0.1rem 0.4rem">Ads</span>';
      h += '</div></div>';
      h += '<div style="font-size:0.92rem;font-weight:600;color:var(--text);margin:0.25rem 0">' + esc(p.name) + '</div>';
      if (p.listingTitle) h += '<div style="font-size:0.72rem;color:var(--subtext0);margin-bottom:0.15rem;line-height:1.3" title="Listing title">' + esc(p.listingTitle.length > 60 ? p.listingTitle.slice(0,57)+'...' : p.listingTitle) + '</div>';
      if (p.price != null && p.price !== '') {
        const profitInfo = calcProfit(p.price);
        h += '<div style="display:flex;align-items:center;gap:0.5rem"><span class="product-price">\u00a3' + Number(p.price).toFixed(2) + '</span>';
        if (profitInfo) h += '<span style="font-size:0.68rem;color:var(--overlay1)">\u2192 \u00a3' + profitInfo.profit.toFixed(2) + ' profit</span>';
        h += '</div>';
      }
      // SEO health indicator
      const seo = seoHealth(p);
      h += '<div style="display:flex;align-items:center;gap:0.3rem;margin-top:0.2rem"><span class="seo-dot '+seo.cls+'"></span><span style="font-size:0.62rem;color:var(--overlay0)">SEO: '+seo.label+' ('+seo.score+'/'+seo.max+')</span></div>';
      if ((p.photoCount||0) > 0) h += '<div style="font-size:0.62rem;color:var(--overlay0);margin-top:0.1rem">\ud83d\udcf7 '+p.photoCount+'/10 photos</div>';
      // Favourites + view-to-fav ratio
      if ((p.productFavourites||0) > 0) {
        var favRatioCard = (p.productViews||0) > 0 ? ' ('+((p.productFavourites/p.productViews)*100).toFixed(1)+'% of views)' : '';
        h += '<div style="font-size:0.62rem;color:var(--pink);margin-top:0.1rem">\u2661 '+p.productFavourites+' favourites'+favRatioCard+'</div>';
      }
      // Star rating from reviews
      if (productReviews.length > 0) {
        h += '<div style="margin-top:0.3rem">' + renderStarsHtml(avgRating) + ' <span style="font-size:0.68rem;color:var(--overlay1)">(' + productReviews.length + ')</span></div>';
      }
      // Tags as pills
      const tags = Array.isArray(p.tags) ? p.tags : (p.tags ? p.tags.split(',').map(t=>t.trim()).filter(Boolean) : []);
      if (tags.length > 0) {
        h += '<div style="display:flex;flex-wrap:wrap;gap:0.2rem;margin-top:0.35rem">';
        tags.slice(0,4).forEach(t => { h += '<span style="font-size:0.62rem;background:rgba(245,169,127,.08);color:var(--peach);padding:0.08rem 0.35rem;border-radius:999px">'+esc(t)+'</span>'; });
        if (tags.length > 4) h += '<span style="font-size:0.62rem;color:var(--overlay0)">+' + (tags.length-4) + ' more</span>';
        h += '</div>';
      }
      h += '<div style="font-size:0.68rem;color:var(--overlay0);margin-top:0.3rem">Listed ' + timeAgo(p.stageChangedDate || p.dateAdded) + ' ago';
      if (p.lastRefreshed) h += ' \u00b7 Refreshed ' + timeAgo(p.lastRefreshed) + ' ago';
      h += '</div>';
      // Stale listing warning
      var refreshDate = p.lastRefreshed || p.stageChangedDate || p.dateAdded || '';
      if (refreshDate) {
        var daysSinceRefresh = Math.round((today().getTime() - new Date(refreshDate+'T00:00:00').getTime()) / 86400000);
        if (daysSinceRefresh >= 90) h += '<span class="chip chip-warn" style="font-size:0.58rem;margin-top:0.2rem">\ud83d\udd04 Not refreshed in '+daysSinceRefresh+'d</span>';
      }
      // Listing renewal expiry badge
      const expiry = listingExpiry(p);
      if (expiry) {
        if (expiry.daysLeft <= 0) h += '<span class="chip chip-urgent" style="font-size:0.58rem;margin-top:0.2rem">Expired — renew!</span>';
        else if (expiry.daysLeft <= 14) h += '<span class="chip chip-warn" style="font-size:0.58rem;margin-top:0.2rem">Renews in '+expiry.daysLeft+'d</span>';
      }
      h += '</div>';
    });
    h += '</div>';
  }

  // ── PRODUCT PERFORMANCE SECTION
  const productSales = D.etsy.productSales || [];
  if (listed.length > 0 && productSales.length > 0) {
    // Aggregate sales per product
    const salesByProduct = {};
    const revByProduct = {};
    productSales.forEach(function(s) {
      salesByProduct[s.productId] = (salesByProduct[s.productId]||0) + (s.quantity||1);
      revByProduct[s.productId] = (revByProduct[s.productId]||0) + (s.revenue||0);
    });

    // Build ranked product list
    const ranked = listed.map(function(p) {
      return { id:p.id, name:p.name, sales:salesByProduct[p.id]||0, revenue:revByProduct[p.id]||0, views:p.productViews||0 };
    }).sort(function(a,b) { return b.sales - a.sales; });

    h += '<div class="div" style="margin:1.5rem 0"></div>';
    h += '<div class="sec-head"><span class="sec-title">Product Performance</span></div>';

    // Bar chart: sales by product
    h += '<div class="card" style="margin-bottom:1rem;padding:1rem 1.2rem">';
    h += '<div class="label" style="margin-bottom:0.75rem">Sales by Product</div>';
    const maxSales = Math.max.apply(null, ranked.map(function(r){return r.sales})) || 1;
    ranked.forEach(function(r) {
      const pct = (r.sales / maxSales * 100).toFixed(0);
      const conv = r.views > 0 ? ((r.sales / r.views) * 100).toFixed(1) : null;
      h += '<div style="margin-bottom:0.5rem">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.2rem">';
      h += '<span style="font-size:0.78rem;color:var(--text)">' + esc(r.name) + '</span>';
      h += '<span style="font-size:0.72rem;color:var(--overlay1)">' + r.sales + ' sale'+(r.sales!==1?'s':'')+' \u00b7 \u00a3' + r.revenue.toFixed(2);
      if (conv !== null) h += ' \u00b7 ' + conv + '% conv';
      h += '</span></div>';
      h += '<div style="height:8px;background:var(--surface1);border-radius:999px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--green);border-radius:999px;transition:width 0.6s ease"></div></div>';
      h += '</div>';
    });
    h += '</div>';

    // Revenue donut chart (SVG)
    const totalRev = ranked.reduce(function(s,r){return s+r.revenue},0);
    if (totalRev > 0) {
      h += '<div class="card" style="margin-bottom:1rem;padding:1rem 1.2rem">';
      h += '<div class="label" style="margin-bottom:0.75rem">Revenue Breakdown</div>';
      h += '<div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap">';
      // SVG donut
      const donutColors = ['var(--green)','var(--blue)','var(--peach)','var(--mauve)','var(--yellow)','var(--teal)','var(--red)','var(--pink)','var(--flamingo)','var(--sky)'];
      h += '<svg viewBox="0 0 120 120" width="140" height="140" style="flex-shrink:0">';
      var startAngle = -90;
      ranked.filter(function(r){return r.revenue>0}).forEach(function(r, i) {
        var slicePct = r.revenue / totalRev;
        var angle = slicePct * 360;
        var endAngle = startAngle + angle;
        var largeArc = angle > 180 ? 1 : 0;
        var x1 = 60 + 45 * Math.cos(startAngle * Math.PI / 180);
        var y1 = 60 + 45 * Math.sin(startAngle * Math.PI / 180);
        var x2 = 60 + 45 * Math.cos(endAngle * Math.PI / 180);
        var y2 = 60 + 45 * Math.sin(endAngle * Math.PI / 180);
        if (angle >= 359.9) {
          h += '<circle cx="60" cy="60" r="45" fill="none" stroke="'+donutColors[i%donutColors.length]+'" stroke-width="18"/>';
        } else {
          h += '<path d="M '+x1+' '+y1+' A 45 45 0 '+largeArc+' 1 '+x2+' '+y2+'" fill="none" stroke="'+donutColors[i%donutColors.length]+'" stroke-width="18"/>';
        }
        startAngle = endAngle;
      });
      h += '<text x="60" y="56" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="600">\u00a3'+totalRev.toFixed(0)+'</text>';
      h += '<text x="60" y="70" text-anchor="middle" fill="var(--overlay1)" font-size="8">total</text>';
      h += '</svg>';
      // Legend
      h += '<div style="flex:1;min-width:120px">';
      ranked.filter(function(r){return r.revenue>0}).forEach(function(r, i) {
        var pct = (r.revenue / totalRev * 100).toFixed(0);
        h += '<div style="display:flex;align-items:center;gap:0.4rem;margin:0.2rem 0;font-size:0.75rem">';
        h += '<div style="width:10px;height:10px;border-radius:2px;background:'+donutColors[i%donutColors.length]+';flex-shrink:0"></div>';
        h += '<span style="color:var(--text)">'+esc(r.name)+'</span>';
        h += '<span style="color:var(--overlay1);margin-left:auto">\u00a3'+r.revenue.toFixed(2)+' ('+pct+'%)</span>';
        h += '</div>';
      });
      h += '</div></div></div>';
    }

    // ── TREND INTERPRETATION
    h += '<div class="card" style="margin-bottom:1rem;padding:1rem 1.2rem">';
    h += '<div class="label" style="margin-bottom:0.5rem">Insights & Suggestions</div>';
    // Best seller
    if (ranked[0] && ranked[0].sales > 0) {
      h += '<div style="font-size:0.82rem;color:var(--green);padding:0.2rem 0">\u2605 Best seller: <strong>'+esc(ranked[0].name)+'</strong> ('+ranked[0].sales+' sales, \u00a3'+ranked[0].revenue.toFixed(2)+')</div>';
    }
    // Products with views but no sales (high views, low conversion)
    ranked.forEach(function(r) {
      if (r.views >= 20 && r.sales === 0) {
        h += '<div style="font-size:0.82rem;color:var(--yellow);padding:0.2rem 0">\u26a0 <strong>'+esc(r.name)+'</strong> has '+r.views+' views but 0 sales \u2014 review pricing, photos, or first paragraph of description</div>';
      } else if (r.views >= 20 && r.sales > 0 && (r.sales/r.views) < 0.02) {
        h += '<div style="font-size:0.82rem;color:var(--yellow);padding:0.2rem 0">\u26a0 <strong>'+esc(r.name)+'</strong> has low conversion ('+((r.sales/r.views)*100).toFixed(1)+'%) \u2014 consider improving listing photos or tweaking price</div>';
      }
    });
    // Products with no views and no sales
    var zeroProducts = ranked.filter(function(r){return r.views===0 && r.sales===0});
    if (zeroProducts.length > 0 && ranked.length > zeroProducts.length) {
      h += '<div style="font-size:0.82rem;color:var(--overlay1);padding:0.2rem 0">\ud83d\udca1 '+zeroProducts.length+' product'+(zeroProducts.length!==1?'s have':' has')+' no tracked views or sales yet \u2014 log views from your Etsy stats to unlock conversion insights</div>';
    }
    // Revenue concentration
    if (ranked.length >= 3 && totalRev > 0 && ranked[0].revenue / totalRev > 0.6) {
      h += '<div style="font-size:0.82rem;color:var(--peach);padding:0.2rem 0">\ud83d\udca1 '+((ranked[0].revenue/totalRev)*100).toFixed(0)+'% of revenue comes from <strong>'+esc(ranked[0].name)+'</strong> \u2014 consider diversifying to reduce risk</div>';
    }
    h += '</div>';
  }

  return h;
}
