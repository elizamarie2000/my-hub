<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Projects">
  <meta name="theme-color" content="#24273a">
  <title>projects ✦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    /* ── Catppuccin Macchiato ──────────────────────────── */
    :root {
      --base:      #24273a;
      --mantle:    #1e2030;
      --crust:     #181926;
      --surface0:  #363a4f;
      --surface1:  #494d64;
      --surface2:  #5b6078;
      --overlay0:  #6e738d;
      --overlay1:  #8087a2;
      --overlay2:  #939ab7;
      --subtext0:  #a5adcb;
      --subtext1:  #b8c0e0;
      --text:      #cad3f5;
      --lavender:  #b7bdf8;
      --blue:      #8aadf4;
      --sapphire:  #7dc4e4;
      --sky:       #91d7e3;
      --teal:      #8bd5ca;
      --cream:     #e8dcc8;
      --yellow:    #eed49f;
      --peach:     #f5a97f;
      --maroon:    #ee99a0;
      --red:       #ed8796;
      --mauve:     #c6a0f6;
      --pink:      #f5bde6;
      --flamingo:  #f0c6c6;
      --rosewater: #f4dbd6;
      --green:     #a6da95;

      --font: 'Lora', Georgia, 'Times New Roman', serif;
      --r:    12px;
      --r-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      width: 100%;
      height: 100%;
    }

    body {
      background: var(--base);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      font-size: 15px;
      width: 100%;
      overflow-x: hidden;
      padding: 0;
      margin: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(rgba(202,211,245,0.032) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    main, nav { position: relative; z-index: 1; }

    /* ── Disable all scrollbars on mobile ── */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ── Top Header (slim) ── */
    .mobile-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--mantle);
      border-bottom: 1px solid var(--surface0);
      padding: max(0.75rem, env(safe-area-inset-top)) 1rem 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: auto;
    }

    .mobile-header-brand {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.03em;
    }

    .mobile-header-brand svg {
      width: 16px;
      height: 16px;
    }

    /* ── Bottom Tab Bar ── */
    .bottom-tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 101;
      background: rgba(30,32,48,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      padding: 0;
      padding-bottom: max(34px, env(safe-area-inset-bottom));
      min-height: calc(70px + max(34px, env(safe-area-inset-bottom)));
    }

    .bottom-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.5rem 0.35rem;
      background: none;
      border: none;
      color: var(--subtext0);
      font-family: var(--font);
      font-size: 0.7rem;
      cursor: pointer;
      min-height: 70px;
      transition: all 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .bottom-tab:active {
      transform: scale(0.97);
      opacity: 0.8;
    }

    .bottom-tab.active {
      color: var(--cream);
    }

    [data-page="dashboard"].bottom-tab.active {
      color: var(--cream);
    }

    [data-page="uni"].bottom-tab.active {
      color: var(--lavender);
    }

    [data-page="etsy"].bottom-tab.active {
      color: var(--peach);
    }

    .bottom-tab-icon {
      font-size: 1.3rem;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bottom-tab-label {
      font-size: 0.65rem;
      text-transform: capitalize;
      letter-spacing: 0.02em;
      font-weight: 500;
      white-space: nowrap;
    }

    .sub-nav {
      display: flex;
      gap: 0.15rem;
      padding: 0.6rem 0 0.2rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--surface0);
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .sub-nav::-webkit-scrollbar { display: none; }

    .sub-tab {
      background: none;
      border: none;
      color: var(--subtext0);
      font-family: var(--font);
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      border-radius: var(--r-sm);
      transition: all 0.15s;
      white-space: nowrap;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
    }

    .sub-tab:active {
      transform: scale(0.97);
      opacity: 0.8;
    }

    .sub-tab.active {
      color: var(--peach);
      background: rgba(245,169,127,.1);
    }

    .page { display: none; }
    .page.active { display: block; animation: pageIn 0.22s cubic-bezier(0.4, 0, 0.2, 1) both; }
    @keyframes pageIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Fixed: Etsy sub-pages ── */
    .etsy-sub-page { display: none; }
    .etsy-sub-page.active { display: block; animation: pageIn 0.22s cubic-bezier(0.4, 0, 0.2, 1) both; }

    .content {
      max-width: 100%;
      margin: 0;
      padding: 1.5rem 1.25rem;
      padding-bottom: calc(110px + max(34px, env(safe-area-inset-bottom)));
    }

    .card {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: var(--r);
      padding: 1.25rem 1.4rem;
      transition: border-color 0.15s ease;
      margin-bottom: 1rem;
    }

    .card:active {
      transform: scale(0.97);
      opacity: 0.95;
    }

    .card-inner {
      background: var(--surface0);
      border-radius: var(--r-sm);
      padding: 0.75rem 1rem;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--overlay1);
      font-weight: 500;
    }

    .sec-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.65rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .sec-title {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--overlay1);
      font-weight: 500;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .grid-5 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.7rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .chip-urgent  { background: rgba(237,135,150,.15); color: var(--red); }
    .chip-warn    { background: rgba(238,212,159,.15); color: var(--yellow); }
    .chip-ok      { background: rgba(139,213,202,.15); color: var(--teal); }
    .chip-dim     { background: var(--surface0); color: var(--overlay1); }
    .chip-mauve   { background: rgba(198,160,246,.12); color: var(--mauve); }
    .chip-blue    { background: rgba(138,173,244,.12); color: var(--blue); }
    .chip-peach   { background: rgba(245,169,127,.12); color: var(--peach); }
    .chip-lavender { background: rgba(183,189,248,.12); color: var(--lavender); }
    .chip-green   { background: rgba(166,218,149,.12); color: var(--green); }

    .btn {
      background: var(--surface0);
      color: var(--text);
      border: 1px solid var(--surface1);
      font-family: var(--font);
      font-size: 0.875rem;
      padding: 0.7rem 1.3rem;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn:active {
      transform: scale(0.97);
      opacity: 0.8;
    }

    .btn-cream {
      background: var(--cream);
      color: var(--crust);
      border-color: var(--cream);
      font-weight: 600;
    }

    .btn-cream:active {
      background: #ddd0b8;
      border-color: #ddd0b8;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--surface1);
    }

    .btn-ghost:active {
      background: var(--surface0);
    }

    .btn-sm {
      font-size: 0.75rem;
      padding: 0.5rem 0.7rem;
      min-height: 36px;
    }

    .btn-xs {
      font-size: 0.68rem;
      padding: 0.35rem 0.5rem;
      min-height: 32px;
    }

    .progress-track {
      background: var(--surface1);
      border-radius: 999px;
      height: 7px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-input, .form-textarea {
      background: var(--surface0);
      border: 1px solid var(--surface1);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      padding: 0.75rem 0.75rem;
      border-radius: var(--r-sm);
      width: 100%;
      transition: border-color 0.15s;
      min-height: 44px;
      -webkit-appearance: none;
      -webkit-border-radius: var(--r-sm);
    }

    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--cream);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.55;
    }

    .form-textarea.desc-large {
      min-height: 160px;
    }

    .form-label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--overlay1);
      margin-bottom: 0.35rem;
    }

    /* ── Modal: Bottom sheet style ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(24,25,38,.88);
      z-index: 500;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal-box {
      background: var(--mantle);
      border: 1px solid var(--surface1);
      border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.5rem;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ── Toast: Above bottom tab bar ── */
    .toast {
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--surface1);
      color: var(--text);
      border: 1px solid var(--surface2);
      padding: 0.8rem 1.4rem;
      border-radius: 999px;
      font-size: 0.875rem;
      transition: transform 0.3s ease, opacity 0.2s ease;
      z-index: 600;
      white-space: nowrap;
      max-width: calc(100% - 2rem);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      visibility: visible;
    }

    /* ── Kanban as collapsible accordion on mobile ── */
    .kanban-board {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: auto;
    }

    .kanban-col {
      background: var(--surface0);
      border-radius: var(--r);
      padding: 0;
      min-height: auto;
      border: 1px solid var(--surface1);
      overflow: hidden;
    }

    .kanban-col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: var(--surface1);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      min-height: 44px;
    }

    .kanban-col-header:active {
      transform: scale(0.97);
      opacity: 0.8;
    }

    .kanban-col-title {
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .kanban-col-toggle {
      font-size: 1.2rem;
      transition: transform 0.2s;
    }

    .kanban-col.collapsed .kanban-col-toggle {
      transform: rotate(-90deg);
    }

    .kanban-col-content {
      padding: 0.75rem;
      max-height: 500px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .kanban-col.collapsed .kanban-col-content {
      display: none;
    }

    .kanban-card {
      background: var(--mantle);
      border: 1px solid var(--surface1);
      border-radius: var(--r-sm);
      padding: 0.75rem 0.85rem;
      margin-bottom: 0.6rem;
      transition: all 0.15s;
    }

    .kanban-card:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .kanban-card.stalled {
      border-color: var(--yellow);
    }

    .kanban-card-title {
      font-size: 0.82rem;
      color: var(--text);
      margin-bottom: 0.4rem;
      cursor: pointer;
    }

    .kanban-card-meta {
      font-size: 0.68rem;
      color: var(--overlay1);
      margin-bottom: 0.3rem;
    }

    .kanban-move {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.5rem;
      flex-direction: column;
    }

    .kanban-arrow {
      background: var(--surface0);
      border: 1px solid var(--surface1);
      color: var(--text);
      padding: 0.4rem 0.6rem;
      border-radius: var(--r-sm);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
      font-family: var(--font);
    }

    .kanban-arrow:active {
      transform: scale(0.97);
      opacity: 0.8;
    }

    .kanban-time {
      font-size: 0.62rem;
      color: var(--overlay0);
      margin-top: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .kanban-time.warn {
      color: var(--yellow);
    }

    .quick-actions {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .quick-btn {
      background: var(--surface0);
      color: var(--text);
      border: 1px solid var(--surface1);
      font-family: var(--font);
      font-size: 0.875rem;
      padding: 0.75rem 1.2rem;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
    }

    .quick-btn:active {
      transform: scale(0.97);
      opacity: 0.8;
    }

    .timeline-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--surface0);
    }

    .timeline-item:last-child {
      border-bottom: none;
    }

    .timeline-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--peach);
      margin-top: 0.3rem;
      flex-shrink: 0;
    }

    .planner-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .planner-cell {
      aspect-ratio: 1;
      border-radius: var(--r-sm);
      background: var(--surface0);
      border: 1px solid var(--surface1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      cursor: pointer;
      position: relative;
      min-height: 44px;
      transition: all 0.15s;
    }

    .planner-cell:active {
      transform: scale(0.97);
      opacity: 0.8;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      justify-content: space-between;
    }

    .month-nav button {
      background: var(--surface0);
      border: 1px solid var(--surface1);
      color: var(--text);
      padding: 0.5rem 0.7rem;
      border-radius: var(--r-sm);
      cursor: pointer;
      font-family: var(--font);
      min-height: 36px;
      transition: all 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .month-nav button:active {
      transform: scale(0.97);
      opacity: 0.8;
    }

    .log-entry {
      display: flex;
      gap: 0.5rem;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--surface0);
      font-size: 0.78rem;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .settings-section {
      margin-bottom: 2rem;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--surface0);
      min-height: 44px;
    }

    .settings-row:last-child {
      border-bottom: none;
    }

    .planner-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--peach);
      position: absolute;
      bottom: 4px;
      left: calc(50% - 1px);
    }

    .planner-dot-deadline {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--lavender);
      position: absolute;
      bottom: 4px;
      left: calc(50% - 1px);
    }

    .content-entry {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--surface0);
      min-height: 44px;
    }

    .content-entry:last-child {
      border-bottom: none;
    }

    .content-entry button {
      background: none;
      border: none;
      color: var(--overlay0);
      cursor: pointer;
      padding: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      min-height: 36px;
      min-width: 36px;
    }

    .content-entry button:active {
      transform: scale(0.95);
      opacity: 0.8;
    }

    input[type="text"].editable,
    input[type="email"].editable,
    input[type="number"].editable,
    textarea.editable {
      background: var(--surface0);
      border: 1px solid var(--surface1);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      padding: 0.75rem;
      border-radius: var(--r-sm);
      width: 100%;
      transition: border-color 0.15s;
      min-height: 44px;
      -webkit-appearance: none;
      -webkit-border-radius: var(--r-sm);
    }

    input[type="text"].editable:focus,
    input[type="email"].editable:focus,
    input[type="number"].editable:focus,
    textarea.editable:focus {
      outline: none;
      border-color: var(--cream);
    }

    .stat-tooltip {
      position: relative;
      cursor: help;
      border-bottom: 1px dashed var(--overlay1);
    }

    .stat-tooltip .tip-content {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface1);
      border: 1px solid var(--surface2);
      border-radius: var(--r-sm);
      padding: 0.5rem 0.7rem;
      font-size: 0.7rem;
      color: var(--subtext1);
      white-space: nowrap;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .fab {

function deepMerge(target, source) {
  for (const key of Object.keys(source)) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
      if (!target[key]) target[key] = {};
      deepMerge(target[key], source[key]);
    } else { target[key] = source[key]; }

function navigate(page) {
  const prev = document.querySelector('.page.active');
  currentPage = page;
  document.querySelectorAll('.bottom-tab, .nav-gear').forEach(t => t.classList.toggle('active', t.dataset.page === page));
  if (prev && prev.id !== 'page-'+page) {
    prev.classList.add('exiting');
    setTimeout(() => {
      document.querySelectorAll('.page').forEach(p => { p.classList.remove('active','exiting'); });
      const el = document.getElementById('page-' + page);
      if (el) el.classList.add('active');
      requestAnimationFrame(() => { renderPage(page); animateProgressBars(); });
    }, 150);
  } else {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const el = document.getElementById('page-' + page);
    if (el) el.classList.add('active');
    requestAnimationFrame(() => { renderPage(page); animateProgressBars(); });
  }
}

function today() { return new Date(); }
function todayStr() { return isoDate(today()); }
function isoDate(d) { return d.toISOString().slice(0,10); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function daysUntil(dateStr) {
  const now = today(); now.setHours(0,0,0,0);
  return Math.round((new Date(dateStr + 'T00:00:00') - now) / 86400000);
}
function fmtDate(dateStr) { return new Date(dateStr+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDateShort(dateStr) { return new Date(dateStr+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const now = today(); now.setHours(0,0,0,0);
  const days = Math.round((now - new Date(dateStr+'T00:00:00')) / 86400000);
  if (days <= 0) return 'today';
  if (days === 1) return '1d';
  if (days < 7) return days + 'd';
  if (days < 30) return Math.floor(days/7) + 'w';
  return Math.floor(days/30) + 'mo';
}

function urgencyColor(days) {
  if (days < 0) return 'var(--overlay1)';
  if (days <= 3) return 'var(--red)';
  if (days <= 7) return 'var(--yellow)';
  if (days <= 14) return 'var(--peach)';
  return 'var(--teal)';
}
function urgencyChip(days) {
  if (days < 0)  return '<span class="chip chip-dim">Past</span>';
  if (days === 0) return '<span class="chip chip-urgent">Today!</span>';
  if (days <= 3)  return '<span class="chip chip-urgent">'+days+'d left</span>';
  if (days <= 7)  return '<span class="chip chip-warn">'+days+'d left</span>';
  if (days <= 14) return '<span class="chip chip-peach">'+days+'d left</span>';
  return '<span class="chip chip-ok">'+days+'d left</span>';
}
function scoreClass(s) { return s >= 85 ? 'score-dist' : s >= 70 ? 'score-merit' : s >= 55 ? 'score-pass3' : s >= 40 ? 'score-pass4' : 'score-fail'; }
function scoreColor(s) { return s >= 85 ? 'var(--green)' : s >= 70 ? 'var(--blue)' : s >= 55 ? 'var(--yellow)' : s >= 40 ? 'var(--peach)' : 'var(--red)'; }
function scoreLabel(s) { return s >= 85 ? 'Distinction' : s >= 70 ? 'Merit' : s >= 55 ? 'Pass 3' : s >= 40 ? 'Pass 4' : 'Fail'; }

function seoHealth(p) {
  let score = 0, max = 14;
  const tips = [];
  const tags = Array.isArray(p.tags) ? p.tags : [];
  const title = p.listingTitle || '';
  const desc = p.description || '';

  // ── TITLE ANALYSIS (0-3 pts)
  if (title.length === 0) {
    tips.push({type:'bad', text:'No listing title \u2014 add one with keywords upfront'});
  } else {
    if (title.length >= 100 && title.length <= 140) { score += 1; tips.push({type:'good', text:'Title length (' + title.length + ' chars) is in the sweet spot'}); }
    else if (title.length > 0 && title.length < 80) { tips.push({type:'warn', text:'Title is short (' + title.length + ' chars) \u2014 aim for 100\u2013130 for max visibility'}); }
    else if (title.length > 140) { tips.push({type:'warn', text:'Title is long (' + title.length + ' chars) \u2014 Etsy may truncate after ~140'}); score += 0.5; }
    else { score += 0.5; }
    // Keyword front-loading: check if first word is a common filler
    const fillers = ['the','a','an','my','our','this','cute','beautiful','lovely','nice','great','best','amazing','awesome','perfect'];
    const firstWord = title.split(/[\s|,\-]+/)[0].toLowerCase();
    if (fillers.includes(firstWord)) { tips.push({type:'warn', text:'Title starts with "' + firstWord + '" \u2014 lead with a keyword instead'}); }
    else { score += 1; tips.push({type:'good', text:'Title leads with a keyword \u2014 great for search'}); }
    // Check keyword overlap with tags
    const titleWords = title.toLowerCase().split(/[\s|,\-\u2013\u2014]+/).filter(w => w.length > 2);
    const tagWords = tags.map(t => t.toLowerCase());
    const overlap = tagWords.filter(t => titleWords.some(tw => t.includes(tw) || tw.includes(t)));
    if (overlap.length >= 2) { score += 1; tips.push({type:'good', text:'Title keywords match ' + overlap.length + ' of your tags'}); }
    else if (overlap.length === 1) { score += 0.5; tips.push({type:'warn', text:'Only 1 tag matches your title \u2014 try aligning more'}); }
    else if (tags.length > 0) { tips.push({type:'bad', text:'No tag keywords found in title \u2014 align them for better ranking'}); }
  }

  // ── DESCRIPTION ANALYSIS (0-3 pts)
  if (desc.length === 0) {
    tips.push({type:'bad', text:'No listing description \u2014 Etsy needs this for search ranking'});
  } else {
    if (desc.length >= 300) { score += 1; tips.push({type:'good', text:'Description is ' + desc.length + ' chars \u2014 good detail'}); }
    else if (desc.length >= 150) { score += 0.5; tips.push({type:'warn', text:'Description is ' + desc.length + ' chars \u2014 aim for 300+ for best results'}); }
    else { tips.push({type:'bad', text:'Description is very short (' + desc.length + ' chars) \u2014 expand with features and benefits'}); }
    // Check keyword consistency with tags
    const descLower = desc.toLowerCase();
    const tagsInDesc = tags.filter(t => descLower.includes(t.toLowerCase()));
    if (tagsInDesc.length >= 3) { score += 1; tips.push({type:'good', text: tagsInDesc.length + ' tags appear in your description'}); }
    else if (tagsInDesc.length >= 1) { score += 0.5; tips.push({type:'warn', text:'Only ' + tagsInDesc.length + ' tag(s) found in description \u2014 weave in more keywords naturally'}); }
    else if (tags.length > 0) { tips.push({type:'bad', text:'None of your tags appear in the description \u2014 add keywords naturally'}); }
    // Paragraph structure (line breaks)
    const paragraphs = desc.split(/\n\s*\n/).length;
    if (paragraphs >= 2) { score += 1; tips.push({type:'good', text:'Well-structured with paragraphs'}); }
    else if (desc.length > 200) { tips.push({type:'warn', text:'Long text with no paragraphs \u2014 break it up for readability'}); }
  }

  // ── TAG ANALYSIS (0-4 pts)
  if (tags.length >= 13) { score += 2; tips.push({type:'good', text:'All 13 tags used \u2014 maximum coverage'}); }
  else if (tags.length >= 10) { score += 1.5; tips.push({type:'warn', text: tags.length + '/13 tags \u2014 fill all 13 slots for best reach'}); }
  else if (tags.length >= 5) { score += 1; tips.push({type:'warn', text: tags.length + '/13 tags \u2014 add more to improve discoverability'}); }
  else { tips.push({type:'bad', text:'Only ' + tags.length + ' tag(s) \u2014 Etsy gives you 13, use them all'}); }
  // Long-tail quality: multi-word tags
  const multiWord = tags.filter(t => t.trim().split(/\s+/).length >= 2);
  if (tags.length > 0) {
    if (multiWord.length >= Math.ceil(tags.length * 0.6)) { score += 1; tips.push({type:'good', text: multiWord.length + '/' + tags.length + ' tags are multi-word (long-tail) \u2014 great for specificity'}); }
    else if (multiWord.length >= 2) { score += 0.5; tips.push({type:'warn', text:'Only ' + multiWord.length + ' multi-word tags \u2014 long-tail phrases convert better'}); }
    else { tips.push({type:'bad', text:'Most tags are single-word \u2014 use phrases like "weekly planner printable"'}); }
  }
  // Duplicate word overlap between tags
  const allTagWords = [];
  tags.forEach(t => t.toLowerCase().split(/\s+/).forEach(w => { if (w.length > 2) allTagWords.push(w); }));
  const wordCounts = {};
  allTagWords.forEach(w => { wordCounts[w] = (wordCounts[w]||0) + 1; });
  const overusedWords = Object.entries(wordCounts).filter(e => e[1] >= 4).map(e => e[0]);
  if (overusedWords.length > 0) { tips.push({type:'warn', text:'Word "' + overusedWords[0] + '" appears in ' + wordCounts[overusedWords[0]] + '+ tags \u2014 diversify for wider reach'}); }
  else if (tags.length >= 5) { score += 1; tips.push({type:'good', text:'Good tag diversity \u2014 no excessive word repetition'}); }

  // ── BASICS (0-4 pts)
  if (p.category) { score += 1; } else { tips.push({type:'warn', text:'Set a category for better filtering'}); }
  if (p.price != null && p.price !== '') { score += 1; } else { tips.push({type:'warn', text:'Set a price'}); }
  if ((p.photoCount||0) >= 7) { score += 1; tips.push({type:'good', text: (p.photoCount||0) + '/10 photos \u2014 good visual coverage'}); }
  else if ((p.photoCount||0) >= 3) { score += 0.5; tips.push({type:'warn', text: (p.photoCount||0) + '/10 photos \u2014 aim for 7+ to boost conversion'}); }
  else { tips.push({type:'bad', text:'Only ' + (p.photoCount||0) + ' photo(s) \u2014 listings with 7+ photos sell better'}); }
  if (p.competitorPriceRange) { score += 1; tips.push({type:'good', text:'Competitor pricing noted \u2014 smart positioning'}); }

  score = Math.round(Math.min(score, max) * 10) / 10;
  const pct = score / max;
  const cls = pct >= 0.7 ? 'seo-green' : pct >= 0.4 ? 'seo-amber' : 'seo-red';
  const label = pct >= 0.7 ? 'Good' : pct >= 0.4 ? 'Needs work' : 'Incomplete';
  return { score: Math.round(score), max, cls, label, tips };
}

function calcProfit(price) {
  if (price == null || price === '' || price === 0) return null;
  // Detailed Etsy fee breakdown (UK digital products, GBP)
  const listingFee = 0.16;              // £0.16 per listing (approx $0.20)
  const transactionFee = price * 0.065; // 6.5% transaction fee
  const paymentFee = price * 0.04 + 0.20; // 4% + £0.20 payment processing
  const offsiteAdsFee = (D.etsyOffsiteAds !== false) ? price * 0.15 : 0; // 15% if offsite ads sale (worst case)
  // Total without offsite ads (normal sale)
  const normalFees = listingFee + transactionFee + paymentFee;
  const profit = price - normalFees;
  const margin = price > 0 ? Math.round((profit / price) * 100) : 0;
  return {
    profit: Math.round(profit * 100) / 100,
    margin: margin,
    fees: { listing: listingFee, transaction: Math.round(transactionFee*100)/100, payment: Math.round(paymentFee*100)/100, totalFees: Math.round(normalFees*100)/100 }
  };
}

const SEASONAL_TAG_MAP = {
  1: ['new year','resolution','goal setting','january','planner 2026','2026 planner','new year planner'],
  2: ['valentine','love','galentine','february','heart','romance','couple'],
  3: ['spring','march','fresh start','spring planner','spring cleaning','easter'],
  4: ['easter','april','spring','bunny','pastel'],
  5: ['mother','mum','mom','may','gift for her','mothers day'],
  6: ['father','dad','june','wedding','summer','gift for him'],
  7: ['summer','july','mid year','half year','travel','holiday'],
  8: ['back to school','august','student','school','academic','teacher'],
  9: ['autumn','fall','september','cozy','harvest'],
  10: ['halloween','october','spooky','pumpkin','costume','fall'],
  11: ['black friday','cyber monday','november','holiday gift','christmas gift','deal','sale'],
  12: ['christmas','holiday','december','gift','stocking','winter','festive','xmas']
};
function getSeasonalTagInfo(tags) {
  if (!tags || tags.length === 0) return { current: [], upcoming: [], outOfSeason: [] };
  var now = new Date();
  var curMonth = now.getMonth() + 1;
  var nextMonth = curMonth === 12 ? 1 : curMonth + 1;
  var twoAhead = nextMonth === 12 ? 1 : nextMonth + 1;
  var tagsLower = tags.map(function(t){return t.toLowerCase()});
  var current = [], upcoming = [], outOfSeason = [];
  // Check which seasonal keywords are present
  tagsLower.forEach(function(tag, i) {
    var matched = false;
    for (var m = 1; m <= 12; m++) {
      var keywords = SEASONAL_TAG_MAP[m];
      if (keywords.some(function(kw){return tag.includes(kw)})) {
        matched = true;
        if (m === curMonth) current.push({tag: tags[i], month: m});
        else if (m === nextMonth || m === twoAhead) upcoming.push({tag: tags[i], month: m});
        else outOfSeason.push({tag: tags[i], month: m});
      }
    }
  });
  return { current: current, upcoming: upcoming, outOfSeason: outOfSeason };
}

function listingExpiry(p) {
  const ld = p.listedDate || p.stageChangedDate || p.dateAdded;
  if (!ld || p.stage !== 'listed') return null;
  const listed = new Date(ld + 'T00:00:00');
  // Etsy listings expire every 4 months (≈122 days)
  const cycleMs = 122 * 86400000;
  const now = today(); now.setHours(0,0,0,0);
  const elapsed = now.getTime() - listed.getTime();
  const cyclesPassed = Math.floor(elapsed / cycleMs);
  const nextExpiry = new Date(listed.getTime() + (cyclesPassed + 1) * cycleMs);
  const daysLeft = Math.round((nextExpiry - now) / 86400000);
  return { daysLeft, nextExpiry: isoDate(nextExpiry) };
}

function getAllDeadlines() { return [...(D.uni.deadlines||[])].sort((a,b) => a.date.localeCompare(b.date)); }

function getAllAssignments() {
  const all = [];
  for (const [yr, yd] of Object.entries(D.uni.years))
    for (const [code, mod] of Object.entries(yd.modules))
      for (const a of mod.assignments)
        all.push({ ...a, moduleCode: code, moduleName: mod.name, year: yr });
  return all;
}

function getYearModuleAverages(yr) {
  const yearData = D.uni.years[yr];
  if (!yearData) return [];
  const results = [];
  for (const [code, mod] of Object.entries(yearData.modules)) {
    const scored = mod.assignments.filter(a => a.score != null);
    if (scored.length > 0) {
      const avg = scored.reduce((s,a)=>s+a.score,0) / scored.length;
      results.push({ code, name: mod.name, avg: Math.round(avg*10)/10, count: scored.length });
    }
  }
  return results;
}

      h += '<div class="timeline-item">';
      h += '<div class="timeline-dot" style="background:'+urgencyColor(days)+'"></div>';
      h += '<div class="dl-progress-wrap"><div class="timeline-title">'+esc(dl.name)+'</div>';
      h += '<div class="timeline-module">'+esc(dl.moduleCode||'')+' · '+fmtDateShort(dl.date)+'</div>';
      h += '<div class="dl-bar-track"><div class="dl-bar-fill" style="width:'+pct+'%;background:'+urgencyColor(days)+'"></div></div></div>';
      h += urgencyChip(days);
      h += '</div>';
    });
  }
  h += '</div>';

  // Latest Scores & Etsy Snapshot
  h += '<div class="grid-2 fade-4" style="margin-bottom:1rem">';

  h += '<div class="card"><div class="sec-head"><span class="sec-title">Latest Scores</span></div>';
  if (assignments.length === 0) { h += '<div class="empty-state" style="padding:0.75rem 0">'+emptyStateSvg('star')+'<p style="font-size:0.82rem">No scores yet</p></div>'; }
  else {
    assignments.forEach(a => {
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--surface0)">';
      h += '<div><div style="font-size:0.85rem">'+esc(a.name)+'</div><div style="font-size:0.68rem;color:var(--overlay1)">'+esc(a.moduleCode)+'</div></div>';
      h += '<div class="score-badge '+scoreClass(a.score)+'">'+a.score+'%</div></div>';
    });
  }
  h += '</div>';

  h += '<div class="card"><div class="sec-head"><span class="sec-title">Etsy This Week</span></div>';
  if (!latestStats) { h += '<div class="empty-state" style="padding:0.75rem 0">'+emptyStateSvg('lightbulb')+'<p style="font-size:0.82rem">No stats logged yet</p></div>'; }
  else {
    const conv = latestStats.visits > 0 ? ((latestStats.orders/latestStats.visits)*100).toFixed(1) : '0.0';
    const stats = [
      {label:'Views',val:latestStats.views},{label:'Visits',val:latestStats.visits},
      {label:'Orders',val:latestStats.orders},{label:'Conv %',val:conv+'%'},
    ];
    h += '<div class="grid-2" style="gap:0.5rem">';
    stats.forEach(s => {
      h += '<div class="card-inner" style="text-align:center;padding:0.5rem">';
      h += '<div style="font-size:1.1rem;font-weight:700;color:var(--cream)">'+s.val+'</div>';
      h += '<div class="stat-label">'+s.label+'</div></div>';
    });
    h += '</div>';
    // Revenue goal on dashboard
    const goal = D.etsyWeeklyGoal || 0;
    if (goal > 0) {
      const rev = latestStats.revenue || 0;
      const goalPct = Math.min(100, (rev / goal) * 100);
      h += '<div style="margin-top:0.65rem">';
      h += '<div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--overlay1);margin-bottom:0.25rem">';
      h += '<span>Revenue Goal</span><span style="color:'+(goalPct>=100?'var(--green)':'var(--cream)')+'">£'+rev.toFixed(2)+' / £'+goal.toFixed(2)+'</span></div>';
      h += '<div class="goal-track"><div class="goal-fill" style="width:'+goalPct+'%;'+(goalPct>=100?'background:var(--green)':'background:var(--peach)')+'"></div></div></div>';
    }
  }
  h += '</div></div>';

  // Weekly Recap Card
  h += '<div class="card fade-5" style="margin-bottom:1rem">';
  h += '<div class="sec-head"><span class="sec-title">This Week at a Glance</span></div>';
  // Uni: upcoming deadlines this week
  const weekDeadlines = getAllDeadlines().filter(d => { const days = daysUntil(d.date); return days >= 0 && days <= 7; });
  // Etsy: revenue comparison
  const recapLatest = D.etsy.weeklyStats.slice(-1)[0];
  const recapPrev = D.etsy.weeklyStats.length >= 2 ? D.etsy.weeklyStats[D.etsy.weeklyStats.length-2] : null;
  // Products moved this week (stageChangedDate within 7 days)
  const recentMoves = (D.etsy.products||[]).filter(p => { if (!p.stageChangedDate) return false; return daysUntil(p.stageChangedDate) >= -7 && daysUntil(p.stageChangedDate) <= 0; });
  // Reviews received this week
  const recentReviews = (D.etsy.reviews||[]).filter(r => { if (!r.date) return false; return daysUntil(r.date) >= -7 && daysUntil(r.date) <= 0; });
  // Content posted this week
  const recentContent = (D.etsy.growth.contentCalendar||[]).filter(c => c.status === 'posted' && c.date && daysUntil(c.date) >= -7 && daysUntil(c.date) <= 0);

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">';
  // Uni summary
  h += '<div class="card-inner"><div style="font-size:0.68rem;color:var(--lavender);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem">Uni</div>';
  if (weekDeadlines.length > 0) {
    h += '<div style="font-size:0.85rem;font-weight:600;color:var(--text)">'+weekDeadlines.length+' deadline'+(weekDeadlines.length!==1?'s':'')+' this week</div>';
    weekDeadlines.slice(0,2).forEach(d => { h += '<div style="font-size:0.72rem;color:var(--overlay1)">'+esc(d.name)+' — '+fmtDateShort(d.date)+'</div>'; });
  } else {
    h += '<div style="font-size:0.82rem;color:var(--overlay1)">No deadlines this week</div>';
  }
  h += '</div>';
  // Etsy summary
  h += '<div class="card-inner"><div style="font-size:0.68rem;color:var(--peach);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem">Etsy</div>';
  if (recapLatest) {
    h += '<div style="font-size:0.85rem;font-weight:600;color:var(--text)">\u00a3'+(recapLatest.revenue||0).toFixed(2)+' revenue';
    if (recapPrev && recapPrev.revenue > 0) {
      const pct = (((recapLatest.revenue||0) - recapPrev.revenue) / recapPrev.revenue * 100).toFixed(0);
      h += ' <span class="'+(pct>0?'stat-up':pct<0?'stat-down':'stat-flat')+'" style="font-size:0.72rem">'+(pct>0?'\u2191':pct<0?'\u2193':'\u2192')+Math.abs(pct)+'%</span>';
    }
    h += '</div>';
    h += '<div style="font-size:0.72rem;color:var(--overlay1)">'+recapLatest.orders+' orders · '+recapLatest.views+' views</div>';
  } else {
    h += '<div style="font-size:0.82rem;color:var(--overlay1)">No stats logged yet</div>';
  }
  h += '</div>';
  h += '</div>';
  // Activity row
  const activityBits = [];
  if (recentMoves.length > 0) activityBits.push(recentMoves.length + ' product'+(recentMoves.length!==1?'s':'')+' moved');
  if (recentReviews.length > 0) activityBits.push(recentReviews.length + ' review'+(recentReviews.length!==1?'s':'')+' received');
  if (recentContent.length > 0) activityBits.push(recentContent.length + ' content piece'+(recentContent.length!==1?'s':'')+' posted');
  if (activityBits.length > 0) {
    h += '<div style="margin-top:0.5rem;font-size:0.78rem;color:var(--subtext0)">\u2726 '+activityBits.join(' · ')+'</div>';
  }
  h += '</div>';

  // Pipeline with per-stage breakdown
  h += '<div class="card fade-5">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">';
  h += '<span class="sec-title">Product Pipeline</span>';
  h += '<button class="btn btn-sm" onclick="navigate(\'etsy\');setTimeout(()=>switchEtsyTab(\'pipeline\'),100)">View Pipeline \u2192</button></div>';
  const stageBreakdown = {};
  STAGES.forEach(s => { stageBreakdown[s] = (D.etsy.products||[]).filter(p => p.stage===s).length; });
  const hasProducts = (D.etsy.products||[]).length > 0;
  if (hasProducts) {
    h += '<div style="display:flex;flex-wrap:wrap;gap:0.35rem">';
    STAGES.forEach(s => {
      if (stageBreakdown[s] > 0) h += '<span class="chip" style="background:rgba(202,211,245,.08);color:var('+STAGE_COLORS[s]+')">'+STAGE_LABELS[s]+': '+stageBreakdown[s]+'</span>';
    });
    h += '</div>';
  } else {
    h += '<span style="font-size:0.82rem;color:var(--overlay1)">No products yet \u2014 add your first idea to get started</span>';
  }
  h += '</div>';

  document.getElementById('dashboard-content').innerHTML = h;
  requestAnimationFrame(() => { animateCountUps(); triggerConfetti(); animateProgressBars(); });
}

// ============================================================
// UNI
// ============================================================
function renderUni() {
  let h = '';

  // Degree progress indicator
  const allAsgn = getAllAssignments();
  const scored = allAsgn.filter(a => a.score != null);
  const totalModules = Object.values(D.uni.years).reduce((s,y) => s + Object.keys(y.modules).length, 0);
  const overallAvg = scored.length > 0 ? (scored.reduce((s,a)=>s+a.score,0)/scored.length).toFixed(1) : null;
  const yearsDone = Object.keys(D.uni.years).length;
  const degPct = Math.round((yearsDone / 3) * 100);

  h += '<div class="card fade-1" style="display:flex;align-items:center;gap:1.25rem;margin-bottom:1rem">';
  h += '<div class="degree-ring">';
  const circ = 2 * Math.PI * 28;
  const dashOff = circ - (circ * Math.min(degPct,100) / 100);
  h += '<svg width="70" height="70" viewBox="0 0 64 64">';
  h += '<circle cx="32" cy="32" r="28" fill="none" stroke="var(--surface1)" stroke-width="5"/>';
  h += '<circle cx="32" cy="32" r="28" fill="none" stroke="var(--lavender)" stroke-width="5" stroke-linecap="round" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+dashOff.toFixed(1)+'"/>';
  h += '</svg><div class="degree-ring-label">Yr '+yearsDone+'</div></div>';
  h += '<div><div style="font-size:0.95rem;font-weight:600;color:var(--lavender)">Degree Progress</div>';
  h += '<div style="font-size:0.78rem;color:var(--overlay1);margin-top:0.15rem">Year '+yearsDone+' of 3 · '+totalModules+' module'+(totalModules!==1?'s':'')+' · '+scored.length+' assignment'+(scored.length!==1?'s':'')+' scored</div>';
  if (overallAvg) h += '<div style="margin-top:0.25rem"><span class="score-badge '+scoreClass(parseFloat(overallAvg))+'">Overall: '+overallAvg+'%</span></div>';
  h += '</div></div>';

  // Score Tracker
  h += '<div class="sec-head fade-2"><span class="sec-title">Score Tracker</span>';
  h += '<button class="btn btn-sm btn-cream" onclick="openAddAssignmentModal()">+ Assignment</button></div>';

  const years = Object.keys(D.uni.years).sort((a,b)=>Number(a)-Number(b));
  if (years.length === 0) h += '<div class="card" style="margin-bottom:1rem"><p style="color:var(--overlay1);font-size:0.85rem">No years set up yet — add them in Settings</p></div>';

  years.forEach(yr => {
    const yearData = D.uni.years[yr];
    h += '<div class="card fade-2" style="margin-bottom:1rem">';
    h += '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem">';
    h += '<span class="chip chip-lavender">Year '+yr+'</span>';
    const allScores = [];
    Object.values(yearData.modules).forEach(m => m.assignments.forEach(a => { if (a.score!=null) allScores.push(a.score); }));
    if (allScores.length > 0) { const avg = (allScores.reduce((s,v)=>s+v,0)/allScores.length).toFixed(1); h += '<span style="font-size:0.75rem;color:var(--overlay1)">Avg: '+avg+'%</span>'; }
    h += '</div>';

    Object.entries(yearData.modules).forEach(([code, mod]) => {
      h += '<div class="card-inner" style="margin-bottom:0.6rem">';
      h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">';
      h += '<div><span style="font-size:0.88rem;font-weight:600;color:var(--lavender)">'+esc(code)+'</span>';
      h += ' <span style="font-size:0.82rem;color:var(--subtext1)">\u2014 '+esc(mod.name)+'</span></div>';
      h += '<div style="display:flex;align-items:center;gap:0.4rem">';
      const modScores = mod.assignments.filter(a=>a.score!=null).map(a=>a.score);
      if (modScores.length > 0) { const avg = (modScores.reduce((s,v)=>s+v,0)/modScores.length).toFixed(1); h += '<span class="score-badge '+scoreClass(parseFloat(avg))+'">TMA: '+avg+'%</span>'; }
      h += '<button class="btn-xs '+(mod.moduleResult?'btn-ghost':'btn-cream')+'" onclick="openModuleResultModal(\''+yr+'\',\''+code+'\')">'+(mod.moduleResult?'Edit Result':'+ Log Result')+'</button>';
      h += '</div></div>';

      // Module result display with EMA calculation
      const mr = mod.moduleResult;
      if (mr) {
        const gradeClass = mr.grade === 'Distinction' ? 'grade-distinction' : mr.grade === 'Merit' ? 'grade-merit' : mr.grade === 'Fail' ? 'grade-fail' : 'grade-pass';
        h += '<div class="mod-result">';
        h += '<div style="display:flex;align-items:center;justify-content:space-between">';
        h += '<div style="display:flex;align-items:center;gap:0.5rem">';
        h += '<span class="mod-result-grade '+gradeClass+'">'+esc(mr.grade)+'</span>';
        h += '<span style="font-size:0.85rem;font-weight:600;color:var(--cream)">Overall: '+mr.overallScore+'%</span>';
        h += '</div></div>';
        // Calculate EMA
        const tmaAvg = modScores.length > 0 ? modScores.reduce((s,v)=>s+v,0)/modScores.length : null;
        if (tmaAvg !== null && mr.tmaWeight > 0 && mr.emaWeight > 0) {
          const ema = (mr.overallScore - tmaAvg * (mr.tmaWeight / 100)) / (mr.emaWeight / 100);
          const emaRounded = Math.round(ema * 10) / 10;
          h += '<div class="ema-calc">';
          h += 'TMA avg: <strong>'+tmaAvg.toFixed(1)+'%</strong> (weight: '+mr.tmaWeight+'%) \u00b7 EMA weight: '+mr.emaWeight+'%<br>';
          h += 'Calculated EMA score: <span class="ema-score">'+emaRounded+'%</span>';
          h += '</div>';
        }
        h += '</div>';
      }

      if (mod.assignments.length === 0) { h += '<p style="color:var(--overlay1);font-size:0.82rem;padding:0.3rem 0">No assignments added yet</p>'; }
      else {
        mod.assignments.forEach(a => {
          h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--surface1)">';
          h += '<div style="flex:1;cursor:pointer" onclick="openAssignmentDetail(\''+yr+'\',\''+code+'\',\''+a.id+'\')">';
          h += '<div style="font-size:0.85rem">'+esc(a.name)+'</div>';
          if (a.weight) h += '<span style="font-size:0.68rem;color:var(--overlay1)">Weight: '+a.weight+'%</span>';
          h += '</div><div style="display:flex;align-items:center;gap:0.5rem">';
          if (a.score != null) h += '<span class="score-badge '+scoreClass(a.score)+'">'+a.score+'%</span>';
          else h += '<span class="chip chip-dim">Pending</span>';
          h += '<button class="btn-xs btn-ghost" onclick="deleteAssignment(\''+yr+'\',\''+code+'\',\''+a.id+'\')" title="Remove">\u2715</button>';
          h += '</div></div>';
        });
      }
      h += '</div>';
    });
    h += '</div>';
  });

  // Deadlines with visual progress bars
  h += '<div class="div"></div>';
  h += '<div class="sec-head fade-3"><span class="sec-title">Deadlines</span>';
  h += '<button class="btn btn-sm btn-cream" onclick="openAddDeadlineModal()">+ Deadline</button></div>';

  const deadlines = getAllDeadlines();
  if (deadlines.length === 0) { h += '<div class="card fade-4"><p style="color:var(--overlay1);font-size:0.85rem;padding:0.5rem 0">No deadlines yet</p></div>'; }
  else {
    h += '<div class="card fade-4">';
    deadlines.forEach(dl => {
      const days = daysUntil(dl.date);
      const totalDays = dl.dateAdded ? Math.max(1, Math.round((new Date(dl.date+'T00:00:00') - new Date(dl.dateAdded+'T00:00:00'))/86400000)) : 30;
      const elapsed = totalDays - Math.max(0, days);
      const pct = Math.min(100, Math.max(0, (elapsed / totalDays) * 100));
      h += '<div class="timeline-item">';
      h += '<div class="timeline-dot" style="background:'+urgencyColor(days)+'"></div>';
      h += '<div class="dl-progress-wrap">';
      h += '<div style="display:flex;align-items:center;justify-content:space-between"><div class="timeline-title">'+esc(dl.name)+'</div>'+urgencyChip(days)+'</div>';
      h += '<div class="timeline-module">'+esc(dl.moduleCode||'')+' · '+fmtDateShort(dl.date)+'</div>';
      h += '<div class="dl-bar-track"><div class="dl-bar-fill" style="width:'+pct+'%;background:'+urgencyColor(days)+'"></div></div>';
      h += '</div>';
      h += '<button class="btn-xs btn-ghost" onclick="deleteDeadline(\''+dl.id+'\')" title="Remove">\u2715</button>';
      h += '</div>';
    });
    h += '</div>';
  }

  document.getElementById('uni-content').innerHTML = h;
}
