// Tag management for the "add new product" modals
let _newProductTags = [];
function addNewProductTag(input) {
  const tag = input.value.trim();
  if (!tag) return;
  if (_newProductTags.length >= 13) { toast('Maximum 13 tags'); return; }
  if (_newProductTags.some(t => t.toLowerCase() === tag.toLowerCase())) { toast('Tag already exists'); input.value=''; return; }
  _newProductTags.push(tag);
  input.value = '';
  // Rebuild pills
  const wrap = input.parentElement;
  wrap.querySelectorAll('.tag-pill').forEach(el => el.remove());
  _newProductTags.forEach((t,i) => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = esc(t) + '<span class="tag-x" onclick="removeNewProductTag('+i+')">\u2715</span>';
    wrap.insertBefore(pill, input);
  });
  const counter = document.getElementById('m-lp-tag-count') || document.getElementById('m-prod-tag-count');
  if (counter) counter.textContent = _newProductTags.length + '/13 tags';
  if (_newProductTags.length >= 13) { input.disabled = true; input.placeholder = 'Max tags reached'; }
}
function removeNewProductTag(i) {
  _newProductTags.splice(i, 1);
  // Re-trigger modal refresh by rebuilding — find the input and re-render pills
  const input = document.getElementById('m-lp-tag-input') || document.getElementById('m-prod-tag-input');
  if (input) {
    const wrap = input.parentElement;
    wrap.querySelectorAll('.tag-pill').forEach(el => el.remove());
    _newProductTags.forEach((t,j) => {
      const pill = document.createElement('span');
      pill.className = 'tag-pill';
      pill.innerHTML = esc(t) + '<span class="tag-x" onclick="removeNewProductTag('+j+')">\u2715</span>';
      wrap.insertBefore(pill, input);
    });
    const counter = document.getElementById('m-lp-tag-count') || document.getElementById('m-prod-tag-count');
    if (counter) counter.textContent = _newProductTags.length + '/13 tags';
    input.disabled = false;
    input.placeholder = 'Add a tag...';
  }
}

function submitListedProduct() {
  const name = document.getElementById('m-lp-name').value.trim();
  if (!name) { toast('Enter a product name'); return; }
  D.etsy.products.push({
    id:uid(), name,
    listingTitle: document.getElementById('m-lp-listingtitle').value.trim(),
    description: document.getElementById('m-lp-desc').value.trim(),
    notes:document.getElementById('m-lp-notes').value.trim(),
    tags: [..._newProductTags],
    stage:'listed', dateAdded:todayStr(), stageChangedDate:todayStr(), checklist:{}, activityLog:[],
    price:document.getElementById('m-lp-price').value ? Number(document.getElementById('m-lp-price').value) : null,
    category:document.getElementById('m-lp-category').value.trim(),
    featured: document.getElementById('m-lp-featured').checked,
    inAds: document.getElementById('m-lp-inads').checked,
    listedDate: document.getElementById('m-lp-listeddate').value || todayStr(),
    photoCount: Number(document.getElementById('m-lp-photos').value) || 0,
    competitorPriceRange: document.getElementById('m-lp-competitor').value.trim(),
    productViews: Number(document.getElementById('m-lp-views').value) || 0,
    productFavourites: Number(document.getElementById('m-lp-favs').value) || 0
  });
  _newProductTags = [];
  save(); closeModal(); toast('Product added \u2726'); renderPage(currentPage);
}

// ── ANALYTICS (patterns & insights)
function renderEtsyAnalytics() {
  const stats = D.etsy.weeklyStats || [];
  const products = D.etsy.products || [];
  const listed = products.filter(p => p.stage === 'listed');
  let h = '';
  h += '<div class="sec-head"><span class="sec-title">Analytics & Patterns</span></div>';
  h += '<p style="color:var(--subtext0);font-size:0.8rem;margin-bottom:1rem">Insights from your shop data — the more stats you log, the smarter this gets.</p>';

  if (stats.length === 0) {
    h += '<div class="card" style="text-align:center;padding:2rem"><p style="color:var(--overlay1);font-size:0.88rem;margin-bottom:0.5rem">No data to analyse yet</p>';
    h += '<p style="color:var(--overlay0);font-size:0.78rem">Start logging weekly stats in the Overview tab and your analytics will build up here automatically.</p></div>';
    return h;
  }

  // All-time summary stats (includes baseline pre-tracking totals)
  const abl = D.etsy.baseline || { revenue:0, orders:0, views:0, visits:0 };
  const totalRevenue = stats.reduce((s,w) => s + (w.revenue||0), 0) + (abl.revenue||0);
  const totalOrders = stats.reduce((s,w) => s + (w.orders||0), 0) + (abl.orders||0);
  const totalViews = stats.reduce((s,w) => s + (w.views||0), 0) + (abl.views||0);
  const totalVisits = stats.reduce((s,w) => s + (w.visits||0), 0) + (abl.visits||0);
  const avgConv = totalVisits > 0 ? ((totalOrders / totalVisits) * 100).toFixed(1) : '0.0';
  const avgRevPerWeek = stats.length > 0 ? (totalRevenue / stats.length).toFixed(2) : '0.00';
  const bestWeek = stats.reduce((best, w) => (w.revenue||0) > (best.revenue||0) ? w : best, stats[0]);

  const totalFavourites = stats.reduce((s,w) => s + (w.favourites||0), 0);
  const latestFollows = stats.length > 0 ? (stats[stats.length-1].follows||0) : 0;

  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.5rem;margin-bottom:1rem">';
  const summaryMetrics = [
    { label:'Total Revenue', value:'\u00a3'+totalRevenue.toFixed(2), color:'var(--green)' },
    { label:'Total Orders', value:totalOrders, color:'var(--peach)' },
    { label:'Avg Conv Rate', value:avgConv+'%', color:'var(--blue)' },
    { label:'Avg Rev/Week', value:'\u00a3'+avgRevPerWeek, color:'var(--cream)' },
    { label:'Total Favourites', value:totalFavourites, color:'var(--pink)' },
    { label:'Shop Follows', value:latestFollows, color:'var(--blue)' },
  ];
  summaryMetrics.forEach(m => {
    h += '<div class="card analytics-stat"><div class="stat-num" style="color:'+m.color+'">'+m.value+'</div><div class="stat-label">'+m.label+'</div></div>';
  });
  h += '</div>';

  // Best week highlight
  if (bestWeek && bestWeek.revenue > 0) {
    h += '<div class="card" style="margin-bottom:1rem;padding:0.85rem 1.2rem;border-color:var(--green)">';
    h += '<span class="sec-title" style="color:var(--green)">Best Week</span> ';
    h += '<span style="font-size:0.85rem;color:var(--subtext1)">' + fmtDateShort(bestWeek.week) + ' \u2014 \u00a3' + (bestWeek.revenue||0).toFixed(2) + ' revenue, ' + (bestWeek.orders||0) + ' orders, ' + (bestWeek.views||0) + ' views</span></div>';
  }

  // ── CONVERSION FUNNEL
  if (totalViews > 0) {
    h += '<div class="card" style="margin-bottom:1rem">';
    h += '<div class="sec-head"><span class="sec-title">Conversion Funnel</span></div>';
    var funnelSteps = [
      { label: 'Views', value: totalViews, color: 'var(--blue)' },
      { label: 'Visits', value: totalVisits, color: 'var(--lavender)' },
      { label: 'Favourites', value: totalFavourites, color: 'var(--pink)' },
      { label: 'Orders', value: totalOrders, color: 'var(--green)' }
    ];
    var maxFunnel = funnelSteps[0].value || 1;
    h += '<div style="display:flex;flex-direction:column;gap:0.4rem;padding:0.5rem 0">';
    funnelSteps.forEach(function(step, idx) {
      var pct = Math.max(2, (step.value / maxFunnel) * 100);
      var dropoff = '';
      if (idx > 0 && funnelSteps[idx-1].value > 0) {
        var dropPct = (((funnelSteps[idx-1].value - step.value) / funnelSteps[idx-1].value) * 100).toFixed(0);
        var convPct = ((step.value / funnelSteps[idx-1].value) * 100).toFixed(1);
        dropoff = '<span style="font-size:0.68rem;color:var(--overlay0);margin-left:0.5rem">' + convPct + '% from ' + funnelSteps[idx-1].label.toLowerCase() + '</span>';
      }
      h += '<div>';
      h += '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.15rem">';
      h += '<span style="font-size:0.75rem;color:' + step.color + ';min-width:65px;font-weight:600">' + step.label + '</span>';
      h += '<span style="font-size:0.82rem;font-weight:700;color:var(--text)">' + step.value.toLocaleString() + '</span>';
      h += dropoff;
      h += '</div>';
      h += '<div style="height:8px;background:var(--surface0);border-radius:999px;overflow:hidden">';
      h += '<div style="height:100%;width:' + pct + '%;background:' + step.color + ';border-radius:999px;transition:width .3s"></div>';
      h += '</div></div>';
    });
    h += '</div>';
    // Overall conversion summary
    var viewToOrder = totalViews > 0 ? ((totalOrders / totalViews) * 100).toFixed(2) : '0';
    var visitToOrder = totalVisits > 0 ? ((totalOrders / totalVisits) * 100).toFixed(1) : '0';
    var viewToFav = totalViews > 0 ? ((totalFavourites / totalViews) * 100).toFixed(1) : '0';
    h += '<div style="display:flex;gap:1rem;flex-wrap:wrap;font-size:0.75rem;color:var(--subtext0);padding-top:0.5rem;border-top:1px solid var(--surface0)">';
    h += '<div>View \u2192 Order: <strong style="color:var(--green)">' + viewToOrder + '%</strong></div>';
    h += '<div>Visit \u2192 Order: <strong style="color:var(--blue)">' + visitToOrder + '%</strong></div>';
    if (totalFavourites > 0) h += '<div>View \u2192 Fav: <strong style="color:var(--pink)">' + viewToFav + '%</strong></div>';
    h += '</div>';
    h += '</div>';
  }

  // Revenue trend chart
  if (stats.length >= 2) {
    h += '<div class="card" style="margin-bottom:1rem"><div class="label" style="margin-bottom:0.5rem">Revenue Over Time</div>';
    h += '<div class="chart-box"><canvas id="chart-analytics-revenue" class="chart-canvas"></canvas></div></div>';
  }

  // Conversion trend chart
  if (stats.length >= 2) {
    h += '<div class="card" style="margin-bottom:1rem"><div class="label" style="margin-bottom:0.5rem">Conversion Rate Trend</div>';
    h += '<div class="chart-box"><canvas id="chart-analytics-conv" class="chart-canvas"></canvas></div></div>';
  }

  // Favourites & Follows trend chart
  if (stats.length >= 2 && stats.some(function(w){return (w.favourites||0)>0 || (w.follows||0)>0})) {
    h += '<div class="card" style="margin-bottom:1rem"><div class="label" style="margin-bottom:0.5rem">Favourites & Follows Trend</div>';
    h += '<div class="chart-box"><canvas id="chart-analytics-favs" class="chart-canvas"></canvas></div></div>';
  }

  // ── PER-PRODUCT CONVERSION TABLE
  var activeListed = listed.filter(function(p){return (p.status||'active') === 'active'});
  var productsWithData = activeListed.filter(function(p){return (p.productViews||0) > 0 || (p.productFavourites||0) > 0});
  if (productsWithData.length > 0) {
    // Build product conversion data
    var prodConvData = productsWithData.map(function(p) {
      var pSales = (D.etsy.productSales||[]).filter(function(s){return s.productId===p.id});
      var totalSales = pSales.reduce(function(sum,s){return sum+(s.quantity||1)},0);
      var totalRev = pSales.reduce(function(sum,s){return sum+(s.revenue||0)},0);
      var views = p.productViews||0;
      var favs = p.productFavourites||0;
      var convRate = views > 0 ? ((totalSales/views)*100) : 0;
      var favRate = views > 0 ? ((favs/views)*100) : 0;
      return { name:p.name, id:p.id, views:views, favs:favs, sales:totalSales, revenue:totalRev, convRate:convRate, favRate:favRate };
    }).sort(function(a,b){return b.convRate - a.convRate});
    h += '<div class="card" style="margin-bottom:1rem">';
    h += '<div class="sec-head"><span class="sec-title">Product Conversion Rates</span></div>';
    h += '<div style="overflow-x:auto">';
    h += '<table style="width:100%;border-collapse:collapse;font-size:0.78rem">';
    h += '<thead><tr style="border-bottom:2px solid var(--surface1);color:var(--overlay0);text-align:left;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.03em">';
    h += '<th style="padding:0.4rem 0.3rem">Product</th>';
    h += '<th style="padding:0.4rem 0.3rem;text-align:right">Views</th>';
    h += '<th style="padding:0.4rem 0.3rem;text-align:right">Favs</th>';
    h += '<th style="padding:0.4rem 0.3rem;text-align:right">Sales</th>';
    h += '<th style="padding:0.4rem 0.3rem;text-align:right">Fav Rate</th>';
    h += '<th style="padding:0.4rem 0.3rem;text-align:right">Conv Rate</th>';
    h += '</tr></thead><tbody>';
    prodConvData.forEach(function(pc) {
      var convColor = pc.convRate >= 3 ? 'var(--green)' : pc.convRate >= 1 ? 'var(--yellow)' : 'var(--red)';
      var favColor = pc.favRate >= 5 ? 'var(--pink)' : pc.favRate >= 2 ? 'var(--yellow)' : 'var(--overlay1)';
      h += '<tr style="border-bottom:1px solid var(--surface0)">';
      h += '<td style="padding:0.4rem 0.3rem;color:var(--text);cursor:pointer" onclick="openProductDetail(\''+pc.id+'\')"><span style="color:var(--peach)">'+esc(pc.name)+'</span></td>';
      h += '<td style="padding:0.4rem 0.3rem;text-align:right;color:var(--blue)">'+pc.views.toLocaleString()+'</td>';
      h += '<td style="padding:0.4rem 0.3rem;text-align:right;color:var(--pink)">'+pc.favs+'</td>';
      h += '<td style="padding:0.4rem 0.3rem;text-align:right;color:var(--green)">'+pc.sales+'</td>';
      h += '<td style="padding:0.4rem 0.3rem;text-align:right;color:'+favColor+'">'+pc.favRate.toFixed(1)+'%</td>';
      h += '<td style="padding:0.4rem 0.3rem;text-align:right;font-weight:600;color:'+convColor+'">'+pc.convRate.toFixed(1)+'%</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
    // Conversion insights
    var avgProdConv = prodConvData.reduce(function(s,p){return s+p.convRate},0) / prodConvData.length;
    var bestConvProduct = prodConvData[0];
    var worstConvProduct = prodConvData[prodConvData.length-1];
    var highViewLowConv = prodConvData.filter(function(p){return p.views > 50 && p.convRate < 1});
    var highFavLowSale = prodConvData.filter(function(p){return p.favs > 5 && p.sales === 0});
    h += '<div style="padding:0.6rem 0;font-size:0.75rem;color:var(--subtext0);line-height:1.7">';
    h += 'Average product conversion rate: <strong style="color:var(--blue)">' + avgProdConv.toFixed(1) + '%</strong>. ';
    if (bestConvProduct && bestConvProduct.convRate > 0) h += 'Top converter: <strong style="color:var(--peach)">'+esc(bestConvProduct.name)+'</strong> at '+bestConvProduct.convRate.toFixed(1)+'%. ';
    if (highViewLowConv.length > 0) {
      h += '<span style="color:var(--yellow)">\u26a0 '+highViewLowConv.length+' product'+(highViewLowConv.length!==1?'s':'')+' with 50+ views but under 1% conversion \u2014 listing may need improving.</span> ';
    }
    if (highFavLowSale.length > 0) {
      h += '<span style="color:var(--pink)">\u2661 '+highFavLowSale.length+' product'+(highFavLowSale.length!==1?'s':'')+' with favourites but no sales \u2014 price or description may be a barrier.</span> ';
    }
    h += '</div>';
    h += '</div>';
  }

  // Pipeline velocity
  const stageGroups = {};
  STAGES.forEach(s => { stageGroups[s] = products.filter(p => p.stage === s).length; });
  h += '<div class="card" style="margin-bottom:1rem">';
  h += '<div class="sec-head"><span class="sec-title">Pipeline Snapshot</span></div>';
  h += '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem">';
  STAGES.forEach(s => {
    h += '<span class="chip" style="background:rgba(202,211,245,.08);color:var('+STAGE_COLORS[s]+')">'+STAGE_LABELS[s]+': '+stageGroups[s]+'</span>';
  });
  h += '</div>';
  const totalProducts = products.length;
  const conversionRate = totalProducts > 0 ? ((listed.length / totalProducts) * 100).toFixed(0) : 0;
  h += '<div style="font-size:0.82rem;color:var(--subtext1)">Idea \u2192 Listed conversion: <strong style="color:var(--green)">'+conversionRate+'%</strong> ('+listed.length+' of '+totalProducts+' products)</div>';
  h += '</div>';

  // Top 5 weeks table
  if (stats.length >= 3) {
    const topWeeks = [...stats].sort((a,b) => (b.revenue||0) - (a.revenue||0)).slice(0,5);
    h += '<div class="card" style="margin-bottom:1rem">';
    h += '<div class="sec-head"><span class="sec-title">Top Weeks by Revenue</span></div>';
    topWeeks.forEach((w,i) => {
      const conv = w.visits > 0 ? ((w.orders/w.visits)*100).toFixed(1)+'%' : '\u2014';
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--surface0);font-size:0.82rem">';
      h += '<span style="color:var(--overlay1);min-width:24px">#'+(i+1)+'</span>';
      h += '<span style="min-width:75px">'+fmtDateShort(w.week)+'</span>';
      h += '<span style="flex:1;text-align:center;color:var(--subtext1)">'+w.views+' views \u00b7 '+w.orders+' orders \u00b7 '+conv+' conv</span>';
      h += '<span style="font-weight:700;color:var(--green)">\u00a3'+(w.revenue||0).toFixed(2)+'</span>';
      h += '</div>';
    });
    h += '</div>';
  }

  // ── MONTHLY SEASONALITY VIEW
  if (stats.length >= 4) {
    var monthlyData = {};
    stats.forEach(function(w) {
      if (!w.week) return;
      var m = parseInt(w.week.split('-')[1]);
      if (!monthlyData[m]) monthlyData[m] = { revenue:0, orders:0, views:0, weeks:0 };
      monthlyData[m].revenue += (w.revenue||0);
      monthlyData[m].orders += (w.orders||0);
      monthlyData[m].views += (w.views||0);
      monthlyData[m].weeks++;
    });
    var monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var maxMonthRev = Math.max.apply(null, Object.values(monthlyData).map(function(d){return d.revenue})) || 1;
    h += '<div class="card" style="margin-bottom:1rem">';
    h += '<div class="sec-head"><span class="sec-title">Revenue by Month</span></div>';
    h += '<div style="display:flex;align-items:flex-end;gap:0.3rem;height:100px;padding:0.5rem 0">';
    for (var mi = 1; mi <= 12; mi++) {
      var md = monthlyData[mi];
      if (md) {
        var barH = Math.max(4, (md.revenue / maxMonthRev) * 90);
        var isCurrentMonth = mi === (new Date().getMonth()+1);
        h += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:0.15rem">';
        h += '<div style="font-size:0.6rem;color:var(--overlay1)">\u00a3'+md.revenue.toFixed(0)+'</div>';
        h += '<div style="width:100%;height:'+barH+'px;background:'+(isCurrentMonth?'var(--peach)':'var(--green)')+';border-radius:3px 3px 0 0;opacity:'+(isCurrentMonth?'1':'0.7')+'"></div>';
        h += '<div style="font-size:0.6rem;color:'+(isCurrentMonth?'var(--peach)':'var(--overlay0)')+'">'+monthNames[mi]+'</div>';
        h += '</div>';
      } else {
        h += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:0.15rem">';
        h += '<div style="font-size:0.6rem;color:transparent">0</div>';
        h += '<div style="width:100%;height:4px;background:var(--surface0);border-radius:3px"></div>';
        h += '<div style="font-size:0.6rem;color:var(--overlay0)">'+monthNames[mi]+'</div>';
        h += '</div>';
      }
    }
    h += '</div>';
    // Best and worst months
    var sortedMonths = Object.entries(monthlyData).sort(function(a,b){return b[1].revenue - a[1].revenue});
    if (sortedMonths.length >= 2) {
      h += '<div style="font-size:0.75rem;color:var(--subtext0);padding-top:0.5rem;border-top:1px solid var(--surface0)">';
      h += 'Best month: <strong style="color:var(--green)">'+monthNames[sortedMonths[0][0]]+'</strong> (\u00a3'+sortedMonths[0][1].revenue.toFixed(2)+' across '+sortedMonths[0][1].weeks+' weeks). ';
      h += 'Slowest: <strong style="color:var(--overlay1)">'+monthNames[sortedMonths[sortedMonths.length-1][0]]+'</strong> (\u00a3'+sortedMonths[sortedMonths.length-1][1].revenue.toFixed(2)+'). ';
      h += '</div>';
    }
    h += '</div>';
  }

  // ── GOALS PROGRESS TRACKER
  var weeklyGoal = D.etsyWeeklyGoal || 0;
  if (weeklyGoal > 0 && stats.length >= 2) {
    var weeksOnTarget = stats.filter(function(w){return (w.revenue||0) >= weeklyGoal}).length;
    var weeksMissed = stats.length - weeksOnTarget;
    var hitRate = ((weeksOnTarget / stats.length) * 100).toFixed(0);
    // Current streak
    var streak = 0;
    for (var si = stats.length - 1; si >= 0; si--) {
      if ((stats[si].revenue||0) >= weeklyGoal) streak++;
      else break;
    }
    h += '<div class="card" style="margin-bottom:1rem">';
    h += '<div class="sec-head"><span class="sec-title">Goal Tracker</span></div>';
    h += '<div style="display:flex;gap:1.25rem;flex-wrap:wrap;font-size:0.85rem;margin-bottom:0.5rem">';
    h += '<div><span style="font-weight:700;font-size:1.1rem;color:var(--green)">'+weeksOnTarget+'</span> <span style="color:var(--overlay1);font-size:0.75rem">weeks on target</span></div>';
    h += '<div><span style="font-weight:700;font-size:1.1rem;color:var(--red)">'+weeksMissed+'</span> <span style="color:var(--overlay1);font-size:0.75rem">weeks missed</span></div>';
    h += '<div><span style="font-weight:700;font-size:1.1rem;color:var(--blue)">'+hitRate+'%</span> <span style="color:var(--overlay1);font-size:0.75rem">hit rate</span></div>';
    if (streak > 0) h += '<div><span style="font-weight:700;font-size:1.1rem;color:var(--peach)">'+streak+'</span> <span style="color:var(--overlay1);font-size:0.75rem">week streak \ud83d\udd25</span></div>';
    h += '</div>';
    // Visual streak dots (last 12 weeks)
    var last12 = stats.slice(-12);
    h += '<div style="display:flex;gap:0.25rem;flex-wrap:wrap">';
    last12.forEach(function(w) {
      var hit = (w.revenue||0) >= weeklyGoal;
      h += '<div title="'+fmtDateShort(w.week)+': \u00a3'+(w.revenue||0).toFixed(2)+'" style="width:20px;height:20px;border-radius:4px;background:'+(hit?'var(--green)':'var(--surface1)')+';display:flex;align-items:center;justify-content:center;font-size:0.55rem;color:'+(hit?'var(--base)':'var(--overlay0)')+'">'+fmtDateShort(w.week).split(' ')[0]+'</div>';
    });
    h += '</div>';
    h += '</div>';
  }

  // ── CORRELATION INSIGHTS
  if (stats.length >= 4) {
    h += '<div class="card" style="margin-bottom:1rem">';
    h += '<div class="sec-head"><span class="sec-title">Insights & Patterns</span></div>';
    h += '<div style="font-size:0.78rem;color:var(--subtext0);line-height:1.8">';
    // Content posting correlation
    var contentCalendar = D.etsy.growth.contentCalendar || [];
    if (contentCalendar.length > 0 && stats.length >= 3) {
      var weeksWithContent = {};
      contentCalendar.forEach(function(c) {
        if (c.status === 'posted' && c.date) {
          var weekKey = c.date.substring(0,7);
          weeksWithContent[weekKey] = (weeksWithContent[weekKey]||0) + 1;
        }
      });
      var activeWeeks = stats.filter(function(w){return weeksWithContent[w.week && w.week.substring(0,7)]});
      var quietWeeks = stats.filter(function(w){return !weeksWithContent[w.week && w.week.substring(0,7)]});
      if (activeWeeks.length >= 2 && quietWeeks.length >= 2) {
        var avgRevActive = activeWeeks.reduce(function(s,w){return s+(w.revenue||0)},0)/activeWeeks.length;
        var avgRevQuiet = quietWeeks.reduce(function(s,w){return s+(w.revenue||0)},0)/quietWeeks.length;
        if (avgRevActive > avgRevQuiet * 1.15) {
          h += '\ud83d\udcc8 Weeks with content posts average <strong style="color:var(--green)">\u00a3'+avgRevActive.toFixed(2)+'</strong> revenue vs <strong>\u00a3'+avgRevQuiet.toFixed(2)+'</strong> without \u2014 content is driving results.<br>';
        }
      }
    }
    // Ads correlation
    var adsData = D.etsy.ads || [];
    if (adsData.length >= 2) {
      var totalAdSpend = adsData.reduce(function(s,a){return s+(a.spend||0)},0);
      var totalAdRev = adsData.reduce(function(s,a){return s+(a.revenue||0)},0);
      if (totalAdSpend > 0) {
        var roas = (totalAdRev / totalAdSpend).toFixed(1);
        h += '\ud83d\udcb0 For every \u00a31 spent on ads, you\u2019ve earned <strong style="color:'+(roas>=2?'var(--green)':'var(--yellow)')+'">\u00a3'+roas+'</strong> back ('+roas+'x ROAS).'+(roas < 2 ? ' Consider optimising or pausing low-performing ad products.' : ' Solid return.')+'<br>';
      }
    }
    // Photo count correlation
    var listedWithPhotos = listed.filter(function(p){return (p.productViews||0) > 0});
    if (listedWithPhotos.length >= 3) {
      var highPhoto = listedWithPhotos.filter(function(p){return (p.photoCount||0) >= 7});
      var lowPhoto = listedWithPhotos.filter(function(p){return (p.photoCount||0) < 7});
      if (highPhoto.length >= 1 && lowPhoto.length >= 1) {
        var avgViewsHigh = highPhoto.reduce(function(s,p){return s+(p.productViews||0)},0)/highPhoto.length;
        var avgViewsLow = lowPhoto.reduce(function(s,p){return s+(p.productViews||0)},0)/lowPhoto.length;
        if (avgViewsHigh > avgViewsLow * 1.2) {
          h += '\ud83d\udcf7 Products with 7+ photos average <strong style="color:var(--blue)">'+Math.round(avgViewsHigh)+'</strong> views vs <strong>'+Math.round(avgViewsLow)+'</strong> for fewer photos. More photos help.<br>';
        }
      }
    }
    // Favourites to sales insight
    var totalProductFavs = listed.reduce(function(s,p){return s+(p.productFavourites||0)},0);
    if (totalProductFavs > 0 && totalOrders > 0) {
      var favToOrderRate = ((totalOrders / totalProductFavs) * 100).toFixed(1);
      h += '\u2661 Overall favourite-to-order rate: <strong style="color:var(--pink)">'+favToOrderRate+'%</strong>. '+(favToOrderRate < 10 ? 'Many browsers save but don\u2019t buy \u2014 consider follow-up marketing or pricing review.' : 'Good conversion from interest to purchase.')+'<br>';
    }
    h += '</div></div>';
  }

  return h;
}

function renderAnalyticsCharts() {
  const data = D.etsy.weeklyStats.slice(-12);
  if (data.length < 2) return;
  drawLineChart('chart-analytics-revenue', data, [{key:'revenue',color:'#a6da95',label:'Revenue'},{key:'orders',color:'#f5a97f',label:'Orders'}]);
  // Build conversion data
  const convData = data.map(d => ({ ...d, conv: d.visits > 0 ? Math.round((d.orders/d.visits)*1000)/10 : 0 }));
  drawLineChart('chart-analytics-conv', convData, [{key:'conv',color:'#8aadf4',label:'Conv %'}]);
  // Favourites & follows chart
  if (data.some(function(d){return (d.favourites||0)>0 || (d.follows||0)>0})) {
    drawLineChart('chart-analytics-favs', data, [{key:'favourites',color:'#f5bde6',label:'Favourites'},{key:'follows',color:'#8aadf4',label:'Follows'}]);
  }
}

function cycleContentStatus(id) {
  if (!D.etsy.growth.contentCalendar) return;
  const entry = D.etsy.growth.contentCalendar.find(c => c.id === id);
  if (!entry) return;
  const cycle = { drafted: 'scheduled', scheduled: 'posted', posted: 'drafted' };
  entry.status = cycle[entry.status] || 'drafted';
  save(); toast(entry.status.charAt(0).toUpperCase() + entry.status.slice(1) + ' \u2726'); renderPage(currentPage);
}

function deleteContentEntry(id) {
  if (!D.etsy.growth.contentCalendar) return;
  D.etsy.growth.contentCalendar = D.etsy.growth.contentCalendar.filter(function(c){return c.id !== id});
  save(); toast('Removed'); renderPage(currentPage);
}

function saveContentEdit(id) {
  var c = D.etsy.growth.contentCalendar.find(function(x){return x.id===id});
  if (!c) return;
  var title = document.getElementById('m-ec-title').value.trim();
  if (!title) { toast('Enter a title'); return; }
  c.title = title;
  c.contentType = document.getElementById('m-ec-type').value;
  c.productId = document.getElementById('m-ec-product').value || '';
  c.platform = document.getElementById('m-ec-platform').value;
  c.date = document.getElementById('m-ec-date').value || todayStr();
  c.status = document.getElementById('m-ec-status').value;
  c.notes = document.getElementById('m-ec-notes').value.trim();
  if (c.status === 'posted') {
    var likesEl = document.getElementById('m-ec-likes');
    var savesEl = document.getElementById('m-ec-saves');
    var clicksEl = document.getElementById('m-ec-clicks');
    c.engagement = {
      likes: likesEl ? Number(likesEl.value)||0 : (c.engagement||{}).likes||0,
      saves: savesEl ? Number(savesEl.value)||0 : (c.engagement||{}).saves||0,
      clicks: clicksEl ? Number(clicksEl.value)||0 : (c.engagement||{}).clicks||0
    };
  }
  save(); closeModal(); toast('Updated \u2726'); renderPage(currentPage);
}

function openProductDetail(id) {
  const p = D.etsy.products.find(x=>x.id===id);
  if (!p) return;
  if (!p.checklist) p.checklist = {};
  if (!p.activityLog) p.activityLog = [];
  // Migrate tags from string to array if needed
  if (typeof p.tags === 'string' && p.tags) { p.tags = p.tags.split(',').map(t=>t.trim()).filter(Boolean); save(); }
  if (!Array.isArray(p.tags)) p.tags = [];

  let stageOpts = '';
  STAGES.forEach(s => { stageOpts += '<option value="'+s+'"'+(p.stage===s?' selected':'')+'>'+STAGE_LABELS[s]+'</option>'; });

  // Build tag pills HTML
  let tagPillsHtml = '';
  p.tags.forEach((tag,i) => {
    tagPillsHtml += '<span class="tag-pill">'+esc(tag)+'<span class="tag-x" onclick="removeProductTag(\''+id+'\','+i+')">\u2715</span></span>';
  });

  // Build checklist HTML for current stage
  let checklistHtml = '<div style="border-top:1px solid var(--surface0);padding-top:0.75rem;margin-top:0.5rem">';
  checklistHtml += '<div class="label" style="margin-bottom:0.4rem">'+STAGE_LABELS[p.stage]+' Checklist</div>';
  const items = STAGE_CHECKLISTS[p.stage] || [];
  items.forEach((item,i) => {
    const key = p.stage+'_'+i;
    const checked = p.checklist[key] ? 'checked' : '';
    checklistHtml += '<div class="stage-check"><input type="checkbox" id="chk_'+key+'" '+checked+' onchange="toggleCheck(\''+id+'\',\''+key+'\',this.checked)"><label for="chk_'+key+'">'+esc(item)+'</label></div>';
  });
  checklistHtml += '</div>';

  // Build activity log HTML
  let logHtml = '<div style="border-top:1px solid var(--surface0);padding-top:0.75rem;margin-top:0.75rem">';
  logHtml += '<div class="label" style="margin-bottom:0.4rem">Activity Log</div>';
  logHtml += '<div style="display:flex;gap:0.4rem;margin-bottom:0.5rem">';
  logHtml += '<input class="form-input" id="m-log-text" placeholder="e.g. Researched competitors, price range \u00a33\u2013\u00a38" style="flex:1;font-size:0.8rem;padding:0.35rem 0.6rem">';
  logHtml += '<button class="btn btn-sm btn-cream" onclick="addProductNote(\''+id+'\')">+</button></div>';
  if (p.activityLog.length > 0) {
    p.activityLog.slice().reverse().forEach(entry => {
      logHtml += '<div class="log-entry"><span class="log-date">'+fmtDateShort(entry.date)+'</span><span class="log-text">'+esc(entry.text)+'</span></div>';
    });
  } else {
    logHtml += '<p style="color:var(--overlay0);font-size:0.75rem">No notes yet \u2014 log your progress as you work</p>';
  }
  logHtml += '</div>';

  // Build SEO feedback HTML
  const seo = seoHealth(p);
  let seoFeedbackHtml = '<div style="border-top:1px solid var(--surface0);padding-top:0.75rem;margin-top:0.5rem">';
  seoFeedbackHtml += '<div class="label" style="margin-bottom:0.4rem">SEO Feedback <span class="seo-dot '+seo.cls+'" style="margin-left:0.3rem"></span> <span style="font-size:0.7rem;color:var(--overlay1)">'+seo.score+'/'+seo.max+' \u2014 '+seo.label+'</span></div>';
  if (seo.tips && seo.tips.length > 0) {
    seo.tips.forEach(function(tip) {
      const tipColor = tip.type === 'good' ? 'var(--green)' : tip.type === 'warn' ? 'var(--yellow)' : 'var(--red)';
      const tipIcon = tip.type === 'good' ? '\u2713' : tip.type === 'warn' ? '\u26a0' : '\u2717';
      seoFeedbackHtml += '<div style="font-size:0.72rem;color:'+tipColor+';padding:0.15rem 0">'+tipIcon+' '+esc(tip.text)+'</div>';
    });
  }
  seoFeedbackHtml += '</div>';

  // Seasonal tag analysis
  const seasonalInfo = getSeasonalTagInfo(p.tags);
  let seasonalHtml = '';
  if (seasonalInfo.current.length > 0 || seasonalInfo.upcoming.length > 0 || seasonalInfo.outOfSeason.length > 0) {
    seasonalHtml = '<div style="border-top:1px solid var(--surface0);padding-top:0.75rem;margin-top:0.5rem">';
    seasonalHtml += '<div class="label" style="margin-bottom:0.4rem">Seasonal Tags</div>';
    if (seasonalInfo.current.length > 0) {
      seasonalHtml += '<div style="font-size:0.72rem;color:var(--green);padding:0.15rem 0">\u2713 In season now: ' + seasonalInfo.current.map(function(t){return esc(t.tag)}).join(', ') + '</div>';
    }
    if (seasonalInfo.upcoming.length > 0) {
      seasonalHtml += '<div style="font-size:0.72rem;color:var(--blue);padding:0.15rem 0">\u2197 Coming up: ' + seasonalInfo.upcoming.map(function(t){return esc(t.tag)}).join(', ') + ' \u2014 consider swapping in soon</div>';
    }
    if (seasonalInfo.outOfSeason.length > 0) {
      seasonalHtml += '<div style="font-size:0.72rem;color:var(--yellow);padding:0.15rem 0">\u26a0 Out of season: ' + seasonalInfo.outOfSeason.map(function(t){return esc(t.tag)}).join(', ') + ' \u2014 swap for current seasonal keywords</div>';
    }
    seasonalHtml += '</div>';
  }

  // Photo checklist
  const photoCount = p.photoCount || 0;
  let photoHtml = '<div style="display:flex;align-items:center;gap:0.3rem;margin-top:0.2rem">';
  for (let pi = 0; pi < 10; pi++) {
    photoHtml += '<div style="width:14px;height:14px;border-radius:3px;border:1px solid '+(pi < photoCount ? 'var(--green)' : 'var(--surface1)')+';background:'+(pi < photoCount ? 'var(--green)' : 'transparent')+';font-size:8px;display:flex;align-items:center;justify-content:center;color:var(--base)">'+(pi < photoCount ? '\u2713' : '')+'</div>';
  }
  photoHtml += '<span style="font-size:0.68rem;color:var(--overlay1);margin-left:0.3rem">'+photoCount+'/10 photos</span></div>';

  // Conversion rate
  const pSales = (D.etsy.productSales||[]).filter(function(s){return s.productId===id});
  const totalProductSales = pSales.reduce(function(sum,s){return sum+(s.quantity||1)},0);
  const convRate = (p.productViews||0) > 0 ? ((totalProductSales / p.productViews) * 100).toFixed(1) : null;
  let convHtml = '';
  var favCount = p.productFavourites || 0;
  var favRate = (p.productViews||0) > 0 ? ((favCount / p.productViews) * 100).toFixed(1) : null;
  if (p.productViews > 0 || totalProductSales > 0 || favCount > 0) {
    convHtml = '<div style="border-top:1px solid var(--surface0);padding-top:0.75rem;margin-top:0.5rem">';
    convHtml += '<div class="label" style="margin-bottom:0.4rem">Performance</div>';
    convHtml += '<div style="display:flex;gap:1.5rem;font-size:0.82rem;flex-wrap:wrap">';
    convHtml += '<div><span style="color:var(--blue);font-weight:600">'+(p.productViews||0)+'</span> <span style="color:var(--overlay1)">views</span></div>';

        <div class="tag-input-wrap" onclick="document.getElementById('m-ep-tag-input').focus()">

function addProductTagFromModal(id, input) {
  const p = D.etsy.products.find(x=>x.id===id);
  if (!p) return;
  if (!Array.isArray(p.tags)) p.tags = [];
  const tag = input.value.trim();
  if (!tag) return;
  if (p.tags.length >= 13) { toast('Maximum 13 tags'); return; }
  if (p.tags.some(t => t.toLowerCase() === tag.toLowerCase())) { toast('Tag already exists'); input.value=''; return; }
  p.tags.push(tag);
  save();
  openProductDetail(id);
}

function removeProductTag(id, index) {
  const p = D.etsy.products.find(x=>x.id===id);
  if (!p || !Array.isArray(p.tags)) return;
  p.tags.splice(index, 1);
  save();
  openProductDetail(id);
}

function toggleCheck(productId, key, val) {
  const p = D.etsy.products.find(x=>x.id===productId);
  if (!p) return;
  if (!p.checklist) p.checklist = {};
  p.checklist[key] = val;
  save();
}

function addProductNote(id) {
  const p = D.etsy.products.find(x=>x.id===id);
  if (!p) return;
  const input = document.getElementById('m-log-text');
  const text = input ? input.value.trim() : '';
  if (!text) { toast('Enter a note'); return; }
  if (!p.activityLog) p.activityLog = [];
  p.activityLog.push({ date: todayStr(), text });
  save();
  toast('Note added \u2726');
  // Re-open the modal to refresh log display
  openProductDetail(id);
}

function updateProduct(id) {
  const p = D.etsy.products.find(x=>x.id===id);
  if (!p) return;
  p.name = document.getElementById('m-ep-name').value.trim();
  p.listingTitle = document.getElementById('m-ep-listingtitle').value.trim();
  p.description = document.getElementById('m-ep-desc').value.trim();
  p.notes = document.getElementById('m-ep-notes').value.trim();
  // Tags are managed live via addProductTagFromModal/removeProductTag — no need to read here
  p.price = document.getElementById('m-ep-price').value ? Number(document.getElementById('m-ep-price').value) : null;
  p.category = document.getElementById('m-ep-category').value.trim();
  p.featured = document.getElementById('m-ep-featured').checked;
  p.inAds = document.getElementById('m-ep-inads').checked;
  p.listedDate = document.getElementById('m-ep-listeddate').value || '';
  p.photoCount = Number(document.getElementById('m-ep-photos').value) || 0;
  p.competitorPriceRange = document.getElementById('m-ep-competitor').value.trim();
  p.productViews = Number(document.getElementById('m-ep-views').value) || 0;
  p.productFavourites = Number(document.getElementById('m-ep-favs').value) || 0;
  p.status = document.getElementById('m-ep-status').value || 'active';
  p.searchRankNotes = document.getElementById('m-ep-searchrank').value.trim();
  p.lastRefreshed = p.lastRefreshed || '';
  const newStage = document.getElementById('m-ep-stage').value;
  if (newStage !== p.stage) {
    p.stage = newStage;
    p.stageChangedDate = todayStr();
  }
  save(); closeModal(); toast('Updated \u2726'); renderPage(currentPage);
}

function deleteProduct(id) {
  D.etsy.products = D.etsy.products.filter(p=>p.id!==id);
  save(); closeModal(); toast('Removed'); renderPage(currentPage);
}

function submitLaunch() {
  var name = document.getElementById('m-launch-name').value.trim();
  var date = document.getElementById('m-launch-date').value;
  if (!name||!date) { toast('Enter name and date'); return; }
  var productId = document.getElementById('m-launch-product').value || null;
  var autoContent = document.getElementById('m-launch-autocontent').checked;
  var launchId = uid();
  D.etsy.launches.push({
    id: launchId,
    name: name,
    date: date,
    notes: document.getElementById('m-launch-notes').value.trim(),
    productId: productId,
    checklist: {},
    postLaunchStats: null
  });
  // Auto-generate content calendar entries if checked
  if (autoContent) {
    if (!D.etsy.growth.contentCalendar) D.etsy.growth.contentCalendar = [];
    var launchDate = new Date(date);
    // Teaser: 3 days before
    var teaserDate = new Date(launchDate); teaserDate.setDate(teaserDate.getDate()-3);
    var teaserStr = teaserDate.toISOString().split('T')[0];
    D.etsy.growth.contentCalendar.push({
      id: uid(), title: '\ud83d\udce3 Teaser: '+name, platform: 'instagram',
      date: teaserStr, status: 'drafted',
      notes: 'Auto-created for launch: '+name+'. Build anticipation \u2014 sneak peek, countdown, or behind-the-scenes.'
    });
    // Launch day post
    D.etsy.growth.contentCalendar.push({
      id: uid(), title: '\ud83d\ude80 Launch day: '+name, platform: 'instagram',
      date: date, status: 'drafted',
      notes: 'Auto-created for launch: '+name+'. Announce the launch! Link in bio, key features, promo code if applicable.'
    });
    // Follow-up: 2 days after
    var followDate = new Date(launchDate); followDate.setDate(followDate.getDate()+2);
    var followStr = followDate.toISOString().split('T')[0];
    D.etsy.growth.contentCalendar.push({
      id: uid(), title: '\ud83d\udd01 Follow-up: '+name, platform: 'instagram',
      date: followStr, status: 'drafted',
      notes: 'Auto-created for launch: '+name+'. Share early feedback, reviews, or a different angle on the product.'
    });
    toast('Launch planned + 3 content entries created \u2726');
  } else {
    toast('Launch planned \u2726');
  }
  save(); closeModal(); renderPage(currentPage);
}

function deleteLaunch(id) { D.etsy.launches = D.etsy.launches.filter(function(l){return l.id!==id}); save(); toast('Removed'); renderPage(currentPage); }

function openLaunchDetail(id) {
  var l = (D.etsy.launches||[]).find(function(x){return x.id===id});
  if (!l) return;
  var readiness = launchReadiness(l);
  var dLeft = daysUntil(l.date);
  var isPast = dLeft < 0;
  // Build checklist HTML
  var checklistHtml = '';
  LAUNCH_PREP_CHECKLIST.forEach(function(item, i) {
    var checked = (l.checklist && l.checklist[i]) ? ' checked' : '';
    var doneStyle = checked ? 'text-decoration:line-through;opacity:0.6' : '';
    checklistHtml += '<label style="display:flex;align-items:flex-start;gap:0.5rem;padding:0.35rem 0;font-size:0.78rem;color:var(--text);cursor:pointer;'+doneStyle+'">';
    checklistHtml += '<input type="checkbox" data-check-idx="'+i+'"'+checked+' onchange="toggleLaunchCheck(\''+l.id+'\','+i+',this.checked)">';
    checklistHtml += '<span>'+esc(item)+'</span></label>';
  });
  // Linked product info
  var productHtml = '';
  if (l.productId) {
    var p = (D.etsy.products||[]).find(function(x){return x.id===l.productId});
    if (p) {
      var seo = seoHealth(p);
      productHtml = '<div style="background:var(--surface0);border-radius:8px;padding:0.75rem;margin-bottom:0.75rem">';
      productHtml += '<div style="font-size:0.78rem;color:var(--overlay0);margin-bottom:0.35rem">Linked Product</div>';
      productHtml += '<div style="display:flex;justify-content:space-between;align-items:center">';
      productHtml += '<div><span style="color:var(--peach);font-weight:600;cursor:pointer" onclick="closeModal();openProductDetail(\''+p.id+'\')">'+esc(p.name)+'</span>';
      productHtml += ' <span class="'+seo.cls+'" style="font-size:0.7rem;padding:0.15rem 0.4rem;border-radius:4px">SEO '+seo.score+'/'+seo.max+'</span></div>';
      productHtml += '<div style="font-size:0.72rem;color:var(--overlay1)">'+STAGE_LABELS[p.stage]+'</div>';
      productHtml += '</div>';
      if (readiness.productWarnings.length > 0) {
        productHtml += '<div style="margin-top:0.4rem">';
        readiness.productWarnings.forEach(function(w) {

  } else if (dLeft === 0) {
    countdownHtml = '<span style="font-size:0.75rem;color:var(--green);font-weight:600">\u2726 Launch day!</span>';
  } else {
    countdownHtml = '<span style="font-size:0.75rem;color:var(--peach)">'+dLeft+' day'+(dLeft===1?'':'s')+' to go</span>';
  }
  openModal('\
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">\
      <div><h2 style="font-size:1.05rem;color:var(--cream);margin-bottom:0.2rem">'+esc(l.name)+'</h2>\
        <div style="font-size:0.78rem;color:var(--overlay1)">'+fmtDate(l.date)+' \u00b7 '+countdownHtml+'</div></div>\
      <span class="'+readiness.cls+'" style="font-size:0.72rem;padding:0.2rem 0.55rem;border-radius:5px">'+readiness.pct+'% '+readiness.label+'</span>\
    </div>\

    <div style="margin-bottom:0.75rem">\
      <div style="font-size:0.8rem;color:var(--cream);margin-bottom:0.5rem;font-weight:600">Launch Prep Checklist <span style="font-size:0.68rem;font-weight:400;color:var(--overlay0)">'+readiness.done+'/'+readiness.total+'</span></div>\

      </div>\

    '+postHtml+'\

      <button class="btn btn-cream" onclick="saveLaunchDetail(\''+l.id+'\')">Save</button>\

function openDayLaunches(dateStr) {
  var dayLaunches = (D.etsy.launches||[]).filter(function(l){return l.date===dateStr});
  // Also check for renewals on this day
  var renewals = [];
  (D.etsy.products||[]).forEach(function(p) {
    if ((p.status||'active') === 'retired' || p.stage !== 'listed') return;
    var exp = listingExpiry(p);
    if (exp && exp.nextExpiry === dateStr) renewals.push(p);
  });
  if (dayLaunches.length === 0 && renewals.length === 0) {
    openAddLaunchModal(null, dateStr.substring(0,7));
    return;
  }
  var h = '<h2 style="font-size:1.05rem;color:var(--cream);margin-bottom:1rem">'+fmtDate(dateStr)+'</h2>';
  // Show launches
  dayLaunches.forEach(function(l) {
    var readiness = launchReadiness(l);
    var product = l.productId ? (D.etsy.products||[]).find(function(x){return x.id===l.productId}) : null;
    h += '<div style="padding:0.6rem 0;border-bottom:1px solid var(--surface0)">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center">';
    h += '<span style="font-size:0.9rem;color:var(--peach);cursor:pointer" onclick="closeModal();openLaunchDetail(\''+l.id+'\')">'+esc(l.name)+'</span>';
    h += '<span class="'+readiness.cls+'" style="font-size:0.68rem;padding:0.12rem 0.4rem;border-radius:4px">'+readiness.pct+'%</span>';
    h += '</div>';
    if (product) h += '<div style="font-size:0.72rem;color:var(--overlay0);margin-top:0.15rem">\u2192 '+esc(product.name)+'</div>';
    if (l.notes) h += '<div style="font-size:0.75rem;color:var(--overlay1);margin-top:0.2rem">'+esc(l.notes)+'</div>';
    h += '</div>';
  });
  // Show renewals
  if (renewals.length > 0) {
    h += '<div style="margin-top:0.75rem;padding-top:0.5rem;border-top:1px solid var(--surface0)">';
    h += '<div style="font-size:0.72rem;color:var(--blue);margin-bottom:0.35rem">\u21bb Listing Renewals</div>';
    renewals.forEach(function(p) {
      h += '<div style="font-size:0.78rem;color:var(--overlay1);padding:0.15rem 0">'+esc(p.name)+'</div>';
    });
    h += '</div>';
  }
  h += '<div style="display:flex;gap:0.5rem;margin-top:1rem">';
  h += '<button class="btn btn-sm btn-cream" onclick="closeModal();openAddLaunchModal(null,\''+dateStr.substring(0,7)+'\')">+ Add Launch</button>';
  h += '<button class="btn btn-ghost" onclick="closeModal()">Close</button></div>';
  openModal(h);
}

function renderSaleRow(s, status) {
  var h = '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0;border-bottom:1px solid var(--surface0)">';
  h += '<div style="flex:1;cursor:pointer" onclick="openSaleDetail(\''+s.id+'\')">';
  h += '<span style="font-size:0.85rem;color:'+(status==='active'?'var(--green)':status==='upcoming'?'var(--yellow)':'var(--overlay1)')+'">'+esc(s.name)+'</span>';
  h += ' <span style="font-size:0.72rem;color:var(--overlay1)">'+fmtDateShort(s.startDate)+' \u2192 '+fmtDateShort(s.endDate)+'</span>';
  if (s.discount) h += ' <span class="chip chip-warn" style="font-size:0.58rem">'+esc(s.discount)+'</span>';
  if (s.couponCode) h += ' <span class="chip chip-dim" style="font-size:0.58rem">\ud83c\udf9f '+esc(s.couponCode)+'</span>';
  // Show linked products count
  var linkedProducts = (s.productIds||[]).length;
  if (linkedProducts > 0) h += ' <span style="font-size:0.65rem;color:var(--overlay0)">'+linkedProducts+' product'+(linkedProducts!==1?'s':'')+'</span>';
  // Show results for past sales
  if (status === 'past' && s.results) {
    h += '<div style="font-size:0.72rem;color:var(--subtext0);margin-top:0.15rem">';
    if (s.results.revenue) h += '\u00a3'+s.results.revenue.toFixed(2)+' revenue';
    if (s.results.orders) h += ' \u00b7 '+s.results.orders+' orders';
    if (s.results.viewsUplift) h += ' \u00b7 '+s.results.viewsUplift+'% views uplift';
    h += '</div>';
  }
  h += '</div>';
  h += '<button class="btn-xs btn-ghost" onclick="deleteSale(\''+s.id+'\')">\u2715</button></div>';
  return h;
}

function submitSale() {
  var name = document.getElementById('m-sale-name').value.trim();
  var startDate = document.getElementById('m-sale-start').value;
  var endDate = document.getElementById('m-sale-end').value;
  if (!name||!startDate||!endDate) { toast('Fill in name and dates'); return; }
  var productIds = [];
  document.querySelectorAll('.sale-product-cb:checked').forEach(function(cb){productIds.push(cb.value)});
  D.etsy.sales.push({
    id:uid(), name:name, startDate:startDate, endDate:endDate,
    discount: document.getElementById('m-sale-discount').value.trim(),
    couponCode: document.getElementById('m-sale-coupon').value.trim(),
    productIds: productIds,
    notes: document.getElementById('m-sale-notes').value.trim(),
    results: null
  });
  save(); closeModal(); toast('Sale planned \u2726'); renderPage(currentPage);
}

    prodHtml = '<div style="margin-bottom:0.5rem"><div style="font-size:0.72rem;color:var(--overlay0);margin-bottom:0.2rem">Products</div>';
    (s.productIds||[]).forEach(function(pid) {
      var p = (D.etsy.products||[]).find(function(x){return x.id===pid});
      if (p) prodHtml += '<span class="chip chip-peach" style="font-size:0.65rem;margin-right:0.2rem">'+esc(p.name)+'</span>';
    });

  var resultsHtml = '';

    resultsHtml += '<div><label class="form-label">Views Uplift %</label><input class="form-input" type="number" id="m-sr-views" value="'+(r.viewsUplift||'')+'"></div>';
    resultsHtml += '<div><label class="form-label">Coupon Uses</label><input class="form-input" type="number" id="m-sr-couponuses" min="0" value="'+(r.couponUses||'')+'"></div>';
    resultsHtml += '</div>';
    resultsHtml += '<div style="margin-top:0.5rem"><label class="form-label">Learnings</label><textarea class="form-textarea" id="m-sr-notes" placeholder="What worked? What would you change?">'+(r.notes?esc(r.notes):'')+'</textarea></div>';

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">\

    </div>\
    '+prodHtml+'\
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;font-size:0.82rem;margin-bottom:0.5rem">\

function drawLineChart(canvasId, data, lines) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width*dpr; canvas.height = rect.height*dpr;
  ctx.scale(dpr,dpr);
  const w = rect.width, h = rect.height;
  const padL=8, padR=8, padT=12, padB=24;
  const plotW=w-padL-padR, plotH=h-padT-padB;

  let maxVal = 0;
  lines.forEach(line => { data.forEach(d => { if (d[line.key]>maxVal) maxVal=d[line.key]; }); });
  if (maxVal===0) maxVal=1;

  ctx.strokeStyle='rgba(202,211,245,0.06)'; ctx.lineWidth=1;
  for (let i=0;i<=3;i++) { const y=padT+(plotH/3)*i; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); }

  lines.forEach(line => {
    ctx.strokeStyle=line.color; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.beginPath();
    data.forEach((d,i) => {
      const x=padL+(plotW/(data.length-1))*i;
      const y=padT+plotH-(d[line.key]/maxVal)*plotH;
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
    data.forEach((d,i) => {
      const x=padL+(plotW/(data.length-1))*i;
      const y=padT+plotH-(d[line.key]/maxVal)*plotH;
      ctx.fillStyle=line.color; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    });
  });

  ctx.fillStyle='#6e738d'; ctx.font='10px Lora'; ctx.textAlign='center';
  data.forEach((d,i) => {
    const x=padL+(plotW/(data.length-1))*i;
    ctx.fillText(d.week?d.week.slice(5):(i+1), x, h-4);
  });

  ctx.font='10px Lora'; let legendX=padL;
  lines.forEach(line => {
    ctx.fillStyle=line.color; ctx.fillRect(legendX,2,10,3);
    ctx.fillStyle='#8087a2'; ctx.textAlign='left'; ctx.fillText(line.label,legendX+13,8);
    legendX += ctx.measureText(line.label).width+28;
  });
}

        if (!imported.uni && !imported.etsy) {

// ============================================================
// COUNT-UP ANIMATION
// ============================================================
function animateCountUps() {
  document.querySelectorAll('.count-up').forEach(el => {
    const target = el.dataset.target;
    if (!target) return;
    const isFloat = target.includes('.');
    const end = parseFloat(target);
    const prefix = el.dataset.prefix || '';
    const suffix = el.dataset.suffix || '';
    const dec = el.dataset.decimals ? parseInt(el.dataset.decimals) : (isFloat ? 2 : 0);
    const duration = 600;
    const start = performance.now();
    function step(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = eased * end;
      el.textContent = prefix + (dec > 0 ? current.toFixed(dec) : Math.round(current)) + suffix;
      if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

let draggedProductId = null;
function initKanbanDrag() {
  document.querySelectorAll('.kanban-card[data-product-id]').forEach(card => {

    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));

      e.preventDefault(); col.classList.remove('drag-over');
      if (!draggedProductId) return;
      const p = D.etsy.products.find(x => x.id === draggedProductId);
      if (!p) return;
      const newStage = col.dataset.stage;
      if (p.stage !== newStage) { p.stage = newStage; p.stageChangedDate = todayStr(); save(); toast('Moved to '+STAGE_LABELS[newStage]+' \u2726'); renderEtsy(); }
      draggedProductId = null;
    });
  });
}

// STREAK TRACKER
// ============================================================
function getLoggingStreak() {
  const stats = D.etsy.weeklyStats;
  if (stats.length === 0) return 0;
  const sorted = [...stats].sort((a,b) => b.week.localeCompare(a.week));
  let streak = 1;
  for (let i = 1; i < sorted.length; i++) {
    const prevDate = new Date(sorted[i-1].week+'T00:00:00');
    const curDate = new Date(sorted[i].week+'T00:00:00');
    const diff = (prevDate - curDate) / (86400000 * 7);
    if (diff >= 0.5 && diff <= 1.5) streak++;
    else break;
  }
  return streak;
}

function runSearch(query) {

  // Assignments
  getAllAssignments().forEach(a => {

      results.push({type:'Assignment', typeColor:'var(--lavender)', label:a.name, sub:a.moduleCode+(a.score!=null?' — '+a.score+'%':''), action:"closeSearch();navigate('uni')"});
  });
  // Deadlines
  getAllDeadlines().forEach(d => {
    if (d.name.toLowerCase().includes(q) || (d.moduleCode||'').toLowerCase().includes(q))
      results.push({type:'Deadline', typeColor:'var(--yellow)', label:d.name, sub:fmtDateShort(d.date), action:"closeSearch();navigate('uni')"});
  });
  // Reviews
  (D.etsy.reviews||[]).forEach(r => {
    if ((r.quote||'').toLowerCase().includes(q) || (r.customerName||'').toLowerCase().includes(q))
      results.push({type:'Review', typeColor:'var(--yellow)', label:(r.quote||'').slice(0,50)+(r.quote&&r.quote.length>50?'...':''), sub:r.stars+'\u2605 '+(r.customerName||''), action:"closeSearch();navigate('etsy');setTimeout(()=>switchEtsyTab('reviews'),150)"});
  });
  // Inspiration
  (D.etsy.growth.inspirationBoard||[]).forEach(i => {
    if (i.title.toLowerCase().includes(q) || (i.notes||'').toLowerCase().includes(q))
      results.push({type:'Inspiration', typeColor:'var(--teal)', label:i.title, sub:i.notes?i.notes.slice(0,40):'', action:"closeSearch();navigate('etsy');setTimeout(()=>switchEtsyTab('growth'),150)"});
  });
  let h = '';
  if (results.length === 0) h = '<div style="padding:1rem;text-align:center;color:var(--overlay1);font-size:0.82rem">No results for "'+esc(query)+'"</div>';
  else results.slice(0,12).forEach(r => {
    h += '<div class="search-hit" onclick="'+r.action+'">';
    h += '<span class="search-hit-type" style="background:'+r.typeColor+'20;color:'+r.typeColor+'">'+r.type+'</span>';
    h += '<div style="flex:1;min-width:0"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.label)+'</div>';
    if (r.sub) h += '<div style="font-size:0.7rem;color:var(--overlay1)">'+esc(r.sub)+'</div>';
    h += '</div></div>';
  });
  document.getElementById('search-results').innerHTML = h;
}

function getSmartNudges() {
  const nudges = [];
  const dismissed = D.dismissedNudges || [];
  function add(id, icon, text) { if (!dismissed.includes(id)) nudges.push({id, icon, text}); }
  // Stale stats
  const lastStat = D.etsy.weeklyStats.slice(-1)[0];
  if (lastStat) {
    const daysSince = Math.round((today() - new Date(lastStat.week+'T00:00:00')) / 86400000);
    if (daysSince > 10) add('stale-stats', '\ud83d\udcca', 'You haven\'t logged Etsy stats in '+daysSince+' days \u2014 keep that streak going!');
  } else { add('no-stats', '\ud83d\udcca', 'You haven\'t logged any Etsy stats yet \u2014 start tracking to see your progress!'); }
  // Stalled products
  const stalled = (D.etsy.products||[]).filter(p => {
    if (p.stage === 'listed') return false;
    const d = p.stageChangedDate || p.dateAdded;
    return d && Math.round((today() - new Date(d+'T00:00:00')) / 86400000) > 21;
  });
  if (stalled.length > 0) add('stalled-products', '\ud83d\udd04', stalled.length+' product'+(stalled.length>1?'s have':' has')+' been stuck for 3+ weeks \u2014 move forward or shelve?');
  // Low SEO
  const lowSeo = (D.etsy.products||[]).filter(p => p.stage === 'listed' && seoHealth(p).score < 2);
  if (lowSeo.length > 0) add('low-seo', '\ud83d\udd0d', lowSeo.length+' listed product'+(lowSeo.length>1?'s have':' has')+' incomplete SEO \u2014 tags and descriptions boost visibility!');
  // Upcoming deadlines
  const urgentDeadlines = getAllDeadlines().filter(d => { const days = daysUntil(d.date); return days >= 0 && days <= 5; });
  if (urgentDeadlines.length > 0) add('urgent-deadline', '\ud83d\udcc5', urgentDeadlines[0].name+' is due in '+daysUntil(urgentDeadlines[0].date)+' day'+(daysUntil(urgentDeadlines[0].date)!==1?'s':'')+'!');
  // No focus set today
  if (!D.focusToday || D.focusTodayDate !== todayStr()) add('no-focus', '\ud83c\udfaf', 'Set your focus for today \u2014 what\'s the one thing that matters most?');
  return nudges;
}
function dismissNudge(id) {
  if (!D.dismissedNudges) D.dismissedNudges = [];
  D.dismissedNudges.push(id);
  save();
  renderPage(currentPage);
}

    contentDue.forEach(c => { h += '<div style="font-size:0.82rem;color:var(--subtext0)">\u2022 '+esc(c.title)+' ('+esc(c.platform)+') \u2014 '+esc(c.status)+'</div>'; });
    h += '</div>';
  } else h += '<p style="font-size:0.82rem;color:var(--subtext0);margin-top:0.3rem">Nothing scheduled \u2014 plan some content!</p>';
  h += '</div>';

  h += '<div class="review-step"><span class="review-step-num">5</span><strong>Set Next Week\'s Focus</strong>';
  h += '<input class="form-input" id="m-wr-goal" style="margin-top:0.4rem" placeholder="What\'s your #1 goal for next week?" value="'+esc(D.weeklyGoal)+'">';
  h += '</div>';

  h += '<div class="grid-2" style="gap:0.75rem;margin-top:1rem">';
  h += '<button class="btn btn-cream" onclick="D.weeklyGoal=document.getElementById(\'m-wr-goal\').value;save();closeModal();toast(\'Weekly review complete \u2726\')">Done \u2726</button>';
  h += '<button class="btn btn-ghost" onclick="closeModal()">Close</button></div>';
  openModal(h);
}

// ============================================================
// PRINT / PDF EXPORT
// ============================================================
function printSummary() {
  // Build a printable summary in a new window
  const stats = D.etsy.weeklyStats.slice(-1)[0];
  const bl = D.etsy.baseline || {};
  const allRevenue = D.etsy.weeklyStats.reduce((s,w) => s+(w.revenue||0), 0) + (bl.revenue||0);
  const allOrders = D.etsy.weeklyStats.reduce((s,w) => s+(w.orders||0), 0) + (bl.orders||0);
  const assignments = getAllAssignments().filter(a => a.score != null).sort((a,b) => (b.dateAdded||'').localeCompare(a.dateAdded||'')).slice(0,10);
  const deadlines = getAllDeadlines().filter(d => daysUntil(d.date) >= 0).slice(0,8);
  const listed = (D.etsy.products||[]).filter(p => p.stage === 'listed');

  let html = '<!DOCTYPE html><html><head><title>Projects Summary</title>';
  html += '<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap" rel="stylesheet">';
  html += '<style>body{font-family:Lora,serif;max-width:700px;margin:2rem auto;color:#222;line-height:1.6}h1{font-size:1.4rem;border-bottom:2px solid #e8dcc8;padding-bottom:0.5rem}h2{font-size:1rem;color:#666;margin-top:1.5rem}table{width:100%;border-collapse:collapse;margin:0.5rem 0}td,th{padding:0.4rem 0.6rem;text-align:left;border-bottom:1px solid #eee;font-size:0.85rem}th{color:#888;font-weight:600;font-size:0.75rem;text-transform:uppercase}.num{font-weight:700;font-size:1.1rem}</style></head><body>';
  html += '<h1>Projects Summary \u2014 '+fmtDate(todayStr())+'</h1>';

  // Etsy overview
  html += '<h2>Etsy Overview</h2>';
  html += '<table><tr><td>All-time Revenue</td><td class="num">\u00a3'+allRevenue.toFixed(2)+'</td>';
  html += '<td>All-time Orders</td><td class="num">'+allOrders+'</td></tr>';
  html += '<tr><td>Listed Products</td><td class="num">'+listed.length+'</td>';
  html += '<td>Weeks Tracked</td><td class="num">'+D.etsy.weeklyStats.length+'</td></tr></table>';

  if (stats) {
    html += '<h2>This Week</h2>';
    html += '<table><tr><td>Views</td><td class="num">'+stats.views+'</td><td>Visits</td><td class="num">'+stats.visits+'</td></tr>';
    html += '<tr><td>Orders</td><td class="num">'+stats.orders+'</td><td>Revenue</td><td class="num">\u00a3'+(stats.revenue||0).toFixed(2)+'</td></tr></table>';
  }

  // Uni
  if (assignments.length > 0) {
    html += '<h2>Recent Scores</h2><table><tr><th>Assignment</th><th>Module</th><th>Score</th></tr>';
    assignments.forEach(a => { html += '<tr><td>'+esc(a.name)+'</td><td>'+esc(a.moduleCode)+'</td><td>'+a.score+'%</td></tr>'; });
    html += '</table>';
  }
  if (deadlines.length > 0) {
    html += '<h2>Upcoming Deadlines</h2><table><tr><th>Name</th><th>Date</th><th>Days Left</th></tr>';
    deadlines.forEach(d => { html += '<tr><td>'+esc(d.name)+'</td><td>'+fmtDate(d.date)+'</td><td>'+daysUntil(d.date)+'</td></tr>'; });
    html += '</table>';
  }

  html += '<div style="margin-top:2rem;font-size:0.75rem;color:#aaa;text-align:center">Generated from Projects Dashboard \u2726</div>';
  html += '</body></html>';
  const w = window.open('','_blank');
  w.document.write(html);
  w.document.close();
  w.print();
}

// ============================================================
// EMPTY STATE SVGs
// ============================================================
function triggerConfetti() {
  document.querySelectorAll('[data-confetti]').forEach(el => {
    const key = 'confetti_'+el.dataset.confetti;
    if (!sessionStorage.getItem(key)) {
      sessionStorage.setItem(key, '1');
      const rect = el.getBoundingClientRect();
      fireConfetti(rect.left + rect.width/2, rect.top);
    }
  });
}

function animateProgressBars() {
  document.querySelectorAll('.goal-fill, .dl-bar-fill, .yr-bar-fill').forEach(el => {
    el.classList.add('animate');
  });
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  // Ctrl+K or Cmd+K for search
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  // Escape closes search
  if (e.key === 'Escape' && document.getElementById('search-overlay').classList.contains('show')) { closeSearch(); }
  // Ctrl+Shift+A for quick add
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'A') { e.preventDefault(); toggleQuickEntry(); }
});
