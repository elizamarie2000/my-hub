<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="finances ✦">
  <meta name="theme-color" content="#24273a">
  <title>finances ✦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' fill='%23e8dcc8'/></svg>">
  <style>
    /* ── Catppuccin Macchiato ──────────────────────────── */
    :root {
      --base:      #24273a;
      --mantle:    #1e2030;
      --crust:     #181926;
      --surface0:  #363a4f;
      --surface1:  #494d64;
      --surface2:  #5b6078;
      --overlay0:  #6e738d;
      --overlay1:  #8087a2;
      --overlay2:  #939ab7;
      --subtext0:  #a5adcb;
      --subtext1:  #b8c0e0;
      --text:      #cad3f5;
      --lavender:  #b7bdf8;
      --blue:      #8aadf4;
      --sapphire:  #7dc4e4;
      --sky:       #91d7e3;
      --teal:      #8bd5ca;
      --cream:     #e8dcc8;
      --yellow:    #eed49f;
      --peach:     #f5a97f;
      --maroon:    #ee99a0;
      --red:       #ed8796;
      --mauve:     #c6a0f6;
      --pink:      #f5bde6;
      --flamingo:  #f0c6c6;
      --rosewater: #f4dbd6;

      --font: 'Lora', Georgia, 'Times New Roman', serif;
      --r:    12px;
      --r-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--base);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ── BACKGROUND TEXTURE ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(rgba(202,211,245,0.032) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    main { position: relative; z-index: 1; flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    nav { position: relative; z-index: 100; }

    /* ── REMOVE SCROLLBAR STYLES (iOS) ──────────────────── */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ── HEADER (WITH SAFE AREA) ────────────────────────── */
    header {
      padding: max(0.75rem, env(safe-area-inset-top)) 1rem 0.5rem;
      background: var(--mantle);
      border-bottom: 1px solid var(--surface0);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .header-home {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      flex-shrink: 0;
      color: var(--overlay1);
      text-decoration: none;
      -webkit-appearance: none;
      appearance: none;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-touch-callout: none;
    }

    .header-home:active { background: var(--surface0); opacity: 0.97; }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    /* ── BOTTOM NAVIGATION BAR ────────────────────────────– */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: stretch;
      justify-content: space-around;
      background: rgba(30,32,48,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--surface0);
      height: calc(70px + max(34px, env(safe-area-inset-bottom)));
      padding-bottom: max(34px, env(safe-area-inset-bottom));
    }

    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      background: none;
      border: none;
      color: var(--subtext0);
      font-family: var(--font);
      font-size: 0.65rem;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      -webkit-touch-callout: none;
      min-height: 44px;
    }

    .nav-tab:active { opacity: 0.97; }
    .nav-tab.active { color: var(--cream); }

    .nav-tab svg {
      width: 20px;
      height: 20px;
      stroke-width: 1.8;
    }

    /* ── PAGES ───────────────────────────────────────────── */
    .page { display: none; }
    .page.active {
      display: block;
      animation: pageIn 0.22s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CONTENT WRAPPER (MOBILE OPTIMIZED) ─────────────– */
    .content {
      max-width: 100%;
      margin: 0;
      padding: 1.25rem 1rem calc(110px + max(34px, env(safe-area-inset-bottom)));
    }

    /* ── CARDS ───────────────────────────────────────────── */
    .card {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: var(--r);
      padding: 1.25rem 1.4rem;
      transition: border-color 0.18s ease, opacity 0.18s ease;
      -webkit-touch-callout: none;
    }

    .card:active {
      opacity: 0.97;
      border-color: var(--surface1);
    }

    .card-inner {
      background: var(--surface0);
      border-radius: var(--r-sm);
      padding: 0.75rem 1rem;
    }

    /* ── LABEL ───────────────────────────────────────────── */
    .label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--overlay1);
      font-weight: 500;
    }

    /* ── AMOUNTS ─────────────────────────────────────────── */
    .amount-hero {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .amount-hero.tight { color: var(--yellow); }
    .amount-hero.danger { color: var(--red); }

    /* ── PROGRESS BAR ────────────────────────────────────── */
    .progress-track {
      background: var(--surface1);
      border-radius: 999px;
      height: 7px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── GRIDS (MOBILE RESPONSIVE) ────────────────────── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    /* ── CHIPS ───────────────────────────────────────────── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.7rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .chip-urgent  { background: rgba(237,135,150,.15); color: var(--red); }
    .chip-warn    { background: rgba(238,212,159,.15); color: var(--yellow); }
    .chip-ok      { background: rgba(232,220,200,.15); color: var(--cream); }
    .chip-dim     { background: var(--surface0); color: var(--overlay1); }
    .chip-mauve   { background: rgba(198,160,246,.12); color: var(--mauve); }
    .chip-blue    { background: rgba(138,173,244,.12); color: var(--blue); }

    /* ── BUTTONS (TOUCH OPTIMIZED) ────────────────────── */
    .btn {
      background: var(--surface0);
      color: var(--text);
      border: 1px solid var(--surface1);
      font-family: var(--font);
      font-size: 0.875rem;
      padding: 0.55rem 1.3rem;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-appearance: none;
      appearance: none;
      -webkit-touch-callout: none;
    }

    .btn:active { background: var(--surface1); opacity: 0.97; }

    .btn-cream {
      background: var(--cream);
      color: var(--crust);
      border-color: var(--cream);
      font-weight: 600;
    }

    .btn-cream:active { background: #ddd0b8; border-color: #ddd0b8; opacity: 0.97; }

    .btn-ghost {
      background: none;
      border: 1px solid var(--surface1);
    }

    .btn-ghost:active { background: var(--surface0); opacity: 0.97; }

    .btn-sm {
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      min-height: 36px;
    }

    /* ── FORM INPUTS (16px MINIMUM FOR iOS) ────────────– */
    .form-input {
      background: var(--surface0);
      border: 1px solid var(--surface1);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      padding: 0.75rem;
      border-radius: var(--r-sm);
      width: 100%;
      transition: border-color 0.15s;
      min-height: 44px;
      -webkit-appearance: none;
      appearance: none;
      -webkit-touch-callout: none;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--cream);
    }

    .form-input:active {
      border-color: var(--cream);
    }

    .form-label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--overlay1);
      margin-bottom: 0.35rem;
    }

    /* ── CASHFLOW STRIP ──────────────────────────────────– */
    .cf-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--surface0);
      min-height: 44px;
    }

    .cf-item:last-child { border-bottom: none; }

    .cf-date {
      font-size: 0.72rem;
      color: var(--overlay1);
      width: 4.5rem;
      flex-shrink: 0;
      text-align: right;
    }

    .cf-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cf-name { flex: 1; font-size: 0.88rem; }

    .cf-amount {
      font-size: 0.88rem;
      font-weight: 600;
    }

    .cf-badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* ── ZILCH ITEMS ────────────────────────────────────── */
    .zilch-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--surface0);
      transition: opacity 0.3s;
      min-height: 44px;
    }

    .zilch-item:last-child { border-bottom: none; }
    .zilch-item.paid { opacity: 0.35; }

    .zilch-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .zilch-date {
      font-size: 0.75rem;
      color: var(--overlay1);
      width: 1.8rem;
    }

    .zilch-day {
      font-size: 0.85rem;
    }

    .zilch-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .zilch-amount {
      font-size: 0.88rem;
      font-weight: 600;
    }

    .mark-btn {
      font-size: 0.65rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--surface1);
      background: none;
      color: var(--subtext0);
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
      min-height: 36px;
      -webkit-appearance: none;
      appearance: none;
      -webkit-touch-callout: none;
    }

    .mark-btn:active { background: var(--cream); color: var(--crust); border-color: var(--cream); opacity: 0.97; }
    .mark-btn.paid  { background: rgba(232,220,200,.12); color: var(--cream); border-color: transparent; cursor: default; }

    /* ── DEBT MINI CARDS ────────────────────────────────── */
    .debt-mini {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .util-track {
      height: 4px;
      border-radius: 999px;
      background: var(--surface1);
      overflow: hidden;
    }

    .util-fill {
      height: 100%;
      border-radius: 999px;
    }

    /* ── SECTION HEADER ────────────────────────────────── */
    .sec-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.65rem;
    }

    .sec-title {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--overlay1);
      font-weight: 500;
    }

    /* ── MOTIVATION BANNER ─────────────────────────────── */
    .motive-banner {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: var(--r);
      padding: 1.1rem 1.4rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
      -webkit-touch-callout: none;
    }

    .motive-icon {
      flex-shrink: 0;
      margin-top: 0.1rem;
      opacity: 0.7;
    }

    .motive-text {
      font-style: italic;
      color: var(--subtext1);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ── MODAL (BOTTOM SHEET STYLE) ────────────────────– */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(24,25,38,.88);
      z-index: 500;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      -webkit-touch-callout: none;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal-box {
      background: var(--mantle);
      border: 1px solid var(--surface1);
      border-radius: 24px 24px 0 0;
      padding: 1.75rem;
      max-width: 100%;
      width: 100%;
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 85vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    /* ── TOAST ───────────────────────────────────────────– */
    .toast {
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom) + 1rem);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface1);
      color: var(--text);
      border: 1px solid var(--surface2);
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      font-size: 0.875rem;
      transition: transform 0.3s ease;
      z-index: 600;
      white-space: nowrap;
      -webkit-touch-callout: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── PLACEHOLDER PAGES ────────────────────────────── */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      gap: 0.75rem;
      text-align: center;
    }

    /* ── DIVIDER ──────────────────────────────────────── */
    .div { height: 1px; background: var(--surface0); margin: 1.25rem 0; }

    /* ── ANIMATIONS ───────────────────────────────────– */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .fade-1 { animation: fadeUp 0.35s ease both; }
    .fade-2 { animation: fadeUp 0.35s 0.08s ease both; }
    .fade-3 { animation: fadeUp 0.35s 0.16s ease both; }
    .fade-4 { animation: fadeUp 0.35s 0.24s ease both; }
    .fade-5 { animation: fadeUp 0.35s 0.32s ease both; }

    /* ── SETTINGS PAGE ───────────────────────────────── */
    .settings-section {
      margin-bottom: 2rem;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--surface0);
      min-height: 44px;
    }

    .settings-row:last-child { border-bottom: none; }

    .settings-block {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 0.65rem;
    }

    .settings-block-header {
      padding: 0.85rem 1.25rem;
      background: var(--mantle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--surface0);
      min-height: 44px;
    }

    .settings-block-title {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--overlay1);
      font-weight: 500;
    }

    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--surface0);
      gap: 1rem;
      min-height: 44px;
    }

    .settings-item:last-child { border-bottom: none; }

    .settings-item-left { flex: 1; min-width: 0; }

    .settings-item-name {
      font-size: 0.9rem;
      color: var(--text);
    }

    .settings-item-sub {
      font-size: 0.75rem;
      color: var(--overlay1);
      margin-top: 0.15rem;
    }

    .settings-item-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .settings-inline-edit {
      padding: 0.75rem 1.25rem;
      background: var(--surface0);
      border-bottom: 1px solid var(--surface1);
      display: grid;
      gap: 0.65rem;
      animation: fadeUp 0.2s ease both;
    }

    .settings-inline-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    /* ── CALENDAR STYLES ──────────────────────────────– */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .cal-nav-btn {
      background: var(--surface0);
      border: 1px solid var(--surface1);
      color: var(--subtext1);
      width: 44px;
      height: 44px;
      border-radius: var(--r-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 1rem;
      -webkit-appearance: none;
      appearance: none;
      -webkit-touch-callout: none;
    }

    .cal-nav-btn:active:not(:disabled) { background: var(--surface1); color: var(--text); opacity: 0.97; }
    .cal-nav-btn:disabled { opacity: 0.3; cursor: default; }

    .cal-month-label {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      font-style: italic;
    }

    .cal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 0.35rem;
    }

    .cal-dow {
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--overlay0);
      padding: 0.25rem 0;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .cal-day {
      min-height: 60px;
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: var(--r-sm);
      padding: 0.4rem 0.45rem 0.35rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      -webkit-touch-callout: none;
    }

    .cal-day:active { border-color: var(--surface2); background: var(--surface0); opacity: 0.97; }
    .cal-day.selected { border-color: var(--cream); background: rgba(232,220,200,0.05); }
    .cal-day.is-today .cal-day-num { color: var(--cream); font-weight: 700; }
    .cal-day.is-today::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--cream);
    }
    .cal-day.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
    .cal-day.other-month { opacity: 0.3; }

    .cal-day-num {
      font-size: 0.78rem;
      color: var(--subtext0);
      margin-bottom: 0.3rem;
      line-height: 1;
    }

    .cal-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      flex: 1;
    }

    .cal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cal-net {
      font-size: 0.6rem;
      font-weight: 600;
      margin-top: auto;
      padding-top: 0.2rem;
    }

    /* ── DEBT PAGE ─────────────────────────────────────– */
    .debt-card {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: var(--r);
      padding: 1.2rem 1.4rem;
      transition: border-color 0.2s;
      -webkit-touch-callout: none;
    }

    .debt-card.priority-high   { border-left: 3px solid var(--red); }
    .debt-card.priority-medium { border-left: 3px solid var(--yellow); }
    .debt-card.priority-low    { border-left: 3px solid var(--overlay0); }
    .debt-card.priority-managed{ border-left: 3px solid var(--mauve); }

    .debt-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.85rem;
    }

    .debt-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .debt-note {
      font-size: 0.78rem;
      color: var(--overlay1);
      font-style: italic;
      margin-top: 0.15rem;
    }

    .debt-stats {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 0.85rem;
      flex-wrap: wrap;
    }

    .debt-stat { display: flex; flex-direction: column; gap: 0.2rem; }
    .debt-stat-label { font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--overlay1); }
    .debt-stat-value { font-size: 1.05rem; font-weight: 600; color: var(--text); }

    .debt-util-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .debt-util-bar {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: var(--surface1);
      overflow: hidden;
    }

    .debt-util-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .debt-util-label {
      font-size: 0.72rem;
      color: var(--overlay1);
      flex-shrink: 0;
      width: 2.5rem;
      text-align: right;
    }

    .debt-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding-top: 0.75rem;
      border-top: 1px solid var(--surface0);
    }

    .debt-edit-form {
      margin-top: 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--surface0);
      display: grid;
      gap: 0.65rem;
    }

    .debt-edit-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .debt-payment-log {
      margin-top: 0.6rem;
      font-size: 0.78rem;
      color: var(--overlay1);
      font-style: italic;
    }

    .priority-group-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--overlay0);
      font-weight: 500;
      margin: 1.5rem 0 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .priority-group-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--surface0);
    }

    /* ── LOOKING AHEAD ────────────────────────────────– */
    .ahead-month {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .ahead-month-header {
      padding: 1rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--surface0);
      min-height: 44px;
    }

    .ahead-month-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .ahead-month-body {
      padding: 1rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .ahead-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.875rem;
    }

    .ahead-row-label { color: var(--subtext1); }
    .ahead-row-val   { font-weight: 600; }

    .ahead-bar-wrap {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--surface0);
    }

    .ahead-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--overlay1);
      margin-bottom: 0.35rem;
    }

    .ahead-bar-track {
      height: 10px;
      background: var(--surface0);
      border-radius: 999px;
      overflow: hidden;
      display: flex;
    }

    .ahead-bar-in  { background: var(--cream);  border-radius: 999px 0 0 999px; }
    .ahead-bar-out { background: var(--red);     opacity: 0.65; }

    .milestone-card {
      background: var(--surface0);
      border-radius: var(--r-sm);
      padding: 0.85rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .milestone-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.3rem;
    }

    .milestone-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    .milestone-desc {
      font-size: 0.8rem;
      color: var(--subtext1);
      margin-top: 0.2rem;
      line-height: 1.5;
      font-style: italic;
    }

    /* ── DAY DETAIL PANEL ──────────────────────────────– */
    .day-detail {
      background: var(--mantle);
      border: 1px solid var(--surface1);
      border-radius: var(--r);
      padding: 1.25rem 1.4rem;
      margin-top: 1rem;
      animation: fadeUp 0.25s ease both;
    }

    .day-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--surface0);
    }

    .day-event-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--surface0);
      min-height: 44px;
    }

    .day-event-row:last-child { border-bottom: none; }

    .day-event-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .day-event-name { flex: 1; font-size: 0.875rem; }

    .day-event-amount {
      font-size: 0.875rem;
      font-weight: 600;
    }

    .day-event-badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
      font-weight: 600;
    }

    /* ── TODAY HIGHLIGHT ──────────────────────────────– */
    .today-alert {
      border-left: 3px solid var(--red);
      padding-left: 0.65rem;
      margin-left: -0.65rem;
    }
    /* ── PIN GATE ── */
    #pin-gate{position:fixed;inset:0;z-index:99999;background:var(--base);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Lora',serif;gap:18px}
    #pin-gate.unlocked{display:none}
    #pin-gate h2{color:var(--text);font-size:1.3rem;font-weight:600;margin:0}
    #pin-gate p{color:var(--subtext0);font-size:0.85rem;margin:0}
    #pin-dots{display:flex;gap:14px;margin:12px 0}
    #pin-dots span{width:14px;height:14px;border-radius:50%;border:2px solid var(--surface2);background:transparent;transition:background .15s}
    #pin-dots span.filled{background:var(--lavender);border-color:var(--lavender)}
    #pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
    #pin-pad button{height:72px;border-radius:50%;border:1.5px solid var(--surface1);background:var(--mantle);color:var(--text);font-size:1.4rem;font-family:'Lora',serif;-webkit-tap-highlight-color:transparent;cursor:pointer}
    #pin-pad button:active{background:var(--surface0)}
    #pin-error{color:var(--red,#ed8796);font-size:0.8rem;min-height:1.2em;margin:0}
  </style>
</head>
<body>

<div id="pin-gate">
  <h2>finances ✦</h2>
  <p>enter pin</p>
  <div id="pin-dots"><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <p id="pin-error"></p>
  <div id="pin-pad">
    <button onclick="pinKey('1')">1</button><button onclick="pinKey('2')">2</button><button onclick="pinKey('3')">3</button>
    <button onclick="pinKey('4')">4</button><button onclick="pinKey('5')">5</button><button onclick="pinKey('6')">6</button>
    <button onclick="pinKey('7')">7</button><button onclick="pinKey('8')">8</button><button onclick="pinKey('9')">9</button>
    <button onclick="pinClear()">C</button><button onclick="pinKey('0')">0</button><button onclick="pinDel()">&larr;</button>
  </div>
</div>
<script>
(function(){
  var PIN='435183',entry='',dots=document.querySelectorAll('#pin-dots span'),errEl=document.getElementById('pin-error'),gate=document.getElementById('pin-gate');
  if(sessionStorage.getItem('hub_pin_ok')==='1'){gate.classList.add('unlocked');return}
  window.pinKey=function(d){if(entry.length>=6)return;entry+=d;updDots();if(entry.length===6){if(entry===PIN){sessionStorage.setItem('hub_pin_ok','1');gate.classList.add('unlocked')}else{errEl.textContent='wrong pin';entry='';setTimeout(updDots,400)}}};
  window.pinDel=function(){entry=entry.slice(0,-1);updDots();errEl.textContent=''};
  window.pinClear=function(){entry='';updDots();errEl.textContent=''};
  function updDots(){for(var i=0;i<dots.length;i++){dots[i].classList.toggle('filled',i<entry.length)}}
})();
</script>

function todayStr() {

function isoDate(d) {

function monthKey(d = today()) {

function isPaidThisMonth(exp) {

function dayName(dateStr) {

function daysUntil(dateStr) {
  const now = today();
  now.setHours(0,0,0,0);
  const target = new Date(dateStr + 'T00:00:00');
  return Math.round((target - now) / 86400000);
}

// ============================================================
// FINANCE CALCULATIONS
// ============================================================

function calcFreeMoney() {
  const mk = monthKey();
  const now = today();
  const todayNum = now.getDate();
  const curYear = now.getFullYear();
  const curMonth = now.getMonth() + 1; // 1-based

  // Income still to arrive this month
  let incomeRemaining = 0;
  D.income.forEach(src => {
    const received = (src.received || []).includes(mk);
    if (!received) {
      // Will it arrive this month?
      if (src.frequency === 'monthly' && src.dayOfMonth >= todayNum) {
        incomeRemaining += src.amount;
      } else if (src.frequency === 'every4weeks' && src.nextDate) {
        const nd = src.nextDate;
        if (nd.startsWith(mk)) incomeRemaining += src.amount;
      }
    }
  });

  // Fixed expenses still to pay this month
  let expensesRemaining = 0;
  D.fixedExpenses.forEach(exp => {
    if (!isPaidThisMonth(exp)) {
      // Is it active this month?
      if (exp.endsAfter) {
        if (mk > exp.endsAfter) return; // expired
      }
      expensesRemaining += exp.amount;
    }
  });

  // Zilch remaining this month
  let zilchRemaining = 0;
  D.zilch.forEach(z => {
    if (!z.paid && z.date.startsWith(mk)) {
      zilchRemaining += z.amount;
    }
  });

  const freeRaw = D.balance + incomeRemaining - expensesRemaining - zilchRemaining;
  return { freeRaw, incomeRemaining, expensesRemaining, zilchRemaining };
}

function getUpcoming(days = 12) {
  const now = today();
  now.setHours(0,0,0,0);
  const mk = monthKey();
  const todayNum = now.getDate();
  const curYear = now.getFullYear();
  const curMonth = now.getMonth(); // 0-based

  const items = [];

  // Fixed expenses
  D.fixedExpenses.forEach(exp => {
    if (isPaidThisMonth(exp)) return;
    if (exp.endsAfter && mk > exp.endsAfter) return;
    const d = new Date(curYear, curMonth, exp.dayOfMonth);
    if (d >= now) {
      items.push({
        date: isoDate(d),
        day: exp.dayOfMonth,
        name: exp.name,
        amount: -exp.amount,
        type: 'expense',
        id: 'exp-' + exp.id,
        expId: exp.id
      });
    }
  });

  // Zilch
  D.zilch.forEach(z => {
    if (!z.paid) {
      const d = new Date(z.date + 'T00:00:00');
      if (d >= now) {
        items.push({
          date: z.date,
          name: 'Zilch',
          amount: -z.amount,
          type: 'zilch',
          id: 'zilch-' + z.id,
          zilchId: z.id
        });
      }
    }
  });

  // Income
  D.income.forEach(src => {
    const received = (src.received || []).includes(mk);
    if (!received) {
      let d;
      if (src.frequency === 'monthly') {
        d = new Date(curYear, curMonth, src.dayOfMonth);
      } else if (src.frequency === 'every4weeks' && src.nextDate) {
        d = new Date(src.nextDate + 'T00:00:00');
      }
      if (d && d >= now) {
        items.push({
          date: isoDate(d),
          name: src.name,
          amount: src.amount,
          type: 'income',
          id: 'inc-' + src.id
        });
      }
    }
  });

  // Sort by date, then filter to next N days
  items.sort((a, b) => a.date.localeCompare(b.date));
  const cutoff = new Date(now.getTime() + days * 86400000);
  return items.filter(i => new Date(i.date + 'T00:00:00') <= cutoff);
}

function getAprilZilch() {
  const mk = monthKey();
  return D.zilch.filter(z => z.date.startsWith(mk)).sort((a,b) => a.date.localeCompare(b.date));
}

function totalDebt() {
  return D.debts.reduce((s, d) => s + d.balance, 0);
}

function computeNextMilestone() {
  const now = today();
  now.setHours(0,0,0,0);
  const candidates = [];

  // 1. Last Nanna payment
  const nannaExp = D.fixedExpenses.find(e => e.name === 'Nanna');
  if (nannaExp && nannaExp.endsAfter && !isPaidThisMonthFor(nannaExp, nannaExp.endsAfter)) {
    const parts = nannaExp.endsAfter.split('-');
    const lastDay = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, nannaExp.dayOfMonth);
    if (lastDay >= now) {
      const days = Math.round((lastDay - now) / 86400000);
      const nextMonthName = new Date(parseInt(parts[0]), parseInt(parts[1]), 1).toLocaleDateString('en-GB', { month: 'long' });
      candidates.push({
        date: lastDay,
        days,
        borderRgb: '240,198,198',
        svg: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="var(--flamingo)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 14s-5-3.5-5-7a5 5 0 0 1 10 0c0 3.5-5 7-5 7z"/>
        </svg>`,
        title: 'Last Nanna payment',
        desc: `${dayName(isoDate(lastDay))} — then ${fmtNoSign(nannaExp.amount)}/month freed up from ${nextMonthName} onwards.`,
        subline: null,
      });
    }
  }

  // 2. Zilch fully cleared — date of last unpaid payment
  const unpaidZilch = D.zilch.filter(z => !z.paid);
  if (unpaidZilch.length > 0) {
    const lastZilchStr = unpaidZilch.reduce((l, z) => z.date > l ? z.date : l, unpaidZilch[0].date);
    const lastZilchD = new Date(lastZilchStr + 'T00:00:00');
    if (lastZilchD >= now) {
      const days = Math.round((lastZilchD - now) / 86400000);
      const totalLeft = unpaidZilch.reduce((s, z) => s + z.amount, 0);
      candidates.push({
        date: lastZilchD,
        days,
        borderRgb: '139,213,202',
        svg: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="var(--teal)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 8l2.5 2.5L11 5"/>
          <circle cx="8" cy="8" r="6"/>
        </svg>`,
        title: 'Zilch fully cleared',
        desc: `Final payment on ${dayName(lastZilchStr)} — that chapter completely closed.`,
        subline: `${unpaidZilch.length} payment${unpaidZilch.length !== 1 ? 's' : ''} left · ${fmtNoSign(totalLeft)} total`,
      });
    }
  }

  // 3. Ocean 0% expiry
  const ocean = D.debts.find(d => d.expiry && d.balance > 0);
  if (ocean && ocean.expiry) {
    const expiryD = new Date(ocean.expiry + 'T00:00:00');
    if (expiryD >= now) {
      const days = Math.round((expiryD - now) / 86400000);
      candidates.push({
        date: expiryD,
        days,
        borderRgb: '238,212,159',
        svg: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="var(--yellow)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6"/>
          <path d="M8 5v3.5l2 2"/>
        </svg>`,
        title: `${ocean.name} — 0% expires`,
        desc: `${dayName(ocean.expiry)} — worth having a transfer plan in place before then.`,
        subline: `${fmtNoSign(ocean.balance)} remaining on this card`,
      });
    }
  }

  if (candidates.length === 0) return null;
  candidates.sort((a, b) => a.date - b.date);
  return candidates[0];
}

// Helper: check if an expense was paid in a specific month key (not necessarily current)
function isPaidThisMonthFor(exp, mk) {
  return (exp.paidMonths || []).includes(mk);
}

function openSecurityNetDeposit() {
  const snet = D.securityNet || { balance: 0, goal: 500 };
  const remaining = Math.max(0, snet.goal - snet.balance);
  const sub = document.getElementById('snet-modal-sub');
  if (sub) {
    sub.textContent = remaining > 0
      ? `${fmtNoSign(remaining)} left to reach your £${snet.goal} goal. Every little helps.`
      : 'You\'ve hit your goal! Adding more just makes it stronger.';
  }
  document.getElementById('snet-deposit-input').value = '';
  document.getElementById('security-net-modal').classList.add('show');
  setTimeout(() => document.getElementById('snet-deposit-input').focus(), 100);
}

function saveSecurityNetDeposit() {
  const val = parseFloat(document.getElementById('snet-deposit-input').value);
  if (isNaN(val) || val <= 0) { showToast('Please enter a valid amount'); return; }
  if (!D.securityNet) D.securityNet = { balance: 0, goal: 500 };
  D.securityNet.balance = +(D.securityNet.balance + val).toFixed(2);
  save();
  closeModal('security-net-modal');
  const hitGoal = D.securityNet.balance >= D.securityNet.goal;
  showToast(hitGoal
    ? `✦ ${fmtNoSign(val)} added — security net goal reached!`
    : `✦ ${fmtNoSign(val)} added to your security net`);
  renderPage(currentPage);
}

function saveSecurityNetGoal() {
  const val = parseFloat(document.getElementById('s-snet-goal').value);
  if (isNaN(val) || val < 1) { showToast('Please enter a valid goal'); return; }
  if (!D.securityNet) D.securityNet = { balance: 0, goal: 500 };
  D.securityNet.goal = val;
  settingsEditId = null;
  save();
  showToast('Security net goal updated ✦');
  renderSettings();
}

function addExpense() {

let _pendingLog = null;

function openLogModal() {
  document.getElementById('log-name').value = '';
  document.getElementById('log-amount').value = '';
  document.getElementById('log-type').value = 'expense';
  document.getElementById('log-category').value = 'other';
  document.getElementById('log-note').value = '';
  openModal('log-modal');
}

function submitLog() {
  const name   = document.getElementById('log-name').value.trim();
  const amount = parseFloat(document.getElementById('log-amount').value);
  const type   = document.getElementById('log-type').value;
  const cat    = document.getElementById('log-category').value;
  const note   = document.getElementById('log-note').value.trim();

  if (!name)           { showToast('Please add a description'); return; }
  if (isNaN(amount) || amount <= 0) { showToast('Please enter a valid amount'); return; }

  // Impulse spending check
  const threshold = D.profile.impulseThreshold || 30;
  if (type === 'expense' && amount >= threshold) {
    closeModal('log-modal');
    _pendingLog = { name, amount, type, cat, note };
    showImpulsePause(amount);
    return;
  }

  commitLog({ name, amount, type, cat, note });
}

function showImpulsePause(amount) {
  const { freeRaw } = calcFreeMoney();
  const after = Math.max(0, freeRaw - amount);
  document.getElementById('impulse-text').innerHTML =
    `You have <strong style="color:var(--cream)">${fmtNoSign(Math.max(0, freeRaw))}</strong> free to spend this month.<br>
     This purchase would leave you with <strong style="color:${after < 50 ? 'var(--red)' : 'var(--yellow)'}">${fmtNoSign(after)}</strong>.<br><br>
     Is this something you need right now, or can it wait?`;
  openModal('impulse-modal');
}

document.getElementById('impulse-wait-btn').onclick = function() {
  closeModal('impulse-modal');
  _pendingLog = null;
  showToast('Good call — that money stays safe ✦');
};

document.getElementById('impulse-proceed-btn').onclick = function() {
  closeModal('impulse-modal');
  if (_pendingLog) {
    commitLog(_pendingLog);
    _pendingLog = null;
  }
};

function commitLog({ name, amount, type, cat, note }) {
  const tx = {
    id: Date.now(),
    date: _logDate || todayStr(),
    name,
    amount: type === 'income' ? amount : -amount,
    category: cat,
    note,
    type
  };
  D.transactions.push(tx);
  if (type === 'expense') {
    D.balance = Math.max(0, D.balance - amount);
  } else {
    D.balance += amount;
  }
  save();
  _logDate = null;
  closeModal('log-modal');
  showToast(type === 'income' ? `+${fmtNoSign(amount)} logged ✦` : `−${fmtNoSign(amount)} logged`);
  renderPage(currentPage);
}

function fmtSplitHero(n) {
  const parts = Math.abs(n).toFixed(2).split('.');
  return `£${parts[0]}<span style="font-size:0.52em;letter-spacing:0;vertical-align:0.18em;font-weight:700;opacity:0.75">.${parts[1]}</span>`;
}

function countUp(el, target, duration = 900) {
  const start = performance.now();
  function tick(now) {
    const elapsed = Math.min(now - start, duration);
    const ease = 1 - Math.pow(1 - elapsed / duration, 3);
    const current = target * ease;
    if (elapsed < duration) {
      el.textContent = '£' + current.toFixed(2);
      requestAnimationFrame(tick);
    } else {
      el.innerHTML = fmtSplitHero(target);
    }
  }
  requestAnimationFrame(tick);
}

function animateBarsIn() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.progress-fill').forEach(el => {
      const target = el.style.width;
      if (!target || target === '0%' || target === '0') return;
      el.style.transition = 'none';
      el.style.width = '0';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          el.style.transition = '';
          el.style.width = target;
        });
      });
    });
  });
}

function projectMonth(year, month) {
  // Returns { income, committed, zilch, free, label, milestones[] }
  const mk    = `${year}-${String(month).padStart(2,'0')}`;
  const label = new Date(year, month - 1, 1).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  const milestones = [];

  // Income
  let income = 0;
  D.income.forEach(src => {
    if (src.frequency === 'monthly') {
      income += src.amount;
    } else if (src.frequency === 'every4weeks') {
      // Count how many 4-week dates fall in this month
      const hits = EVERY4WEEKS_DATES.filter(d => d.startsWith(mk));
      income += hits.length * src.amount;
    }
  });

  // Fixed committed (not counting one-offs that end)
  let committed = 0;
  D.fixedExpenses.forEach(exp => {
    if (exp.endsAfter && mk > exp.endsAfter) return;
    committed += exp.amount;
  });

  // Check if Nanna ends this month or next
  const nannaExp = D.fixedExpenses.find(e => e.name === 'Nanna');
  if (nannaExp && nannaExp.endsAfter === mk) {
    milestones.push({
      color: 'var(--flamingo)',
      title: 'Last Nanna payment ✦',
      desc: `${fmtNoSign(nannaExp.amount)}/month freed up from next month onwards.`,
    });
  }

  // Zilch this month
  let zilch = 0;
  D.zilch.forEach(z => {
    if (z.date.startsWith(mk)) zilch += z.amount;
  });

  // Check if Zilch ends after this month
  const futureZilch = D.zilch.filter(z => z.date > mk + '-31');
  const thisMonthZilch = D.zilch.filter(z => z.date.startsWith(mk));
  const nextMonthZilch = D.zilch.filter(z => {
    const nm = nextMonthKey(year, month);
    return z.date.startsWith(nm);
  });
  if (thisMonthZilch.length > 0 && nextMonthZilch.length === 0) {
    milestones.push({
      color: 'var(--teal)',
      title: 'Zilch fully paid off ✦',
      desc: `${fmtNoSign(zilch)} freed up — that chapter is closed.`,
    });
  }

  const free = income - committed - zilch;
  return { income, committed, zilch, free, label, milestones, mk };
}

function nextMonthKey(year, month) {
  let m = month + 1, y = year;
  if (m > 12) { m = 1; y++; }
  return `${y}-${String(m).padStart(2,'0')}`;
}

function saveDebtUpdate(id) {
  const debt = D.debts.find(d => d.id === id);
  if (!debt) return;

  const newBal = parseFloat(document.getElementById('debt-bal-' + id).value);
  const payAmt = parseFloat(document.getElementById('debt-pay-' + id).value) || 0;

  if (isNaN(newBal) || newBal < 0) { showToast('Please enter a valid balance'); return; }

  const oldBal = debt.balance;
  debt.balance = newBal;

  if (payAmt > 0) {
    if (!debt.payments) debt.payments = [];
    debt.payments.push({ amount: payAmt, date: todayStr() });
    // Subtract from account balance too
    D.balance = Math.max(0, D.balance - payAmt);
  }

  debtEditOpen = null;
  save();
  showToast(`${debt.name} updated ✦`);

  // Celebration if paid off
  if (newBal <= 0 && oldBal > 0) {
    setTimeout(() => showToast(`${debt.name} is paid off! That's huge ✦`), 800);
  }

  renderDebts();
  // Also refresh dashboard if we changed the balance
  if (payAmt > 0 && currentPage === 'debts') renderPage('debts');
}

function openSetTarget(id) {
  const debt = D.debts.find(d => d.id === id);
  if (!debt) return;
  const current = debt.targetPayment || '';
  const val = prompt(`Target monthly payment for ${debt.name} (£):`, current);
  if (val === null) return;
  const parsed = parseFloat(val);
  if (isNaN(parsed) || parsed < 0) { showToast('Invalid amount'); return; }
  debt.targetPayment = parsed;
  save();
  showToast(`Target set: ${fmtNoSign(parsed)}/month ✦`);
  renderDebts();
}

// Pre-compute all "every 4 weeks" dates for income src 2 (starting 17 Apr 2026)
function getEvery4WeeksDates() {
  const dates = [];
  let d = new Date('2026-04-17T12:00:00');
  // Generate 2 years ahead so the rolling window always has data
  const end = new Date(today().getFullYear() + 2, today().getMonth(), 1);
  while (d < end) {
    dates.push(isoDate(d));
    d = new Date(d.getTime() + 28 * 86400000);
  }
  return dates;
}
const EVERY4WEEKS_DATES = getEvery4WeeksDates();

function getEventsForDay(dateStr) {
  const parts  = dateStr.split('-');
  const dayNum = parseInt(parts[2], 10);
  const mk     = parts[0] + '-' + parts[1];
  const events = [];

  // Fixed expenses
  D.fixedExpenses.forEach(exp => {
    if (exp.dayOfMonth !== dayNum) return;
    if (exp.endsAfter && mk > exp.endsAfter) return;
    events.push({
      type:     'expense',
      name:     exp.name,
      amount:   -exp.amount,
      color:    CAT_COLOR[exp.category] || CAT_COLOR.other,
      paid:     (exp.paidMonths || []).includes(mk),
      expId:    exp.id,
    });
  });

  // Income: monthly sources
  D.income.forEach(src => {
    let hits = false;
    if (src.frequency === 'monthly' && src.dayOfMonth === dayNum) {
      hits = true;
    } else if (src.frequency === 'every4weeks') {
      hits = EVERY4WEEKS_DATES.includes(dateStr);
    }
    if (!hits) return;
    events.push({
      type:     'income',
      name:     src.name,
      amount:   src.amount,
      color:    CAT_COLOR.income,
      received: (src.received || []).includes(mk),
      srcId:    src.id,
    });
  });

  // Zilch
  D.zilch.forEach(z => {
    if (z.date !== dateStr) return;
    events.push({
      type:    'zilch',
      name:    'Zilch',
      amount:  -z.amount,
      color:   CAT_COLOR.zilch,
      paid:    z.paid,
      zilchId: z.id,
    });
  });

  // Logged transactions
  D.transactions.forEach(tx => {
    if (tx.date !== dateStr) return;
    events.push({
      type:   'transaction',
      name:   tx.name,
      amount: tx.amount,
      color:  CAT_COLOR[tx.category] || CAT_COLOR.other,
    });
  });

  return events;
}

function buildMonthGrid(year, month) {
  // Grid: Monday-first (UK)
  const firstDay  = new Date(year, month - 1, 1);
  const lastDay   = new Date(year, month, 0);
  const startDow  = (firstDay.getDay() + 6) % 7; // 0=Mon … 6=Sun
  const daysTotal = lastDay.getDate();

  const cells = [];
  // Leading empty cells
  for (let i = 0; i < startDow; i++) cells.push(null);
  // Actual days
  for (let d = 1; d <= daysTotal; d++) {
    cells.push(`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  // Trailing empties to complete grid (multiples of 7)
  while (cells.length % 7 !== 0) cells.push(null);
  return cells;
}

function calMonthLabel(year, month) {
  return new Date(year, month - 1, 1).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
}

function renderCalendar() {
  const { year, month, selectedDay } = calState;
  const cells  = buildMonthGrid(year, month);
  const todStr = todayStr();
  const end     = calEnd();
  const atStart = year === CAL_START.year && month === CAL_START.month;
  const atEnd   = year === end.year       && month === end.month;

  const dowLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const gridHtml = cells.map(dateStr => {
    if (!dateStr) return `<div class="cal-day empty"></div>`;
    const events = getEventsForDay(dateStr);
    const isToday    = dateStr === todStr;
    const isSelected = dateStr === selectedDay;
    const net = events.reduce((s, e) => s + e.amount, 0);
    const netColor = net > 0 ? 'var(--cream)' : net < 0 ? 'var(--red)' : 'var(--overlay1)';
    const dayNum = parseInt(dateStr.split('-')[2], 10);

    const dots = events.map(e =>
      `<div class="cal-dot" style="background:${e.color};${e.paid || e.received ? 'opacity:0.4' : ''}"></div>`
    ).join('');

    return `
      <div class="cal-day ${isToday ? 'is-today' : ''} ${isSelected ? 'selected' : ''}"
           onclick="selectCalDay('${dateStr}')">
        <div class="cal-day-num">${dayNum}</div>
        <div class="cal-dots">${dots}</div>
        ${net !== 0 ? `<div class="cal-net" style="color:${netColor}">${net > 0 ? '+' : ''}${fmtNoSign(Math.abs(net))}</div>` : ''}
      </div>`;
  }).join('');

  // Detail panel for selected day
  let detailHtml = '';
  if (selectedDay) {
    const events = getEventsForDay(selectedDay);
    const selDate = new Date(selectedDay + 'T12:00:00');
    const dateLabel = selDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    const net = events.reduce((s, e) => s + e.amount, 0);
    const netColor = net > 0 ? 'var(--cream)' : net < 0 ? 'var(--red)' : 'var(--overlay1)';

    const eventRows = events.length === 0
      ? `<p style="color:var(--overlay1);font-style:italic;font-size:0.875rem;padding:0.5rem 0">Nothing scheduled. Free day ✦</p>`
      : events.map(e => {
          const isOut = e.amount < 0;
          const amtColor = e.amount > 0 ? 'var(--cream)' : 'var(--subtext1)';
          let badge = '';
          if (e.type === 'zilch')   badge = `<span class="day-event-badge" style="background:rgba(139,213,202,0.15);color:var(--teal)">Zilch</span>`;
          if (e.type === 'income')  badge = `<span class="day-event-badge" style="background:rgba(232,220,200,0.15);color:var(--cream)">Income</span>`;
          if (e.paid)   badge += `<span class="day-event-badge" style="background:var(--surface0);color:var(--overlay1)">paid</span>`;
          if (e.received) badge += `<span class="day-event-badge" style="background:rgba(232,220,200,0.15);color:var(--cream)">received</span>`;

          // Inline action buttons for mark-paid/received
          let action = '';
          if (e.type === 'expense' && !e.paid) {
            action = `<button class="mark-btn" style="margin-left:0.25rem" onclick="markExpensePaidFromCal(${e.expId},'${selectedDay}')">mark paid</button>`;
          }
          if (e.type === 'zilch' && !e.paid) {
            action = `<button class="mark-btn" style="margin-left:0.25rem" onclick="markZilchPaid(${e.zilchId})">mark paid</button>`;
          }
          if (e.type === 'income' && !e.received) {
            action = `<button class="mark-btn" style="margin-left:0.25rem" onclick="markIncomeReceivedFromCal(${e.srcId},'${selectedDay}')">mark received</button>`;
          }

          return `
            <div class="day-event-row">
              <div class="day-event-dot" style="background:${e.color}"></div>
              <span class="day-event-name">${e.name}</span>
              <div style="display:flex;align-items:center;gap:0.35rem;flex-wrap:wrap;justify-content:flex-end">
                ${badge}
                <span class="day-event-amount" style="color:${amtColor}">${e.amount > 0 ? '+' : '−'}${fmtNoSign(Math.abs(e.amount))}</span>
                ${action}
              </div>
            </div>`;
        }).join('');

    detailHtml = `
      <div class="day-detail">
        <div class="day-detail-header">
          <div>
            <div style="font-size:0.95rem;font-weight:600">${dateLabel}</div>
            ${events.length > 0 ? `<div style="font-size:0.78rem;color:${netColor};margin-top:0.2rem">Net: ${net > 0 ? '+' : ''}${fmtNoSign(Math.abs(net))}</div>` : ''}
          </div>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <button class="btn btn-sm btn-cream" onclick="openLogForDay('${selectedDay}')">+ Log</button>
            <button class="btn btn-sm btn-ghost" onclick="selectCalDay('${selectedDay}')">✕</button>
          </div>
        </div>
        ${eventRows}
      </div>`;
  }

  // Legend
  const legendItems = [
    { color: 'var(--cream)',    label: 'Income' },
    { color: 'var(--blue)',     label: 'Housing' },
    { color: 'var(--yellow)',   label: 'Utilities' },
    { color: 'var(--mauve)',    label: 'Subscriptions' },
    { color: 'var(--flamingo)', label: 'Family' },
    { color: 'var(--teal)',     label: 'Zilch' },
    { color: 'var(--red)',      label: 'Debt' },
  ];
  const legendHtml = legendItems.map(l =>
    `<div style="display:flex;align-items:center;gap:0.35rem">
      <div style="width:7px;height:7px;border-radius:50%;background:${l.color};flex-shrink:0"></div>
      <span style="font-size:0.72rem;color:var(--overlay1)">${l.label}</span>
    </div>`
  ).join('');

  document.getElementById('calendar-content').innerHTML = `
    <div class="fade-1">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calPrev()" ${atStart ? 'disabled' : ''}>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M10 3L5 8l5 5"/>
          </svg>
        </button>
        <span class="cal-month-label">${calMonthLabel(year, month)}</span>
        <button class="cal-nav-btn" onclick="calNext()" ${atEnd ? 'disabled' : ''}>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M6 3l5 5-5 5"/>
          </svg>
        </button>
      </div>

      <div class="cal-dow-row">
        ${dowLabels.map(d => `<div class="cal-dow">${d}</div>`).join('')}
      </div>

      <div class="cal-grid">${gridHtml}</div>

      ${detailHtml}

      <div style="display:flex;flex-wrap:wrap;gap:0.75rem 1.25rem;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--surface0)">
        ${legendHtml}
      </div>
    </div>
  `;
}

function selectCalDay(dateStr) {
  // Toggle off if clicking the same day
  calState.selectedDay = calState.selectedDay === dateStr ? null : dateStr;
  renderCalendar();
  // Scroll detail into view smoothly
  if (calState.selectedDay) {
    setTimeout(() => {
      const detail = document.querySelector('.day-detail');
      if (detail) detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

function calPrev() {
  let { year, month } = calState;
  month--;
  if (month < 1) { month = 12; year--; }
  calState = { year, month, selectedDay: null };
  renderCalendar();
}

function calNext() {
  let { year, month } = calState;
  month++;
  if (month > 12) { month = 1; year++; }
  calState = { year, month, selectedDay: null };
  renderCalendar();
}

function markExpensePaidFromCal(expId, dateStr) {
  markExpensePaid(expId);
  calState.selectedDay = dateStr;
  // renderCalendar is called by markExpensePaid → renderPage
}

function markIncomeReceivedFromCal(srcId, dateStr) {
  markIncomeReceived(srcId);
  calState.selectedDay = dateStr;
}

function openLogForDay(dateStr) {
  // Pre-set date context then open log modal
  _logDate = dateStr;
  openModal('log-modal');
}

let _logDate = null;

// ============================================================
// INIT
// ============================================================

document.addEventListener('DOMContentLoaded', () => {
  renderDashboard();
  // Sync from cloud — if remote is newer, re-render
  HubSync.sync(STORAGE_KEY).then(function(synced) {
    if (synced) { D = synced; renderDashboard(); }
  });
});

</script>

</body>
</html>
